<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小手机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
--pw:360px;--ph:640px;--pr:46px;
--accent:#576B95;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--pink:#ff2d55;
--bg:#f2f2f7;--bg2:#fff;--text:#000;--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.3);
--sep:rgba(0,0,0,.07);--glass:rgba(255,255,255,.85);--glass2:rgba(245,245,247,.92);
--gb:blur(30px);--nav-bg:rgba(255,255,255,.9);--card:rgba(0,0,0,.035);
--input-bg:rgba(0,0,0,.04);--sb-c:#000;--bu:rgba(0,122,255,1);--bc:rgba(0,0,0,.06);
--font-color:#fff;--mom-bg:#fff;--md-cmt-bg:rgba(0,0,0,.02);
--btn-p:rgba(0,0,0,.06);--btn-pf:#555;--btn-s:#fff;--btn-sf:#333;--wb-blue:#576B95;
--bnav-c:#000;--set-c:#000;--app-bg-1:rgba(0,0,0,.04);--app-bg-2:#888;
--sys-tag-c:#000;--sys-tag-bg:rgba(0,0,0,.06);
--wal-grad:linear-gradient(135deg,#f5f5f5,#e8e8e8);--cmt-bg:rgba(0,0,0,.02)
}
.dark{
--bg:#000;--bg2:#1c1c1e;--text:#fff;--text2:rgba(255,255,255,.6);--text3:rgba(255,255,255,.35);
--sep:rgba(255,255,255,.1);--glass:rgba(28,28,30,.85);--glass2:rgba(20,20,22,.9);
--gb:blur(30px);--nav-bg:rgba(22,22,24,.92);--card:rgba(255,255,255,.05);
--input-bg:rgba(255,255,255,.07);--sb-c:#fff;--bc:rgba(255,255,255,.08);
--font-color:#fff;--mom-bg:#000;--md-cmt-bg:rgba(255,255,255,.03);
--btn-p:rgba(255,255,255,.1);--btn-pf:#999;--btn-s:#1c1c1e;--btn-sf:#888;
--bnav-c:#fff;--set-c:#fff;--app-bg-1:rgba(255,255,255,.06);--app-bg-2:#444;
--sys-tag-c:#fff;--sys-tag-bg:rgba(255,255,255,.08);
--wal-grad:linear-gradient(135deg,#1c1c1e,#111);--cmt-bg:rgba(255,255,255,.04)
}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#1a1a2e,#16213e,#0f3460)}
textarea,input{-webkit-user-select:text;user-select:text;font-family:inherit}
#phone{width:var(--pw);height:var(--ph);border-radius:var(--pr);position:relative;overflow:hidden;background:var(--bg);background-size:cover;background-position:center;box-shadow:0 0 0 3px #222,0 0 0 5px #444,0 40px 100px rgba(0,0,0,.7);transition:background .3s}
#phone.phone-fs{width:100vw!important;height:100vh!important;border-radius:0!important;box-shadow:none!important;position:fixed!important;top:0!important;left:0!important;z-index:9999!important}
#phone *::-webkit-scrollbar{display:none}
.sb{position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;z-index:200;pointer-events:none}
.sb.hidden{display:none}
.sb span{font-size:14px;font-weight:600;color:var(--sb-c);letter-spacing:-.3px}
.sb-r{display:flex;align-items:center;gap:5px}
.sb-r svg{fill:var(--sb-c);display:block}
.di{position:absolute;top:8px;left:50%;transform:translateX(-50%);height:34px;min-width:126px;background:#000;border-radius:50px;z-index:201;display:flex;align-items:center;justify-content:center;padding:0 14px;cursor:pointer;overflow:hidden;transition:all .5s cubic-bezier(.32,.72,.24,1)}
.di-cam{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#2a2a4a,#111);border:1.5px solid #333;position:absolute;left:16px;top:50%;transform:translateY(-50%);z-index:5;flex-shrink:0}
.di-cam::after{content:'';position:absolute;top:1.5px;left:2px;width:3px;height:3px;border-radius:50%;background:rgba(80,80,160,.4)}
.di.exp{width:calc(var(--pw) - 14px)!important;min-width:0;height:210px!important;border-radius:28px!important;top:6px!important}
.di-mini{display:flex;align-items:center;gap:6px;margin-left:18px;transition:opacity .1s}
.di.exp .di-mini{opacity:0;pointer-events:none;position:absolute}
.di-w{display:flex;align-items:center;gap:1.5px;height:10px}
.di-w i{width:2px;border-radius:1px;background:#444;height:3px;display:block}
.di.pl .di-w i{background:#fff}
.di.pl .di-w i:nth-child(1){animation:dw .42s ease-in-out infinite alternate}
.di.pl .di-w i:nth-child(2){animation:dw .58s ease-in-out infinite alternate .07s}
.di.pl .di-w i:nth-child(3){animation:dw .36s ease-in-out infinite alternate .14s}
.di.pl .di-w i:nth-child(4){animation:dw .64s ease-in-out infinite alternate .04s}
.di.pl .di-w i:nth-child(5){animation:dw .5s ease-in-out infinite alternate .11s}
@keyframes dw{0%{height:3px}100%{height:10px}}
.di-full{position:absolute;inset:0;padding:14px 16px;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .15s}
.di.exp .di-full{opacity:1;pointer-events:auto;transition:opacity .25s .2s}
.dif-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.dif-art{width:46px;height:46px;border-radius:13px;background:#1a1a1a;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center}
.dif-art img{width:100%;height:100%;object-fit:cover}
.dif-art svg{width:18px;height:18px;fill:#555}
.dif-spin{position:absolute;inset:-1px;border-radius:14px;border:2px solid transparent;border-top-color:rgba(255,255,255,.55);opacity:0}
.di.pl .dif-spin{animation:dsp 1.2s linear infinite;opacity:1}
@keyframes dsp{to{transform:rotate(360deg)}}
.dif-info{flex:1;min-width:0}
.dif-nm{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dif-ar{color:#666;font-size:11px;margin-top:1px}
.dif-ly{height:16px;overflow:hidden;margin:2px 0 4px;position:relative}
.dif-ly-inner{display:inline-block;white-space:nowrap;font-size:11px;color:#555;padding-left:100%}
.di.pl .dif-ly-inner{color:#aaa;animation:lscroll 10s linear infinite}
@keyframes lscroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.dif-vis{display:flex;align-items:center;gap:2px;height:20px;justify-content:center;margin-bottom:3px}
.dif-vis i{width:3px;border-radius:2px;background:#222;height:4px}
.di.pl .dif-vis i{background:#fff;opacity:.6}
.di.pl .dif-vis i:nth-child(odd){animation:dv .44s ease infinite alternate}
.di.pl .dif-vis i:nth-child(even){animation:dv .56s ease infinite alternate .1s}
@keyframes dv{0%{height:4px}100%{height:18px}}
.dif-pb{height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;margin-bottom:2px}
.dif-pf{height:100%;background:#fff;border-radius:2px;transition:width .5s linear;width:0%}
.dif-ts{display:flex;justify-content:space-between;font-size:9px;color:#555;margin-bottom:4px}
.dif-ct{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.dif-btn{background:none;border:none;color:#fff;cursor:pointer;padding:5px;border-radius:50%;transition:background .12s;display:flex;align-items:center;justify-content:center}
.dif-btn:active{background:rgba(255,255,255,.12)}
.dif-btn svg{width:20px;height:20px;fill:#fff;display:block}
.dif-spd{font-size:10px;color:#aaa;cursor:pointer;padding:3px 4px;font-weight:600}
.dif-fav svg{fill:#555;transition:fill .2s}
.dif-fav.on svg{fill:#ff2d55!important}
.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:10;overflow:hidden;background:var(--bg)}
.screen.active{display:flex}
.scr-s{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen-bg{position:absolute;inset:0;z-index:0;pointer-events:none;background-size:cover;background-position:center;opacity:0;filter:blur(20px);-webkit-filter:blur(20px)}
#scrHome{background:transparent}
#scrMom{background:var(--mom-bg)}
#scrMD{background:var(--mom-bg)}
.hc{position:relative;z-index:1;padding-top:44px;height:100%;overflow-y:auto}
.h-time{text-align:center;margin-top:24px;font-size:72px;font-weight:200;color:var(--text);letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums}
.h-date{text-align:center;font-size:14px;color:var(--text2);margin-top:5px}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 10px;padding:28px 18px 100px;margin-top:8px}
.ai{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.ab{width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;transition:transform .15s;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.ab.theme-icon{background:var(--app-bg-1)!important;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ab.theme-icon svg{fill:var(--app-bg-2)!important}
.ab.cust-icon{background-size:cover!important;background-position:center!important}
.ab.cust-icon svg{display:none}
.ab::after{content:'';position:absolute;inset:0;border-radius:15px;border:1px solid rgba(255,255,255,.18);pointer-events:none}
.ab:active{transform:scale(.78)}
.ab svg{width:26px;height:26px}
.al{font-size:10px;color:var(--text2);font-weight:500}
.bnav{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);height:56px;display:flex;align-items:center;justify-content:space-around;z-index:90;background:var(--nav-bg);backdrop-filter:var(--gb);-webkit-backdrop-filter:var(--gb);border-radius:32px;padding:0 6px;width:calc(100% - 32px);border:1px solid var(--sep);box-shadow:0 4px 20px rgba(0,0,0,.06)}
.bn{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;color:var(--bnav-c);opacity:.4;padding:6px 14px;border-radius:22px;transition:opacity .2s}
.bn.on{opacity:1}
.bn svg{width:21px;height:21px;fill:currentColor}
.bn span{font-size:9px;font-weight:500}
.hbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:46px;margin-top:44px;flex-shrink:0;position:relative;z-index:10}
.hbar-t{font-size:18px;font-weight:700;color:var(--text)}
.hbtn{width:34px;height:34px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--sep);transition:transform .12s;flex-shrink:0}
.hbtn:active{transform:scale(.83)}
.hbtn svg{width:16px;height:16px;fill:var(--text2);display:block}
.hbtn-bare{background:none!important;border:none!important;box-shadow:none!important}
.chat-hb{display:flex;align-items:center;padding:52px 10px 10px;flex-shrink:0;background:var(--nav-bg);backdrop-filter:var(--gb);-webkit-backdrop-filter:var(--gb);border-bottom:1px solid var(--sep);position:relative;z-index:50}
.chat-bk{display:flex;align-items:center;cursor:pointer;padding:5px;background:none;border:none;flex-shrink:0}
.chat-bk svg{width:22px;height:22px;fill:var(--text2)}
.chat-nm{flex:1;font-size:16px;font-weight:600;color:var(--text);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-r{display:flex;align-items:center;gap:4px;flex-shrink:0}
.chat-dt{padding:5px;cursor:pointer;background:none;border:none;flex-shrink:0}
.chat-dt svg{width:18px;height:18px;fill:var(--text2)}
.role-tog{display:flex;align-items:center;padding:4px 10px;border-radius:14px;background:var(--card);border:1px solid var(--sep);cursor:pointer;gap:4px;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;transition:all .2s}
.role-tog.char-mode{background:rgba(255,45,85,.12);border-color:rgba(255,45,85,.2);color:var(--pink)}
.cbody{flex:1;overflow-y:auto;padding:8px 10px 80px;display:flex;flex-direction:column;gap:2px;position:relative;background:var(--bg)}
.cbody.has-bg{background-size:cover!important;background-position:center!important}
.mr{display:flex;flex-direction:column;margin-bottom:4px}
.mr.u{align-items:flex-end}.mr.c{align-items:flex-start}.mr.s{align-items:center}
.mw{display:flex;align-items:flex-end;gap:5px;max-width:82%}
.mr.u .mw{flex-direction:row-reverse}
.mav{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card);display:flex;align-items:center;justify-content:center;border:1.5px solid var(--sep)}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:14px;height:14px;fill:var(--text3)}
.bub{padding:9px 13px;font-size:14px;line-height:1.5;word-break:break-word;cursor:pointer;transition:transform .1s;max-width:100%}
.bub:active{transform:scale(.97)}
.bs1 .mr.u .bub{background:var(--bu);border-radius:19px 19px 4px 19px;color:var(--font-color)}
.bs1 .mr.c .bub{background:var(--bc);border-radius:19px 19px 19px 4px}
.bs2 .mr.u .bub,.bs2 .mr.c .bub{border-radius:10px}
.bs2 .mr.u .bub{background:var(--bu);color:var(--font-color)}.bs2 .mr.c .bub{background:var(--bc)}
.bs3 .mr.u .bub,.bs3 .mr.c .bub{border-radius:24px;box-shadow:0 3px 12px rgba(0,0,0,.06)}
.bs3 .mr.u .bub{background:var(--bu);color:var(--font-color)}.bs3 .mr.c .bub{background:var(--bc)}
.bs4 .mr.u .bub{background:transparent!important;border:1.5px solid var(--bu);border-radius:19px 19px 4px 19px}
.bs4 .mr.c .bub{background:transparent!important;border:1.5px solid var(--bc);border-radius:19px 19px 19px 4px}
.bs5 .mr.u .bub,.bs5 .mr.c .bub{border-radius:100px;padding:8px 18px}
.bs5 .mr.u .bub{background:var(--bu);color:var(--font-color)}.bs5 .mr.c .bub{background:var(--bc)}
.bs6 .mr.u .bub{background:var(--bu);border-radius:6px;color:var(--font-color)}
.bs6 .mr.c .bub{background:var(--bc);border-radius:6px}
.mts{font-size:9px;color:var(--text3);margin-top:2px}
.mr.u .mts{text-align:right;padding-right:35px}
.mr.c .mts{text-align:left;padding-left:35px}
.sm-w{padding:2px 8px;text-align:center;max-width:92%}
.sm-i{background:var(--card);border-radius:10px;padding:4px 10px;border:1px solid var(--sep);font-size:11px;color:var(--text2);line-height:1.45;cursor:pointer}
.sm-tag{display:inline-block;font-size:8px;font-weight:800;padding:1px 6px;border-radius:3px;margin-bottom:2px;letter-spacing:.3px;background:var(--sys-tag-bg);color:var(--sys-tag-c)}
.rp-bub{padding:0!important;overflow:hidden;min-width:190px;cursor:pointer;position:relative}
.rp-top{padding:13px;display:flex;align-items:center;gap:10px}
.mr.u .rp-top{background:var(--bu)}.mr.c .rp-top{background:var(--bc)}
.rp-ico{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rp-ico svg{width:20px;height:20px;fill:#fff}
.rp-note{font-size:14px;font-weight:600;color:#fff}
.rp-amt{font-size:12px;color:rgba(255,255,255,.78);margin-top:1px}
.rp-bot{padding:7px 13px;font-size:10px;display:flex;align-items:center;justify-content:space-between}
.mr.u .rp-bot{background:var(--bu);filter:brightness(.82);color:rgba(255,255,255,.65)}
.mr.c .rp-bot{background:var(--bc);filter:brightness(.85);color:var(--text2)}
.vo-container{display:flex;flex-direction:column}
.vb{display:flex;align-items:center;gap:8px;min-width:90px;padding:10px 14px!important;cursor:pointer}
.vw{display:flex;align-items:center;gap:2.5px;height:18px}
.vw i{width:2.5px;border-radius:2px;background:currentColor;opacity:.6;display:block}
.vd{font-size:11px;opacity:.7;flex-shrink:0}
.vo-t2t{font-size:10px;color:var(--text3);cursor:pointer;margin-top:3px}
.vo-exp{font-size:12px;line-height:1.45;margin-top:4px;padding:6px 10px;background:var(--card);border-radius:10px;border:1px solid var(--sep);color:var(--text2);display:none;word-break:break-word;max-width:220px}
.vo-exp.on{display:block}
.ib{padding:3px!important;overflow:hidden;cursor:pointer;position:relative}
.ib img{width:165px;max-height:160px;object-fit:cover;border-radius:13px;display:block}
.skb{background:transparent!important;padding:2px!important;border:none!important;box-shadow:none!important}
.skb img{width:76px;height:76px;object-fit:contain}
.cib{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;gap:7px;padding:10px 12px 18px;background:var(--nav-bg);backdrop-filter:var(--gb);-webkit-backdrop-filter:var(--gb);border-top:1px solid var(--sep);z-index:40}
.cibtn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--sep);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .12s}
.cibtn:active{transform:scale(.83)}
.cibtn svg{width:17px;height:17px;fill:var(--text2);display:block}
.cibtn.send-btn{background:var(--btn-p);border-color:var(--sep)}
.cibtn.send-btn svg{fill:var(--btn-pf)}
.cibtn.send-btn.char-send{background:rgba(255,45,85,.12);border-color:rgba(255,45,85,.2)}
.cibtn.send-btn.char-send svg{fill:var(--pink)}
.cibtn.ai-btn{background:var(--btn-p);border-color:var(--sep)}
.cibtn.ai-btn svg{fill:var(--btn-pf)}
.cibtn.ld{animation:ld .9s infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.3}}
.ci-inp{flex:1;height:38px;border-radius:19px;border:1px solid var(--sep);background:var(--input-bg);padding:0 14px;font-size:13px;color:var(--text);outline:none}
.ci-inp::placeholder{color:var(--text3)}
.ft-tray{display:none;background:var(--nav-bg);backdrop-filter:var(--gb);border-top:1px solid var(--sep);padding:12px 20px 14px;position:absolute;bottom:0;left:0;right:0;z-index:39}
.ft-tray.on{display:block}
.ft-row{display:flex;justify-content:space-around}
.ft-i{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex:1}
.ft-b{width:60px;height:60px;border-radius:16px;background:var(--card);border:1px solid var(--sep);display:flex;align-items:center;justify-content:center;transition:transform .12s}
.ft-b:active{transform:scale(.87)}
.ft-b svg{width:26px;height:26px;fill:var(--text2);display:block}
.ft-i span{font-size:10px;color:var(--text3);font-weight:500}
.skp{display:none;position:absolute;bottom:0;left:0;right:0;height:165px;background:var(--nav-bg);backdrop-filter:var(--gb);border-top:1px solid var(--sep);z-index:38;padding:8px;overflow-y:auto}
.skp.on{display:block}
.skg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.ski{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;border-radius:10px}
.ski:active{background:var(--card)}
.ski img{width:46px;height:46px;object-fit:contain}
.ski span{font-size:8px;color:var(--text3);max-width:50px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mlist{padding:4px 14px 90px}
.mi{display:flex;align-items:center;gap:10px;padding:11px 10px;cursor:pointer;border-radius:16px;margin-bottom:5px;background:var(--glass);border:1px solid var(--sep)}
.mi:active{background:var(--card)}
.mia{width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--card);display:flex;align-items:center;justify-content:center;border:2px solid var(--sep)}
.mia img{width:100%;height:100%;object-fit:cover}
.mia svg{width:22px;height:22px;fill:var(--text3)}
.min{flex:1;min-width:0}
.mi-nm{font-size:15px;font-weight:600;color:var(--text)}
.mi-pr{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mi-t{font-size:11px;color:var(--text3);flex-shrink:0;align-self:flex-start;margin-top:2px}
.mb{width:100%;height:220px;position:relative;overflow:visible;background:linear-gradient(135deg,#667eea,#764ba2);flex-shrink:0}
.mb img.mb-bg{width:100%;height:100%;object-fit:cover;display:block}
.mb-gr{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,rgba(0,0,0,.4))}
.mb-bot{position:absolute;bottom:-24px;right:14px;display:flex;align-items:center;gap:10px}

// MSG ACTIONS: copy, edit, delete, refresh, branch
function showMA(ev,idx){ev.stopPropagation();var mp=$('map');var ch=gch(D.curChat);if(!ch)return;var msgs=getMsgs(ch);var m=msgs[idx];
var acts='<div class="ma-i" onclick="copyMsg('+idx+')">复制</div><div class="ma-i" onclick="editMsg('+idx+')">编辑</div>';
if(m.role==='char')acts+='<div class="ma-i a" onclick="refreshMsg('+idx+')">刷新</div>';
acts+='<div class="ma-i a" onclick="branchMsg('+idx+')">分支</div>';
acts+='<div class="ma-i d" onclick="delMsg('+idx+')">删除</div>';
mp.innerHTML=acts;
var r=ev.currentTarget.getBoundingClientRect(),pr=$('phone').getBoundingClientRect();var x=r.left-pr.left+r.width/2-75,y=r.top-pr.top-46;if(y<56)y=r.bottom-pr.top+6;x=Math.max(5,Math.min(x,pr.width-155));mp.style.left=x+'px';mp.style.top=y+'px';mp.classList.add('on')}
function copyMsg(idx){var ch=gch(D.curChat);if(!ch)return;$('map').classList.remove('on');var txt=getMsgs(ch)[idx].content||'';if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){toast('已复制')}).catch(function(){toast('已复制')});else toast('已复制')}
function editMsg(idx){var ch=gch(D.curChat);if(!ch)return;$('map').classList.remove('on');showBS('<div class="bs-hd"></div><div class="mt">编辑</div><div class="fg"><textarea class="fta" id="em-txt" rows="4">'+(getMsgs(ch)[idx].content||'')+'</textarea></div><button class="fbtn" onclick="doEditMsg('+idx+')">保存</button>')}
function doEditMsg(idx){var ch=gch(D.curChat);if(!ch)return;getMsgs(ch)[idx].content=$('em-txt').value;save();closeBS();renderBub()}
function delMsg(idx){var ch=gch(D.curChat);if(!ch)return;$('map').classList.remove('on');getMsgs(ch).splice(idx,1);save();renderBub();renderML()}
function editSysMsg(idx){var ch=gch(D.curChat);if(!ch)return;showBS('<div class="bs-hd"></div><div class="mt">系统消息</div><div class="fg"><textarea class="fta" id="esm-txt" rows="4">'+(getMsgs(ch)[idx].content||'')+'</textarea></div><button class="fbtn" onclick="getMsgs(gch(D.curChat))['+idx+'].content=$(\'esm-txt\').value;save();closeBS();renderBub()">保存</button><button class="fbtn r" style="margin-top:5px" onclick="delMsg('+idx+');closeBS()">删除</button>')}
function refreshMsg(idx){$('map').classList.remove('on');var ch=gch(D.curChat);if(!ch)return;var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}
var msgs=getMsgs(ch);
// Find the last user msg before this char msg
var lastUI=-1;for(var i=idx;i>=0;i--){if(msgs[i].role==='user'){lastUI=i;break}}
// Remove from lastUI+1 onward (this round's char msgs)
if(lastUI>=0)msgs.splice(lastUI+1);else msgs.splice(idx);
save();renderBub();
// Re-trigger AI
var btn=$('ai-btn');btn.classList.add('ld');callAPI(buildPr(ch),p).then(function(r){parseR(ch,r,function(){btn.classList.remove('ld')})}).catch(function(er){btn.classList.remove('ld');toast('错误: '+er.message)})}
function branchMsg(idx){$('map').classList.remove('on');var ch=gch(D.curChat);if(!ch)return;ensureArcs(ch);var arc=getCurArc(ch);var newMsgs=arc.msgs.slice(0,idx);var newArc={id:uid(),name:'分支 '+(ch.archives.length+1),msgs:JSON.parse(JSON.stringify(newMsgs)),memory:arc.memory,_lastSumAt:0};ch.archives.push(newArc);ch.curArc=newArc.id;save();renderBub();toast('已创建分支')}

// AI
function trigAI(){var ch=gch(D.curChat);if(!ch)return;var p=D.apis[D.aApi];if(!p||!p.url){toast('请先配置API');return}var btn=$('ai-btn');btn.classList.add('ld');callAPI(buildPr(ch),p).then(function(r){parseR(ch,r,function(){btn.classList.remove('ld')})}).catch(function(er){btn.classList.remove('ld');toast('错误: '+er.message)})}
function buildPr(ch){var sys='';var ordered=D.wbOrder.slice();var allKeys=['chatSys','chatFmt','charFmt','coupleP','rpFmt','rpRecvP','voFmt','imgFmt','stkP'];allKeys.forEach(function(k){if(ordered.indexOf(k)<0)ordered.push(k)});
var msgs=getMsgs(ch);
var hasUnrecvRP=msgs.some(function(m){return m.role==='user'&&m.type==='redpacket'&&!m.charRecv});
ordered.forEach(function(k){if(k==='sumP')return;if(k==='coupleP'&&!ch.coupleAv)return;if(k==='rpRecvP'&&!hasUnrecvRP)return;var v=D.wb[k]!=null?D.wb[k]:(WB_DEFAULTS[k]||'');if(v)sys+=v+'\n\n'});
if(D.stickers.length>0)sys+=D.stickers.map(function(s){return s.name}).join(', ')+'\n\n';
sys+='[角色设定]\n角色名：'+ch.name+'\n';if(ch.nick&&ch.nick!==ch.name)sys+='备注：'+ch.nick+'\n';sys+='人设：'+ch.persona+'\n\n';var mem=getMemory(ch);if(mem)sys+='[记忆摘要]\n'+mem+'\n\n';if(D.cust.syncT)sys+='当前时间：'+ft()+' '+fd()+'\n';
var out=[{role:'system',content:sys}];var recent=msgs.slice(-(ch.ctxL||20));
recent.forEach(function(m){if(m.role==='system')out.push({role:'system',content:m.content});else if(m.role==='user'){if(m.type==='image'&&m.src)out.push({role:'user',content:[{type:'text',text:m.content||'[图片]'},{type:'image_url',image_url:{url:m.src}}]});else out.push({role:'user',content:m.content||''})}else out.push({role:'assistant',content:m.content||''})});return out}
function callAPI(msgs,p){var base=normalizeURL(p.url);if(!base)return Promise.reject(new Error('请输入API地址'));var url=base;if(!/\/v1\/chat\/completions/i.test(url))url=url.replace(/\/v1\/?$/,'')+'/v1/chat/completions';var h={'Content-Type':'application/json'};if(p.key)h['Authorization']='Bearer '+p.key;return fetch(url,{method:'POST',headers:h,body:JSON.stringify({model:p.model||'gpt-4o-mini',messages:msgs,temperature:p.temp!=null?p.temp:.7,max_tokens:1400})}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('HTTP '+r.status)});return r.json()}).then(function(d){return d.choices&&d.choices[0]?d.choices[0].message.content||'':''})}
function parseR(ch,resp,cb){var parsed=[];try{var cl=resp.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();var s=cl.indexOf('['),en=cl.lastIndexOf(']');if(s>=0&&en>s)cl=cl.slice(s,en+1);var arr=JSON.parse(cl);if(!Array.isArray(arr))arr=[arr];arr.forEach(function(item){if(!item)return;if(item.type==='redpacket')parsed.push({role:'char',type:'redpacket',amount:String(item.amount||0),note:item.note||'',content:'[红包]',time:ft(),recv:false});else if(item.type==='voice')parsed.push({role:'char',type:'voice',content:item.content||'',dur:item.dur||'3\u2033',time:ft()});else if(item.type==='image')parsed.push({role:'char',type:'image',desc:item.desc||'',src:null,content:'[图片:'+item.desc+']',time:ft()});else if(item.type==='sticker'){var st=D.stickers.find(function(x){return x.name===item.name});parsed.push({role:'char',type:'sticker',url:st?st.url:'',content:'[sticker]',time:ft()})}else{var c=item.msg||item.message||item.content||item.text;if(typeof c==='string'&&c.trim())parsed.push({role:'char',type:'text',content:c.trim(),time:ft()})}})}catch(ex){if(resp.trim())parsed.push({role:'char',type:'text',content:resp.trim(),time:ft()})}if(!parsed.length)parsed.push({role:'char',type:'text',content:resp||'...',time:ft()});
var msgs=getMsgs(ch);msgs.forEach(function(m){if(m.role==='user'&&m.type==='redpacket'&&!m.charRecv){m.charRecv=true;msgs.push({role:'system',content:(ch.nick||ch.name)+' 已领取你的红包 \u00A5'+m.amount,time:ft()})}});
appendMsgAnim(ch,parsed,cb)}

// MEMORY
function checkAutoSum(ch){if(!ch.autoS)return;var arc=getCurArc(ch);var since=arc._lastSumAt||0;var newMsgs=arc.msgs.length-since;if(newMsgs>=(ch.sumI||20))doAutoSum(ch)}
function doAutoSum(ch){var p=D.apis[D.aApi];if(!p||!p.url)return;var arc=getCurArc(ch);var start=arc._lastSumAt||0;var end=arc.msgs.length;var toSum=arc.msgs.slice(start,end).filter(function(m){return m.role!=='system'}).map(function(m){return(m.role==='user'?'用户':(ch.nick||ch.name))+': '+(m.content||'')}).join('\n');if(!toSum)return;callAPI([{role:'system',content:D.wb.sumP||WB_DEFAULTS.sumP},{role:'user',content:toSum}],p).then(function(r){arc.memory=(arc.memory?arc.memory+'\n\n':'')+r.trim();arc._lastSumAt=end;save();toast('自动总结完成')}).catch(function(){})}
function manualSum(ch,from,to){var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}var arc=getCurArc(ch);var toSum=arc.msgs.slice(from,to).filter(function(m){return m.role!=='system'}).map(function(m){return(m.role==='user'?'用户':(ch.nick||ch.name))+': '+(m.content||'')}).join('\n');if(!toSum){toast('无内容');return}toast('总结中...');callAPI([{role:'system',content:D.wb.sumP||WB_DEFAULTS.sumP},{role:'user',content:toSum}],p).then(function(r){arc.memory=(arc.memory?arc.memory+'\n\n':'')+r.trim();save();toast('总结完成');openCFS()}).catch(function(){toast('失败')})}

var recent=D.wallet.txns.slice().reverse().slice(0,20);recent.forEach(function(t,i){var ri=D.wallet.txns.length-1-i;h+='<div class="wal-tx"><div class="wal-tx-x" onclick="D.wallet.txns.splice('+ri+',1);save();renderWallet()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="wal-tx-ic '+(t.type==='recv'?'in':'out')+'"><svg viewBox="0 0 24 24"><path d="'+(t.type==='recv'?'M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z':'M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z')+'"/></svg></div><div class="wal-tx-in"><div class="wal-tx-nm">'+(t.type==='recv'?t.from:t.to)+'</div><div class="wal-tx-sb">'+t.time+'</div></div><div class="wal-tx-am '+(t.type==='recv'?'in':'out')+'">'+(t.type==='recv'?'+':'-')+'\u00A5'+parseFloat(t.amount).toFixed(2)+'</div></div>'});el.innerHTML=h}
function togWalBal(){_walVis=!_walVis;renderWallet()}
function walDeposit(){var el=$('wal-bd');el.innerHTML='<div style="padding:20px 0"><div class="mt">充值</div><div class="fg"><input class="fi" id="dp-a" type="number" placeholder="金额"></div><button class="fbtn" onclick="doDeposit()">确认</button><button class="fbtn n" style="margin-top:5px" onclick="renderWallet()">取消</button></div>'}
function doDeposit(){var a=parseFloat($('dp-a')&&$('dp-a').value)||0;if(a<=0)return;D.wallet.balance+=a;D.wallet.balance=Math.round(D.wallet.balance*100)/100;D.wallet.txns.push({id:uid(),type:'recv',from:'充值',amount:a,note:'',time:ft()+' '+fd()});save();renderWallet();toast('充值 \u00A5'+a.toFixed(2))}

// MOMENTS
function fmtCmt(content){if(!content)return'';// "角色1 回复 @角色2：xxx" → all blue for reply prefix
var m=content.match(/^(回复\s*@[^：:]+[：:])\s*/);if(m){return'<span class="cm-blue">'+esc(m[1])+'</span> '+esc(content.slice(m[1].length))}return esc(content)}
function renderMom(){var el=$('mfeed');$('mb-un').textContent=D.user.name||'用户名';if(!D.moments.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">暂无动态</div>';return}var h='';D.moments.slice().reverse().forEach(function(m){
// Avatar: user=user avatar, char=char avatar
var isUser=m.author==='user';var ch=!isUser?gch(m.author):null;
var avSrc=isUser?D.user.avatar:(ch?ch.avatar:null);
var av=avSrc?'<img src="'+avSrc+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
h+='<div class="mitem"><div class="mitem-av">'+av+'</div><div class="mr2"><div class="m-au">'+m.authorName+'</div><div class="m-tx" onclick="openMD(\''+m.id+'\')">'+esc(m.content)+'</div>';
if(m.image)h+='<img class="m-img" src="'+m.image+'" onclick="openMD(\''+m.id+'\')">';
h+='<div class="m-meta"><div class="m-ts">'+(m.ts||'')+'</div><div class="m-dots" onclick="e(event);openMomMenu(\''+m.id+'\')"><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></div></div>';
var likes=m.likes||[];var uname=D.user.name||'我';var filled=likes.indexOf(uname)>=0;
h+='<div style="display:flex;align-items:center;gap:3px;padding:4px 0"><span onclick="e(event);togLike(\''+m.id+'\')" style="cursor:pointer;display:flex;align-items:center"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:'+(filled?'var(--red)':'var(--text3)')+'"><path d="'+(filled?'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z':'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3z')+'"/></svg></span>';
if(likes.length)h+='<span style="font-size:12px;color:var(--wb-blue);font-weight:500;cursor:pointer" onclick="e(event);togLike(\''+m.id+'\')">'+likes.join(', ')+'</span>';h+='</div>';
if(m.comments&&m.comments.length){h+='<div class="m-social">';m.comments.forEach(function(c,ci){h+='<div class="m-cmt" onclick="showCmtMenu(event,\''+m.id+'\','+ci+')"><b>'+c.name+'</b> '+fmtCmt(c.content)+'</div>'});h+='</div>'}
h+='</div></div>'});el.innerHTML=h}
function openMomMenu(mid){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;showBS('<div class="bs-hd"></div><div class="mt">操作</div><button class="fbtn n" onclick="closeBS();refreshC(\''+mid+'\')">刷新评论</button><button class="fbtn n" style="margin-top:4px" onclick="editMom(\''+mid+'\')">编辑</button><button class="fbtn r" style="margin-top:4px" onclick="delMom(\''+mid+'\')">删除</button>')}
function editMom(mid){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;showBS('<div class="bs-hd"></div><div class="mt">编辑动态</div><div class="fg"><textarea class="fta" id="em-mc" rows="4">'+m.content+'</textarea></div><button class="fbtn" onclick="var mm=D.moments.find(function(x){return x.id===\''+mid+'\'});mm.content=$(\'em-mc\').value;save();closeBS();renderMom()">保存</button>')}
function delMom(mid){D.moments=D.moments.filter(function(x){return x.id!==mid});save();closeBS();renderMom();toast('已删除')}
function showCmtMenu(ev,mid,ci){ev.stopPropagation();var m=D.moments.find(function(x){return x.id===mid});if(!m)return;var c=m.comments[ci];showBS('<div class="bs-hd"></div><div class="mt">评论操作</div><div style="padding:8px;font-size:13px;color:var(--text);line-height:1.5;border:1px solid var(--sep);border-radius:12px;background:var(--card);margin-bottom:10px"><b style="color:var(--wb-blue)">'+c.name+'</b> '+fmtCmt(c.content)+'</div><button class="fbtn n" onclick="copyCmt(\''+mid+'\','+ci+')">复制</button><button class="fbtn n" style="margin-top:3px" onclick="editCmt(\''+mid+'\','+ci+')">编辑</button><button class="fbtn r" style="margin-top:3px" onclick="delCmt(\''+mid+'\','+ci+')">删除</button>')}
function copyCmt(mid,ci){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;if(navigator.clipboard)navigator.clipboard.writeText(m.comments[ci].content);closeBS();toast('已复制')}
function editCmt(mid,ci){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;var c=m.comments[ci];showBS('<div class="bs-hd"></div><div class="mt">编辑评论</div><div class="fg"><div class="fl">作者</div><input class="fi" id="ec-nm" value="'+c.name+'"></div><div class="fg"><textarea class="fta" id="ec-ct" rows="3">'+c.content+'</textarea></div><button class="fbtn" onclick="saveCmtEdit(\''+mid+'\','+ci+')">保存</button>')}
function saveCmtEdit(mid,ci){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;m.comments[ci].name=$('ec-nm').value;m.comments[ci].content=$('ec-ct').value;save();closeBS();renderMom();if(D.curMom===mid)openMD(mid)}
function delCmt(mid,ci){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;m.comments.splice(ci,1);save();closeBS();renderMom();if(D.curMom===mid)openMD(mid)}
function togLike(mid){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;if(!m.likes)m.likes=[];var n=D.user.name||'我';var i=m.likes.indexOf(n);if(i>=0)m.likes.splice(i,1);else m.likes.push(n);save();renderMom();if(D.curMom===mid)openMD(mid)}
function openNewMom(){var co='';D.chars.forEach(function(c){co+='<span class="chip" onclick="createCM(\''+c.id+'\');closeBS()">'+(c.nick||c.name)+'</span>'});showBS('<div class="bs-hd"></div><div class="mt">发布朋友圈</div><div class="fg"><div style="display:flex;flex-wrap:wrap;gap:4px"><span class="chip on" onclick="closeBS();openUM()">我自己</span>'+co+'</div></div>')}
function openUM(){_timg=null;showBS('<div class="bs-hd"></div><div class="mt">发朋友圈</div><div class="fg"><textarea class="fta" id="um-c" rows="3" placeholder="说点什么..."></textarea></div><div class="fg"><div class="avup" style="width:72px;height:72px;border-radius:12px" onclick="upIS(this)"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div></div><button class="fbtn" onclick="postUM()">发布</button>')}
function postUM(){var c=$('um-c')&&$('um-c').value.trim();if(!c)return;var un=D.user.name||'我';var m={id:uid(),author:'user',authorName:un,authorAv:D.user.avatar,content:c,image:_timg,comments:[],likes:[],ts:ft()+' '+fd()};D.moments.push(m);var sys=(D.wb.momPostSys||WB_DEFAULTS.momPostSys).replace('{user}',un).replace('{content}',c);D.chars.forEach(function(ch){getMsgs(ch).push({role:'system',content:sys,time:ft()})});_timg=null;save();closeBS();renderMom();toast('已发布')}
function createCM(cid){var ch=gch(cid);if(!ch)return;toast('生成中...');var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}callAPI([{role:'system',content:(D.wb.momPost||WB_DEFAULTS.momPost)+'\n\n角色：'+ch.persona},{role:'user',content:'生成一条朋友圈'}],p).then(function(r){var c=r.trim();try{var j=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,'').trim());c=j.content||c}catch(x){}var m={id:uid(),author:cid,authorName:ch.nick||ch.name,authorAv:ch.avatar,content:c,comments:[],likes:[],ts:ft()+' '+fd()};D.moments.push(m);save();renderMom();toast('已发布')}).catch(function(){toast('失败')})}
function refreshC(mid){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}toast('刷新中...');var isUser=m.author==='user';
// REPLACE comments, not append. Don't send old comments.
if(isUser){if(!D.chars.length)return;var ci='';D.chars.forEach(function(c){ci+=c.name+'('+(c.nick||c.name)+'): '+c.persona.substring(0,120)+'\n'});var sysP=(D.wb.momReplyUser||WB_DEFAULTS.momReplyUser);if(D.cust.crossR)sysP+='\n\n'+(D.wb.crossRP||WB_DEFAULTS.crossRP);sysP+='\n\n角色设定('+D.chars.length+'个):\n'+ci+'\n朋友圈: '+m.content;callAPI([{role:'system',content:sysP},{role:'user',content:'所有'+D.chars.length+'个角色分别评论'}],p).then(function(r){m.comments=[];parseMomCmts(m,r);save();renderMom();toast('已更新');if(D.curMom===mid)openMD(mid)}).catch(function(){toast('失败')})}
else{var ch=gch(m.author);var sysP=(D.wb.momReplyChar||WB_DEFAULTS.momReplyChar)+'\n\n角色: '+(ch?ch.persona:'')+'\n\n朋友圈: '+m.content;callAPI([{role:'system',content:sysP},{role:'user',content:'生成评论'}],p).then(function(r){m.comments=[];parseMomCmts(m,r);save();renderMom();if(D.curMom===mid)openMD(mid);toast('已更新')}).catch(function(){toast('失败')})}}
function parseMomCmts(m,r){try{var arr=JSON.parse(r.replace(/```json?\n?/gi,'').replace(/```/g,'').trim());if(Array.isArray(arr))arr.forEach(function(a){if(a.name&&a.content)m.comments.push({name:a.name,content:a.content,time:ft()})})}catch(x){m.comments.push({name:'AI',content:r.substring(0,200),time:ft()})}}

// MOMENT DETAIL
var _rTo=null;
function openMD(id){D.curMom=id;var m=D.moments.find(function(x){return x.id===id});if(!m)return;_rTo=null;go('scrMD');
var isUser=m.author==='user';var ch=!isUser?gch(m.author):null;
var avSrc=isUser?D.user.avatar:(ch?ch.avatar:null);
var av=avSrc?'<img src="'+avSrc+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
var ph='<div class="md-post"><div style="display:flex;gap:10px"><div class="mitem-av" style="width:44px;height:44px">'+av+'</div><div style="flex:1"><div class="m-au">'+m.authorName+'</div><div style="font-size:14px;color:var(--text);line-height:1.55;margin-top:4px;word-break:break-word">'+esc(m.content)+'</div>';if(m.image)ph+='<img class="m-img" src="'+m.image+'" style="margin-top:6px">';ph+='<div style="font-size:11px;color:var(--text3);opacity:.5;margin-top:8px">'+m.ts+'</div></div></div>';
var likes=m.likes||[];var uname=D.user.name||'我';var filled=likes.indexOf(uname)>=0;
ph+='<div style="display:flex;align-items:center;gap:4px;padding:10px 0 4px 54px"><span onclick="togLike(\''+m.id+'\')" style="cursor:pointer;display:flex;align-items:center"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:'+(filled?'var(--red)':'var(--text3)')+'"><path d="'+(filled?'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z':'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3z')+'"/></svg></span>';if(likes.length)ph+='<span style="font-size:12px;color:var(--wb-blue);font-weight:500">'+likes.join(', ')+'</span>';ph+='</div></div>';$('md-post-area').innerHTML=ph;
var cmh='';if(m.comments&&m.comments.length){m.comments.forEach(function(c,ci){var mc=D.chars.find(function(x){return(x.nick||x.name)===c.name});cmh+='<div style="display:flex;gap:8px;margin-bottom:10px;align-items:flex-start"><div class="mitem-av" style="width:28px;height:28px;border-radius:4px;flex-shrink:0;cursor:pointer" onclick="setRT(\''+c.name.replace(/'/g,"\\'")+'\')">'+(mc&&mc.avatar?'<img src="'+mc.avatar+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>')+'</div><div style="flex:1"><div style="font-size:12px;color:var(--text);line-height:1.5;cursor:pointer" onclick="showCmtMenu(event,\''+m.id+'\','+ci+')"><b style="color:var(--wb-blue)">'+c.name+'</b> '+fmtCmt(c.content)+'</div><div style="font-size:9px;color:var(--text3);opacity:.4;margin-top:2px">'+(c.time||'')+'</div></div></div>'})}else cmh='<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">暂无评论</div>';$('md-cmts-area').innerHTML=cmh}
function setRT(n){_rTo=n;$('md-inp').placeholder='回复 '+n;$('md-inp').focus()}
function sendMC(){var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;var txt=$('md-inp').value.trim();if(!txt)return;if(!m.comments)m.comments=[];m.comments.push({name:D.user.name||'我',content:(_rTo?'回复 @'+_rTo+'：':'')+txt,time:ft()});$('md-inp').value='';_rTo=null;$('md-inp').placeholder='评论...';save();openMD(D.curMom);renderMom()}
function trigMomAI(){var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;refreshC(m.id)}

function showNotif(ch,prev){$('notif-nm').textContent=ch.nick||ch.name;$('notif-ms').textContent=prev.substring(0,50);$('notif-t').textContent=ft();$('notif-av').innerHTML=ch.avatar?'<img src="'+ch.avatar+'">':'';var n=$('notif');n._cid=ch.id;n.classList.add('on');clearTimeout(n._t);n._t=setTimeout(function(){n.classList.remove('on')},5000)}
function clickNotif(){var n=$('notif');n.classList.remove('on');if(n._cid)openChat(n._cid)}
function expAll(){save();var b=new Blob([localStorage.getItem('mp8')],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='phone.json';document.body.appendChild(a);a.click();document.body.removeChild(a);toast('已导出')}
function impAll(){upJSON(function(txt){try{JSON.parse(txt);localStorage.setItem('mp8',txt);toast('导入成功');setTimeout(function(){location.reload()},800)}catch(x){toast('失败')}})}
function showBS(h){$('bss').innerHTML=h;$('bso').classList.add('on')}
function closeBS(){$('bso').classList.remove('on');_tav=null;_timg=null}
function closeOV(id){$(id).classList.remove('on')}

init();
</script>
