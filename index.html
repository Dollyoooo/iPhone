<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小手机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
--pw:360px;--ph:640px;--pr:46px;
--accent:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
--bg:#f2f2f7;--bg2:#fff;--text:#000;--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.35);
--sep:rgba(0,0,0,.08);--glass:rgba(255,255,255,.82);--glass2:rgba(245,245,247,.92);
--gb:blur(30px);--nav-bg:rgba(255,255,255,.88);--card:rgba(0,0,0,.04);
--input-bg:rgba(0,0,0,.05);--sb-c:#000;--bu:rgba(0,122,255,1);--bc:rgba(0,0,0,.08);
--font-color:#fff;--mom-bg:#fff
}
.dark{
--bg:#0a0a14;--bg2:#1c1c1e;--text:#fff;--text2:rgba(255,255,255,.6);--text3:rgba(255,255,255,.4);
--sep:rgba(255,255,255,.12);--glass:rgba(40,40,50,.75);--glass2:rgba(20,20,30,.85);
--gb:blur(30px);--nav-bg:rgba(30,30,40,.85);--card:rgba(255,255,255,.06);
--input-bg:rgba(255,255,255,.08);--sb-c:#fff;--bc:rgba(255,255,255,.15);
--font-color:#fff;--mom-bg:#111
}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;
background:radial-gradient(ellipse at 30% 20%,#1a1a2e,#16213e,#0f3460)}
textarea,input{-webkit-user-select:text;user-select:text;font-family:inherit}
#phone{width:var(--pw);height:var(--ph);border-radius:var(--pr);
position:relative;overflow:hidden;background:var(--bg);
background-size:cover;background-position:center;
box-shadow:0 0 0 3px #222,0 0 0 5px #444,0 40px 100px rgba(0,0,0,.7);
transition:all .3s}
#phone.fs{width:100vw!important;height:100vh!important;border-radius:0!important;box-shadow:none!important;--pr:0px}
#phone *::-webkit-scrollbar{display:none}

.sb{position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;
justify-content:space-between;padding:14px 20px 0;z-index:200;pointer-events:none}
.sb span{font-size:14px;font-weight:600;color:var(--sb-c);letter-spacing:-.3px}
.sb-r{display:flex;align-items:center;gap:5px}
.sb-r svg{fill:var(--sb-c);display:block}

/* DYNAMIC ISLAND */
.di{position:absolute;top:8px;left:50%;transform:translateX(-50%);
height:32px;min-width:120px;background:#000;border-radius:50px;
z-index:201;display:flex;align-items:center;justify-content:center;
padding:0 14px;cursor:pointer;overflow:hidden;
transition:all .5s cubic-bezier(.32,.72,.24,1.02)}
.di-cam{width:8px;height:8px;border-radius:50%;background:#1a1a2a;border:1.5px solid #333;
position:absolute;left:16px;top:50%;transform:translateY(-50%);z-index:5;flex-shrink:0}
.di-cam::after{content:'';position:absolute;top:1px;left:1px;width:3px;height:3px;border-radius:50%;background:#2a2a4a}
.di.exp{width:calc(var(--pw) - 16px)!important;min-width:0;height:210px!important;
border-radius:28px!important;top:6px!important}
.di-mini{display:flex;align-items:center;gap:6px;margin-left:16px;transition:opacity .1s}
.di.exp .di-mini{opacity:0;pointer-events:none}
.di-w{display:flex;align-items:center;gap:1.5px;height:10px}
.di-w i{width:2px;border-radius:1px;background:#444;height:3px;display:block}
.di.pl .di-w i{background:#fff}
.di.pl .di-w i:nth-child(1){animation:dw .42s ease-in-out infinite alternate}
.di.pl .di-w i:nth-child(2){animation:dw .58s ease-in-out infinite alternate .07s}
.di.pl .di-w i:nth-child(3){animation:dw .36s ease-in-out infinite alternate .14s}
.di.pl .di-w i:nth-child(4){animation:dw .64s ease-in-out infinite alternate .04s}
.di.pl .di-w i:nth-child(5){animation:dw .5s ease-in-out infinite alternate .11s}
@keyframes dw{0%{height:3px}100%{height:10px}}
.di-full{position:absolute;inset:0;padding:14px 16px;display:flex;flex-direction:column;
opacity:0;pointer-events:none;transition:opacity .2s .18s}
.di.exp .di-full{opacity:1;pointer-events:auto}
.dif-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.dif-art{width:46px;height:46px;border-radius:13px;background:#1a1a1a;
overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;
display:flex;align-items:center;justify-content:center}
.dif-art img{width:100%;height:100%;object-fit:cover}
.dif-art svg{width:18px;height:18px;fill:#555}
.dif-spin{position:absolute;inset:-1px;border-radius:14px;
border:2px solid transparent;border-top-color:rgba(255,255,255,.55);opacity:0}
.di.pl .dif-spin{animation:dsp 1.2s linear infinite;opacity:1}
@keyframes dsp{to{transform:rotate(360deg)}}
.dif-info{flex:1;min-width:0}
.dif-nm{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dif-ar{color:#666;font-size:11px;margin-top:1px}
.dif-ly{height:16px;overflow:hidden;margin:2px 0 4px;position:relative}
.dif-ly-inner{display:inline-block;white-space:nowrap;font-size:11px;color:#555;padding-left:100%}
.di.pl .dif-ly-inner{color:#aaa;animation:lscroll 10s linear infinite}
@keyframes lscroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.dif-vis{display:flex;align-items:flex-end;gap:2px;height:20px;justify-content:center;margin-bottom:3px}
.dif-vis i{width:3px;border-radius:2px;background:#222;height:4px}
.di.pl .dif-vis i{background:#fff;opacity:.6}
.di.pl .dif-vis i:nth-child(1){animation:dv .44s ease infinite alternate}
.di.pl .dif-vis i:nth-child(2){animation:dv .6s ease infinite alternate .09s}
.di.pl .dif-vis i:nth-child(3){animation:dv .36s ease infinite alternate .18s}
.di.pl .dif-vis i:nth-child(4){animation:dv .52s ease infinite alternate .05s}
.di.pl .dif-vis i:nth-child(5){animation:dv .4s ease infinite alternate .13s}
.di.pl .dif-vis i:nth-child(6){animation:dv .56s ease infinite alternate .07s}
.di.pl .dif-vis i:nth-child(7){animation:dv .48s ease infinite alternate .15s}
.di.pl .dif-vis i:nth-child(8){animation:dv .42s ease infinite alternate .1s}
@keyframes dv{0%{height:4px}100%{height:18px}}
.dif-pb{height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;margin-bottom:2px}
.dif-pf{height:100%;background:#fff;border-radius:2px;transition:width .5s linear;width:0%}
.dif-ts{display:flex;justify-content:space-between;font-size:9px;color:#555;margin-bottom:4px}
.dif-ct{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.dif-btn{background:none;border:none;color:#fff;cursor:pointer;padding:5px;
border-radius:50%;transition:background .12s;display:flex;align-items:center;justify-content:center}
.dif-btn:active{background:rgba(255,255,255,.12)}
.dif-btn svg{width:20px;height:20px;fill:#fff;display:block}
.dif-btn.pl svg{width:26px;height:26px}
.dif-spd{font-size:10px;color:#aaa;cursor:pointer;padding:3px 8px;border-radius:8px;
background:rgba(255,255,255,.1);font-weight:600;transition:background .12s;white-space:nowrap}
.dif-spd:active{background:rgba(255,255,255,.2)}
.dif-fav{transition:fill .2s}
.dif-fav.on svg{fill:#ff2d55!important}

.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:10;overflow:hidden}
.screen.active{display:flex}
.scr-s{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen-bg{position:absolute;inset:0;z-index:0;pointer-events:none;
background-size:cover;background-position:center;filter:blur(20px);-webkit-filter:blur(20px);opacity:.35}

/* HOME */
.hc{position:relative;z-index:1;padding-top:44px;height:100%;overflow-y:auto}
.h-time{text-align:center;margin-top:24px;font-size:72px;font-weight:100;
color:var(--text);letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;
text-shadow:0 2px 20px rgba(0,0,0,.08)}
.h-date{text-align:center;font-size:14px;color:var(--text2);margin-top:5px}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 10px;padding:28px 18px 100px;margin-top:8px}
.ai{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.ab{width:54px;height:54px;border-radius:15px;display:flex;align-items:center;
justify-content:center;transition:transform .15s;position:relative;overflow:hidden;
box-shadow:0 4px 16px rgba(0,0,0,.15)}
.ab::after{content:'';position:absolute;inset:0;border-radius:15px;
border:1px solid rgba(255,255,255,.22);pointer-events:none}
.ab:active{transform:scale(.78)}
.ab svg{width:26px;height:26px}
.al{font-size:10px;color:var(--text2);font-weight:500}

.bnav{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
height:56px;display:flex;align-items:center;justify-content:space-around;
z-index:90;background:var(--nav-bg);backdrop-filter:var(--gb);-webkit-backdrop-filter:var(--gb);
border-radius:32px;padding:0 6px;width:calc(100% - 32px);
border:1px solid var(--sep);box-shadow:0 4px 24px rgba(0,0,0,.08)}
.bn{display:flex;flex-direction:column;align-items:center;gap:1px;
cursor:pointer;color:var(--text3);padding:6px 14px;border-radius:22px;transition:color .2s}
.bn.on{color:var(--accent)}
.bn svg{width:21px;height:21px;fill:currentColor}
.bn span{font-size:9px;font-weight:500}

.hbar{display:flex;align-items:center;justify-content:space-between;
padding:0 14px;height:46px;margin-top:44px;flex-shrink:0;position:relative;z-index:10}
.hbar-t{font-size:18px;font-weight:700;color:var(--text)}
.hbtn{width:34px;height:34px;border-radius:50%;
background:var(--card);display:flex;align-items:center;justify-content:center;
cursor:pointer;border:1px solid var(--sep);transition:transform .12s;flex-shrink:0}
.hbtn:active{transform:scale(.83)}
.hbtn svg{width:16px;height:16px;fill:var(--text2);display:block}

/* CHAT */
.chat-hb{display:flex;align-items:center;gap:6px;
padding:52px 10px 10px;flex-shrink:0;
background:var(--nav-bg);backdrop-filter:var(--gb);-webkit-backdrop-filter:var(--gb);
border-bottom:1px solid var(--sep);position:relative;z-index:50}
.chat-bk{display:flex;align-items:center;cursor:pointer;padding:5px;background:none;border:none;flex-shrink:0}
.chat-bk svg{width:22px;height:22px;fill:var(--text2)}
.chat-nm{flex:1;font-size:16px;font-weight:600;color:var(--text);text-align:center;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-dt{padding:5px;cursor:pointer;background:none;border:none;flex-shrink:0}
.chat-dt svg{width:18px;height:18px;fill:var(--text2)}
.role-tog{display:flex;align-items:center;padding:4px 10px;border-radius:14px;
background:var(--card);border:1px solid var(--sep);cursor:pointer;gap:4px;
font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;transition:all .2s}
.role-tog.char-mode{background:rgba(255,149,0,.2);border-color:rgba(255,149,0,.3);color:var(--orange)}
.role-tog svg{width:14px;height:14px;fill:currentColor}

.cbody{flex:1;overflow-y:auto;padding:8px 10px 80px;display:flex;flex-direction:column;gap:2px;
position:relative;background:var(--bg)}
.cbody.has-bg{background-size:cover!important;background-position:center!important}

.mr{display:flex;flex-direction:column;margin-bottom:4px}
.mr.u{align-items:flex-end}.mr.c{align-items:flex-start}.mr.s{align-items:center}
@keyframes mu{from{opacity:0;transform:translateX(24px) scale(.92)}to{opacity:1;transform:none}}
@keyframes mc{from{opacity:0;transform:translateX(-24px) scale(.92)}to{opacity:1;transform:none}}
@keyframes ms{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.mr.u.anim{animation:mu .3s cubic-bezier(.2,.8,.3,1) both}
.mr.c.anim{animation:mc .3s cubic-bezier(.2,.8,.3,1) both}
.mr.s.anim{animation:ms .22s ease both}
.mw{display:flex;align-items:flex-end;gap:5px;max-width:82%}
.mr.u .mw{flex-direction:row-reverse}
.mw.vo-w{align-items:flex-start}
.mav{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;
background:var(--card);display:flex;align-items:center;justify-content:center;
border:1.5px solid var(--sep)}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:14px;height:14px;fill:var(--text3)}
.bub{padding:9px 13px;font-size:14px;line-height:1.5;word-break:break-word;
cursor:pointer;transition:transform .1s;max-width:100%;color:var(--font-color)!important}
.bub:active{transform:scale(.97)}
.bs1 .mr.u .bub{background:var(--bu);border-radius:19px 19px 4px 19px}
.bs1 .mr.c .bub{background:var(--bc);border-radius:19px 19px 19px 4px}
.bs2 .mr.u .bub,.bs2 .mr.c .bub{border-radius:10px}
.bs2 .mr.u .bub{background:var(--bu)}.bs2 .mr.c .bub{background:var(--bc)}
.bs3 .mr.u .bub,.bs3 .mr.c .bub{border-radius:24px;box-shadow:0 3px 12px rgba(0,0,0,.1)}
.bs3 .mr.u .bub{background:var(--bu)}.bs3 .mr.c .bub{background:var(--bc)}
.bs4 .mr.u .bub{background:transparent!important;border:2px solid var(--bu);border-radius:19px 19px 4px 19px}
.bs4 .mr.c .bub{background:transparent!important;border:2px solid var(--bc);border-radius:19px 19px 19px 4px}
.bs5 .mr.u .bub,.bs5 .mr.c .bub{border-radius:100px;padding:8px 18px}
.bs5 .mr.u .bub{background:var(--bu)}.bs5 .mr.c .bub{background:var(--bc)}
.mts{font-size:9px;color:var(--text3);margin-top:2px}
.mr.u .mts{text-align:right;padding-right:35px}
.mr.c .mts{text-align:left;padding-left:35px}
.sm-w{padding:2px 8px;text-align:center;max-width:92%}
.sm-i{background:var(--card);border-radius:10px;padding:4px 10px;
border:1px solid var(--sep);font-size:11px;color:var(--text2);line-height:1.45;cursor:pointer}
.sm-tag{display:inline-block;font-size:8px;font-weight:800;padding:1px 6px;border-radius:3px;
margin-bottom:2px;letter-spacing:.3px;background:rgba(88,86,214,.15);color:rgba(88,86,214,.85)}

/* RED PACKET */
.rp-bub{padding:0!important;overflow:hidden;min-width:190px;cursor:pointer;position:relative}
.rp-top{padding:13px;display:flex;align-items:center;gap:10px}
.mr.u .rp-top{background:var(--bu)}.mr.c .rp-top{background:var(--bc)}
.rp-ico{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);
display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rp-ico svg{width:20px;height:20px;fill:#fff}
.rp-note{font-size:14px;font-weight:600;color:#fff}
.rp-amt{font-size:12px;color:rgba(255,255,255,.78);margin-top:1px}
.rp-bot{padding:7px 13px;font-size:10px;display:flex;align-items:center;justify-content:space-between}
.mr.u .rp-bot{background:var(--bu);filter:brightness(.82);color:rgba(255,255,255,.65)}
.mr.c .rp-bot{background:var(--bc);filter:brightness(.85);color:rgba(255,255,255,.6)}
.rp-recv{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.rp-recv svg{width:28px;height:28px;fill:#fff}.rp-recv-l{color:#fff;font-size:12px;font-weight:600}

/* VOICE */
.vo-container{display:flex;flex-direction:column}
.vb{display:flex;align-items:center;gap:8px;min-width:90px;padding:10px 14px!important;cursor:pointer}
.vw{display:flex;align-items:center;gap:2.5px;height:18px}
.vw i{width:2.5px;border-radius:2px;background:currentColor;opacity:.6;display:block}
.vd{font-size:11px;opacity:.7;flex-shrink:0}
.vo-t2t{font-size:10px;color:var(--text3);cursor:pointer;margin-top:3px}
.vo-t2t:hover{color:var(--accent)}
.vo-exp{font-size:12px;line-height:1.45;margin-top:4px;padding:6px 10px;
background:var(--card);border-radius:10px;border:1px solid var(--sep);
color:var(--text2);display:none;word-break:break-word;max-width:220px}
.vo-exp.on{display:block;animation:ms .2s ease both}

/* IMAGE */
.ib{padding:3px!important;overflow:hidden;cursor:pointer;position:relative}
.ib img{width:165px;max-height:160px;object-fit:cover;border-radius:13px;display:block}
.ib-ov{position:absolute;inset:3px;background:rgba(0,0,0,.7);border-radius:13px;
display:none;align-items:center;justify-content:center;padding:10px;
color:#fff;font-size:11px;text-align:center;line-height:1.4;backdrop-filter:blur(6px)}
.ib.sd .ib-ov{display:flex}
.ib-ph{width:165px;height:100px;background:var(--card);border-radius:13px;
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px}
.ib-ph svg{width:22px;height:22px;fill:var(--text3)}
.ib-ph span{font-size:10px;color:var(--text3)}
.skb{background:transparent!important;padding:2px!important;border:none!important;box-shadow:none!important}
.skb img{width:76px;height:76px;object-fit:contain}

.cib{position:absolute;bottom:0;left:0;right:0;
display:flex;align-items:center;gap:7px;padding:10px 12px 18px;
background:var(--nav-bg);backdrop-filter:var(--gb);-webkit-backdrop-filter:var(--gb);
border-top:1px solid var(--sep);z-index:40}
.cibtn{width:38px;height:38px;border-radius:50%;
background:var(--card);border:1px solid var(--sep);
display:flex;align-items:center;justify-content:center;
cursor:pointer;flex-shrink:0;transition:transform .12s}
.cibtn:active{transform:scale(.83)}
.cibtn svg{width:17px;height:17px;fill:var(--text2);display:block}
.cibtn.send-btn{background:rgba(0,122,255,.65);border-color:rgba(0,122,255,.3)}
.cibtn.send-btn svg{fill:#fff}
.cibtn.send-btn.char-send{background:rgba(255,149,0,.65);border-color:rgba(255,149,0,.3)}
.cibtn.ai-btn{background:rgba(52,199,89,.65);border-color:rgba(52,199,89,.3)}
.cibtn.ai-btn svg{fill:#fff}
.cibtn.ld{animation:ld .9s infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.3}}
.ci-inp{flex:1;height:38px;border-radius:19px;border:1px solid var(--sep);
background:var(--input-bg);padding:0 14px;font-size:13px;color:var(--text);outline:none}
.ci-inp::placeholder{color:var(--text3)}

.ft-tray{display:none;background:var(--nav-bg);backdrop-filter:var(--gb);
border-top:1px solid var(--sep);padding:12px 20px 14px;
position:absolute;bottom:0;left:0;right:0;z-index:39}
.ft-tray.on{display:block}
.ft-row{display:flex;justify-content:space-around}
.ft-i{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex:1}
.ft-b{width:60px;height:60px;border-radius:16px;background:var(--card);border:1px solid var(--sep);
display:flex;align-items:center;justify-content:center;transition:transform .12s}
.ft-b:active{transform:scale(.87)}
.ft-b svg{width:26px;height:26px;fill:var(--text2);display:block}
.ft-i span{font-size:10px;color:var(--text3);font-weight:500}
.skp{display:none;position:absolute;bottom:0;left:0;right:0;height:165px;
background:var(--nav-bg);backdrop-filter:var(--gb);
border-top:1px solid var(--sep);z-index:38;padding:8px;overflow-y:auto}
.skp.on{display:block}
.skg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.ski{display:flex;flex-direction:column;align-items:center;gap:2px;
cursor:pointer;padding:4px;border-radius:10px;transition:background .12s}
.ski:active{background:var(--card)}
.ski img{width:46px;height:46px;object-fit:contain}
.ski span{font-size:8px;color:var(--text3);max-width:50px;text-align:center;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MSG LIST */
.mlist{padding:4px 14px 90px}
.mi{display:flex;align-items:center;gap:10px;padding:11px 10px;cursor:pointer;
border-radius:16px;transition:background .15s;margin-bottom:5px;
background:var(--glass);border:1px solid var(--sep)}
.mi:active{background:var(--card)}
.mia{width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;
background:var(--card);display:flex;align-items:center;justify-content:center;
border:2px solid var(--sep)}
.mia img{width:100%;height:100%;object-fit:cover}
.mia svg{width:22px;height:22px;fill:var(--text3)}
.min{flex:1;min-width:0}

function ft(d){d=d||bjt();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fd(d){d=d||bjt();return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function fmtS(s){s=s||0;return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}
function hexA(hex,a){try{var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+(a!=null?a:1)+')'}catch(x){return hex}}
function save(){try{localStorage.setItem('mp7',JSON.stringify(D))}catch(x){}}
function load(){try{var s=localStorage.getItem('mp7');if(!s)return;var p=JSON.parse(s);function dm(t,s){Object.keys(s).forEach(function(k){if(s[k]!==null&&typeof s[k]==='object'&&!Array.isArray(s[k])&&typeof t[k]==='object'&&t[k]!==null&&!Array.isArray(t[k])){dm(t[k],s[k])}else if(s[k]!==undefined){t[k]=s[k]}})}dm(D,p)}catch(x){}}
function toast(m,dur){var t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on')},dur||2400)}
load();

function buildPr(ch){
var sys='';
var ordered=D.wbOrder.slice();
var allKeys=['chatSys','chatFmt','charFmt','coupleP','rpFmt','rpRecvP','voFmt','imgFmt','stkP'];
allKeys.forEach(function(k){if(ordered.indexOf(k)<0)ordered.push(k)});
// Check for unreceived red packets
var hasUnrecvRP=ch.msgs.some(function(m){return m.role==='user'&&m.type==='redpacket'&&!m.charRecv});
ordered.forEach(function(k){
if(k==='sumP')return;
if(!D.cust.enRP&&(k==='rpFmt'||k==='rpRecvP'))return;
if(!D.cust.enVo&&k==='voFmt')return;
if(!D.cust.enImg&&k==='imgFmt')return;
if(!D.cust.enStk&&k==='stkP')return;
if(k==='coupleP'&&!ch.coupleAv)return;
if(k==='rpRecvP'&&!hasUnrecvRP)return;
var v=D.wb[k];if(v==null)v=WB_DEFAULTS[k]||'';
if(v)sys+=v+'\n\n';
});
if(D.cust.enStk){
if(D.stickers.length>0)sys+=D.stickers.map(function(s){return s.name}).join(', ')+'\n\n';
else sys+='[当前无可用表情包，禁止发送sticker]\n\n';
}
sys+='[角色设定]\n角色名：'+ch.name+'\n';
if(ch.nick&&ch.nick!==ch.name)sys+='备注：'+ch.nick+'\n';
sys+='人设：'+ch.persona+'\n\n';
if(ch.memory)sys+='[记忆摘要]\n'+ch.memory+'\n\n';
if(D.cust.syncT)sys+='当前时间：'+ft()+' '+fd()+'\n';
var msgs=[{role:'system',content:sys}];
var recent=ch.msgs.slice(-(ch.ctxL||20));
recent.forEach(function(m){
if(m.role==='system')msgs.push({role:'system',content:m.content});
else if(m.role==='user'){
// Multimodal image support
if(m.type==='image'&&m.src){
msgs.push({role:'user',content:[{type:'text',text:m.content||'[图片]'},{type:'image_url',image_url:{url:m.src}}]});
}else{msgs.push({role:'user',content:m.content||('['+m.type+']')})}
}else msgs.push({role:'assistant',content:m.content||('['+m.type+']')});
});
return msgs;
}

function callAPI(msgs,p){
var url=p.url.replace(/\/+$/,'')+'/v1/chat/completions';
var h={'Content-Type':'application/json'};if(p.key)h['Authorization']='Bearer '+p.key;
return fetch(url,{method:'POST',headers:h,body:JSON.stringify({model:p.model||'gpt-4o-mini',messages:msgs,temperature:p.temp!=null?p.temp:.7,max_tokens:1400})})
.then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('HTTP '+r.status)});return r.json()})
.then(function(d){return d.choices&&d.choices[0]?d.choices[0].message.content||'':''});
}

function parseR(ch,resp,cb){
var parsed=[];
try{var cl=resp.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
var s=cl.indexOf('['),en=cl.lastIndexOf(']');if(s>=0&&en>s)cl=cl.slice(s,en+1);
var arr=JSON.parse(cl);if(!Array.isArray(arr))arr=[arr];
arr.forEach(function(item){if(!item)return;
if(item.type==='redpacket')parsed.push({role:'char',type:'redpacket',amount:String(item.amount||0),note:item.note||'恭喜发财',content:'[红包:'+item.amount+']',time:ft(),recv:false});
else if(item.type==='voice'){var dur=item.dur||Math.max(1,Math.ceil((item.content||'').length/4))+'\u2033';parsed.push({role:'char',type:'voice',content:item.content||'',dur:dur,time:ft()})}
else if(item.type==='image')parsed.push({role:'char',type:'image',desc:item.desc||'',src:null,content:'[图片:'+item.desc+']',time:ft()});
else if(item.type==='sticker'){var st=D.stickers.find(function(x){return x.name===item.name});parsed.push({role:'char',type:'sticker',url:st?st.url:'',content:'[sticker:'+(item.name||'')+']',time:ft()})}
else{var c=item.msg||item.message||item.content||item.text;if(typeof c==='string'&&c.trim())parsed.push({role:'char',type:'text',content:c.trim(),time:ft()})}
});
}catch(ex){if(resp.trim())parsed.push({role:'char',type:'text',content:resp.trim(),time:ft()})}
if(!parsed.length)parsed.push({role:'char',type:'text',content:resp||'...',time:ft()});
// Mark user red packets as received + add system msg
ch.msgs.forEach(function(m){if(m.role==='user'&&m.type==='redpacket'&&!m.charRecv){
m.charRecv=true;
ch.msgs.push({role:'system',content:(ch.nick||ch.name)+' 已领取你的红包 \u00A5'+m.amount,time:ft()});
}});
appendMsgAnimated(ch,parsed,function(){if(ch.autoS&&ch.msgs.length>0&&ch.msgs.length%ch.sumI===0)autoSum(ch);if(cb)cb()});
}

function refreshC(mid){
var m=D.moments.find(function(x){return x.id===mid});if(!m)return;
var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}toast('刷新中...');
var isUserPost=m.author==='user';
var ec=m.comments?m.comments.map(function(c){return c.name+': '+c.content}).join('\n'):'';

if(isUserPost){
// User post: ALL characters must comment
if(!D.chars.length){toast('请先创建角色');return}
var ci='';D.chars.forEach(function(c){
var info=c.name+'（'+(c.nick||c.name)+'）：'+c.persona.substring(0,120);
if(c.memory)info+='\n记忆：'+c.memory.substring(0,80);
ci+=info+'\n\n';
});
var sysP=D.wb.momReplyUser||WB_DEFAULTS.momReplyUser;
if(D.cust.crossR)sysP+='\n\n'+(D.wb.crossRP||WB_DEFAULTS.crossRP);
sysP+='\n\n各角色设定（共'+D.chars.length+'个角色，必须返回'+D.chars.length+'条评论）：\n'+ci;
sysP+='\n朋友圈内容：'+m.content;

callAPI([{role:'system',content:sysP},{role:'user',content:'请让所有'+D.chars.length+'个角色分别评论，每个角色必须评论一条'}],p)
.then(function(r){parseMomComments(m,r);save();renderMom();toast('评论已更新');
// Send comment notification to each char
var cmtSys=(D.wb.momCmtSys||WB_DEFAULTS.momCmtSys).replace('{title}',m.content.substring(0,20));
var newCmts=m.comments.slice(-D.chars.length).map(function(c){return c.name+': '+c.content}).join('\n');
cmtSys=cmtSys.replace('{comments}',newCmts);
D.chars.forEach(function(ch){ch.msgs.push({role:'system',content:cmtSys,time:ft()})});save()
}).catch(function(er){toast('失败: '+er.message)});
} else {
// Character post: generate social circle NPCs
var ch=gch(m.author);
var charInfo=ch?(ch.name+'：'+ch.persona):'';

sysP+='\n\n角色设定：\n'+charInfo+'\n\n朋友圈内容：'+m.content;

.then(function(r){parseMomComments(m,r);save();renderMom();toast('评论已更新')})
.catch(function(er){toast('失败: '+er.message)});
}

}catch(x){m.comments.push({name:'AI',content:r.substring(0,200),time:ft()})}}

function sendMC(){var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;var txt=$('md-inp').value.trim();if(!txt)return;if(!m.comments)m.comments=[];m.comments.push({name:D.user.name||'我',content:(_rTo?'回复 @'+_rTo+'\uFF1A':'')+txt,time:ft()});$('md-inp').value='';_rTo=null;$('md-inp').placeholder='评论...';save();openMD(D.curMom);renderMom()}
function delMomCmt(mid,idx){var m=D.moments.find(function(x){return x.id===mid});if(!m)return;m.comments.splice(idx,1);save();openMD(mid)}
function trigMomAI(){var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}toast('AI回复中...');refreshC(m.id)}

function showNotif(ch,preview){$('notif-nm').textContent=ch.nick||ch.name;$('notif-ms').textContent=preview.substring(0,50);$('notif-t').textContent=ft();$('notif-av').innerHTML=ch.avatar?'<img src="'+ch.avatar+'">':'';var n=$('notif');n._cid=ch.id;n.classList.add('on');clearTimeout(n._t);n._t=setTimeout(function(){n.classList.remove('on')},5000)}
function clickNotif(){var n=$('notif');n.classList.remove('on');if(n._cid)openChat(n._cid)}

var _atm={};
function startAutoChk(){setInterval(chkAuto,60000)}
function chkAuto(){if(document.hidden)return;var now=Date.now();D.chars.forEach(function(ch){if(!ch.autoMsg||!ch.autoMsgMin)return;var lastAny=null;for(var i=ch.msgs.length-1;i>=0;i--){if(ch.msgs[i].role==='user'||ch.msgs[i].role==='char'){lastAny=ch.msgs[i];break}}if(!lastAny||lastAny.role!=='user')return;var key='at_'+ch.id;if(!_atm[key])_atm[key]=now;if(now-_atm[key]<ch.autoMsgMin*60000)return;_atm[key]=now;var p=D.apis[D.aApi];if(!p||!p.url)return;var msgs=buildPr(ch);msgs.push({role:'system',content:'用户已有一段时间未回复，请以角色身份主动发起话题或表达关心，1条消息即可。'});callAPI(msgs,p).then(function(r){parseR(ch,r,function(){save();if(D.curChat===ch.id)renderBub();else showNotif(ch,r.replace(/[\[\]{}"]/g,'').substring(0,60));renderML()})}).catch(function(){})})}

function showBS(h){$('bss').innerHTML=h;$('bso').classList.add('on')}
function closeBS(){$('bso').classList.remove('on');_tav=null;_timg=null;_tuav=null}
function closeFS(id){$(id).classList.remove('on')}
init();
</script>
</body>
</html>
