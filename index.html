<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小手机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
--bg:#f2f2f7;--bg2:#fff;--text:#000;--text2:#3c3c43;--text3:#8e8e93;
--card:rgba(255,255,255,.78);--card2:rgba(242,242,247,.9);
--nav:rgba(249,249,249,.94);--sep:rgba(60,60,67,.08);
--accent:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
--input-bg:rgba(118,118,128,.12);--overlay:rgba(0,0,0,.4);
--bubble-user:#007aff;--bubble-char:rgba(233,233,235,.95);--bubble-char-text:#000;
--glass:rgba(255,255,255,.72);--feat-bg:rgba(142,142,147,.18);--feat-fg:#8e8e93;
--sb-color:#000;--pw:340px;--ph:580px;--pr:46px
}
.dark{
--bg:#000;--bg2:#1c1c1e;--text:#fff;--text2:rgba(235,235,245,.6);--text3:#636366;
--card:rgba(44,44,46,.78);--card2:rgba(38,38,40,.9);
--nav:rgba(28,28,30,.96);--sep:rgba(84,84,88,.2);
--bubble-char:rgba(58,58,60,.9);--bubble-char-text:#fff;
--input-bg:rgba(118,118,128,.24);--overlay:rgba(0,0,0,.6);
--glass:rgba(44,44,46,.72);--feat-bg:rgba(255,255,255,.12);--feat-fg:#fff;
--sb-color:#fff
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif}
body{display:flex;justify-content:center;align-items:center;min-height:100vh}
#phone{width:var(--pw);height:var(--ph);border-radius:var(--pr);position:relative;overflow:hidden;background:var(--bg);box-shadow:0 0 0 2px #222,0 24px 80px rgba(0,0,0,.55);transition:background .35s,width .3s,height .3s,border-radius .3s}
#phone *::-webkit-scrollbar{display:none}
textarea,input{-webkit-user-select:text;user-select:text;font-family:inherit}

.sb{position:absolute;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 0;z-index:100;font-size:13px;font-weight:600;color:var(--sb-color);pointer-events:none}
.sb-r{display:flex;align-items:center;gap:5px}
.sb-r svg{fill:var(--sb-color)}

.di{position:absolute;top:8px;left:50%;transform:translateX(-50%);height:24px;width:96px;background:#000;border-radius:50px;z-index:200;display:flex;align-items:center;justify-content:center;padding:0 10px;cursor:pointer;transition:all .5s cubic-bezier(.32,.72,.24,1.02);overflow:hidden}
.di.expand{width:calc(var(--pw) - 20px);height:240px;border-radius:28px;top:6px}
.di .di-mini{display:flex;align-items:center;gap:5px;transition:opacity .15s}
.di.expand .di-mini{opacity:0;pointer-events:none;position:absolute}
.di-wave{display:flex;align-items:center;gap:2px;height:12px}
.di-wave i{width:2px;background:#444;border-radius:1px;display:block;transition:all .3s}
.di.playing .di-wave i{background:#fff}
.di.playing .di-wave i:nth-child(1){animation:dw .45s ease-in-out infinite alternate;height:3px}
.di.playing .di-wave i:nth-child(2){animation:dw .55s ease-in-out infinite alternate .08s;height:6px}
.di.playing .di-wave i:nth-child(3){animation:dw .4s ease-in-out infinite alternate .16s;height:10px}
.di.playing .di-wave i:nth-child(4){animation:dw .6s ease-in-out infinite alternate .06s;height:5px}
.di.playing .di-wave i:nth-child(5){animation:dw .5s ease-in-out infinite alternate .12s;height:8px}
@keyframes dw{0%{height:3px}100%{height:12px}}
.di-full{position:absolute;inset:0;padding:14px;display:flex;flex-direction:column;opacity:0;transition:opacity .3s .15s;pointer-events:none}
.di.expand .di-full{opacity:1;pointer-events:auto}
.dif-top{display:flex;align-items:center;gap:10px}
.dif-art{width:48px;height:48px;border-radius:14px;background:#1a1a1a;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center}
.dif-art img{width:100%;height:100%;object-fit:cover}
.dif-art svg{width:20px;height:20px;fill:#444}
.dif-spin{position:absolute;inset:-2px;border-radius:16px;border:2px solid transparent;border-top-color:#fff;opacity:0}
.di.playing .dif-spin{animation:ds 1.2s linear infinite;opacity:.6}
@keyframes ds{to{transform:rotate(360deg)}}
.dif-info{flex:1;min-width:0}
.dif-name{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dif-artist{color:#666;font-size:11px;margin-top:1px}
.dif-vis{display:flex;align-items:flex-end;gap:2.5px;height:22px;margin-top:6px;justify-content:center}
.dif-vis i{width:3px;border-radius:2px;background:#fff;opacity:.4;height:4px}
.di.playing .dif-vis i{opacity:.8}
.di.playing .dif-vis i:nth-child(1){animation:dv .4s ease infinite alternate}
.di.playing .dif-vis i:nth-child(2){animation:dv .55s ease infinite alternate .05s}
.di.playing .dif-vis i:nth-child(3){animation:dv .35s ease infinite alternate .1s}
.di.playing .dif-vis i:nth-child(4){animation:dv .6s ease infinite alternate .03s}
.di.playing .dif-vis i:nth-child(5){animation:dv .45s ease infinite alternate .15s}
.di.playing .dif-vis i:nth-child(6){animation:dv .5s ease infinite alternate .08s}
.di.playing .dif-vis i:nth-child(7){animation:dv .38s ease infinite alternate .12s}
.di.playing .dif-vis i:nth-child(8){animation:dv .52s ease infinite alternate .06s}
.di.playing .dif-vis i:nth-child(9){animation:dv .42s ease infinite alternate .14s}
.di.playing .dif-vis i:nth-child(10){animation:dv .58s ease infinite alternate .02s}
.di.playing .dif-vis i:nth-child(11){animation:dv .44s ease infinite alternate .09s}
.di.playing .dif-vis i:nth-child(12){animation:dv .48s ease infinite alternate .11s}
@keyframes dv{0%{height:4px}100%{height:20px}}
.dif-pbar{height:3px;background:#333;border-radius:2px;cursor:pointer;position:relative;margin-top:6px}
.dif-pfill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .3s}
.dif-times{display:flex;justify-content:space-between;font-size:9px;color:#555;margin-top:2px}
.dif-lyric{color:#aaa;font-size:12px;text-align:center;margin-top:6px;height:18px;overflow:hidden;transition:color .3s}
.di.playing .dif-lyric{color:#fff}
.dif-ctrls{display:flex;align-items:center;justify-content:center;gap:30px;margin-top:6px}
.dif-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px}
.dif-btn svg{width:18px;height:18px;fill:#fff}
.dif-btn.play svg{width:30px;height:30px}

.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:10;background:var(--bg);transition:opacity .2s}
.screen.active{display:flex;animation:si .25s ease}
@keyframes si{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.scr-c{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

.home-wall{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;border-radius:var(--pr)}
.home-c{position:relative;z-index:1;padding-top:48px}
.home-time{text-align:center;margin-top:28px;font-size:58px;font-weight:200;color:var(--text);letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums}
.home-date{text-align:center;font-size:14px;color:var(--text2);margin-top:5px;font-weight:500}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 10px;padding:30px 22px 90px;margin-top:12px}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.app-box{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:transform .15s;position:relative;overflow:hidden}
.app-box::before{content:'';position:absolute;inset:0;border-radius:14px;border:1px solid rgba(255,255,255,.15)}
.app-box:active{transform:scale(.75)}
.app-box svg{width:24px;height:24px}
.app-label{font-size:10px;color:var(--text);font-weight:500}

.bnav{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);height:52px;display:flex;align-items:center;justify-content:space-around;z-index:90;background:var(--nav);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:26px;padding:0 4px;width:calc(100% - 36px);border:1px solid var(--sep);box-shadow:0 4px 20px rgba(0,0,0,.06)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;color:var(--text3);padding:5px 12px;border-radius:18px;transition:all .2s}
.bnav-item.act{color:var(--accent)}
.bnav-item svg{width:20px;height:20px;fill:currentColor}
.bnav-item span{font-size:9px;font-weight:500}

.hbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:40px;margin-top:44px;flex-shrink:0}
.hbar-t{font-size:17px;font-weight:700;color:var(--text)}
.hbar-btn{width:30px;height:30px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .12s}
.hbar-btn:active{transform:scale(.85)}
.hbar-btn svg{width:14px;height:14px;fill:var(--text3)}

.mlist{padding:4px 14px 90px}
.mitem{display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;border-radius:14px;transition:background .15s;margin-bottom:1px}
.mitem:active{background:var(--input-bg)}
.mav{width:46px;height:46px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--card2);display:flex;align-items:center;justify-content:center}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:22px;height:22px;fill:var(--text3)}
.minfo{flex:1;min-width:0}
.mn{font-size:15px;font-weight:600;color:var(--text)}
.mp{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.mt{font-size:11px;color:var(--text3);flex-shrink:0;align-self:flex-start;margin-top:2px}

.chat-hbar{display:flex;align-items:center;padding:0 8px;height:36px;margin-top:44px;flex-shrink:0;gap:6px;background:var(--nav);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-bottom:1px solid var(--sep);position:sticky;top:0;z-index:50}
.chat-back{display:flex;align-items:center;cursor:pointer;color:var(--accent);padding:4px;background:none;border:none}
.chat-back svg{width:20px;height:20px;fill:var(--accent)}
.chat-nm{flex:1;font-size:15px;font-weight:600;color:var(--text);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-dots{padding:4px;cursor:pointer;background:none;border:none}
.chat-dots svg{width:18px;height:18px;fill:var(--text3)}
.chat-body{flex:1;overflow-y:auto;padding:6px 10px 4px;display:flex;flex-direction:column;gap:1px;position:relative;background-size:cover;background-position:center}
.chat-bg-ov{position:absolute;inset:0;background:var(--bg);pointer-events:none;z-index:0}
.chat-body>*{position:relative;z-index:1}

.msg-row{display:flex;flex-direction:column;margin-bottom:2px}
.msg-row.u{align-items:flex-end;animation:mu .35s cubic-bezier(.2,.8,.3,1)}
.msg-row.c{align-items:flex-start;animation:mc .35s cubic-bezier(.2,.8,.3,1)}
.msg-row.s{align-items:center;animation:ms .3s ease}
@keyframes mu{from{opacity:0;transform:translateX(30px) scale(.95)}to{opacity:1;transform:none}}
@keyframes mc{from{opacity:0;transform:translateX(-30px) scale(.95)}to{opacity:1;transform:none}}
@keyframes ms{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.msg-w{display:flex;align-items:flex-end;gap:5px;max-width:78%}
.msg-row.u .msg-w{flex-direction:row-reverse}
.msg-cav{width:26px;height:26px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2)}
.msg-cav img{width:100%;height:100%;object-fit:cover}
.bub{padding:8px 12px;font-size:14px;line-height:1.4;word-break:break-word;border-radius:18px;cursor:pointer;transition:transform .1s}
.bub:active{transform:scale(.96)}
.msg-row.u .bub{background:var(--bubble-user);color:#fff;border-bottom-right-radius:5px}
.msg-row.c .bub{background:var(--bubble-char);color:var(--bubble-char-text);border-bottom-left-radius:5px}
.msg-ts{font-size:9px;color:var(--text3);margin-top:1px;padding:0 34px}
.msg-row.u .msg-ts{text-align:right}
.msg-row.c .msg-ts{text-align:left}

.sys-bub{padding:4px 10px;text-align:center;max-width:88%;cursor:pointer}
.sys-inner{background:var(--card2);border-radius:10px;padding:6px 12px;border:1px solid var(--sep);transition:transform .12s;font-size:11px;color:var(--text3);line-height:1.4}
.sys-inner:active{transform:scale(.97)}
.sys-tag{display:inline-block;background:var(--accent);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-bottom:2px;letter-spacing:.3px}

.rp-bub{border-radius:14px!important;padding:0!important;overflow:hidden;min-width:170px;cursor:pointer;background:var(--card2)!important;color:var(--text)!important;border:1px solid var(--sep)}
.rp-top{padding:12px 14px;display:flex;align-items:center;gap:10px}
.rp-ico{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rp-ico svg{width:18px;height:18px;fill:#fff}
.rp-info{flex:1}
.rp-tit{font-size:14px;font-weight:600}
.rp-note{font-size:11px;color:var(--text3);margin-top:1px}
.rp-bot{padding:5px 14px;border-top:1px solid var(--sep);font-size:9px;color:var(--text3)}
.rp-recv{border-top:1px solid var(--sep);padding:6px 14px;font-size:11px;color:var(--green);text-align:center;font-weight:500}

.voice-bub{display:flex;align-items:center;gap:6px;min-width:90px;cursor:pointer;padding:9px 12px!important}
.v-waves{display:flex;align-items:center;gap:2px;height:16px}
.v-waves i{width:2.5px;border-radius:2px;background:currentColor;opacity:.5;display:block}
.v-dur{font-size:11px;opacity:.6;flex-shrink:0}

.img-bub{padding:3px!important;border-radius:14px!important;overflow:hidden;cursor:pointer;position:relative}
.img-bub img{width:170px;max-height:170px;object-fit:cover;border-radius:12px;display:block}
.img-bub .img-ov{position:absolute;inset:3px;background:rgba(0,0,0,.6);border-radius:12px;display:none;align-items:center;justify-content:center;padding:10px;color:#fff;font-size:11px;text-align:center;line-height:1.4;backdrop-filter:blur(4px)}
.img-bub.show-d .img-ov{display:flex}
.img-placeholder{width:170px;height:100px;background:var(--card2);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px}
.img-placeholder svg{width:24px;height:24px;fill:var(--text3)}
.img-placeholder span{font-size:10px;color:var(--text3)}

.stk-bub{background:transparent!important;padding:3px!important}
.stk-bub img{width:80px;height:80px;object-fit:contain}

.chat-ibar{display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--nav);backdrop-filter:blur(30px);border-top:1px solid var(--sep);flex-shrink:0}
.ci-btn{width:30px;height:30px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:transform .12s}
.ci-btn:active{transform:scale(.85)}
.ci-btn svg{width:14px;height:14px;fill:var(--text3)}
.ci-btn.ld{animation:pls 1s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.ci-input{flex:1;height:34px;border-radius:17px;border:1px solid var(--sep);background:var(--bg2);padding:0 12px;font-size:13px;color:var(--text);outline:none}

.feat-tray{display:none;padding:8px 14px;background:var(--nav);gap:16px;flex-shrink:0;flex-wrap:wrap}
.feat-tray.show{display:flex}
.feat-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.feat-box{width:44px;height:44px;border-radius:12px;background:var(--feat-bg);display:flex;align-items:center;justify-content:center;transition:transform .12s}
.feat-box:active{transform:scale(.88)}
.feat-box svg{width:22px;height:22px;fill:var(--feat-fg)}
.feat-item span{font-size:9px;color:var(--text3)}

.stk-panel{display:none;position:absolute;bottom:48px;left:0;right:0;height:160px;background:var(--nav);backdrop-filter:blur(24px);border-top:1px solid var(--sep);z-index:60;padding:8px;overflow-y:auto}
.stk-panel.show{display:block}
.stk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stk-gi{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px;border-radius:8px;transition:background .12s}
.stk-gi:active{background:var(--input-bg)}
.stk-gi img{width:48px;height:48px;object-fit:contain}
.stk-gi span{font-size:8px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;text-align:center}

.mom-blur{position:absolute;top:0;left:0;right:0;height:60px;background:linear-gradient(to bottom,rgba(0,0,0,.35),transparent);z-index:20;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.mom-banner{width:100%;height:190px;position:relative;overflow:visible;background:linear-gradient(135deg,#667eea,#764ba2)}
.mom-banner img{width:100%;height:100%;object-fit:cover;display:block}
.mom-banner .mom-grad{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.35))}
.mom-banner-bot{position:absolute;bottom:-26px;right:14px;display:flex;align-items:flex-end;gap:8px}
.mom-uname{font-size:16px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);margin-bottom:8px;cursor:pointer}
.mom-uav{width:56px;height:56px;border-radius:10px;overflow:hidden;background:var(--card);border:3px solid var(--bg);cursor:pointer}
.mom-uav img{width:100%;height:100%;object-fit:cover}
.mom-sig{text-align:right;padding:32px 14px 6px;font-size:11px;color:var(--text3);cursor:pointer}
.mom-feed{padding:0 0 90px}
.mom-item{padding:10px 14px;border-bottom:1px solid var(--sep);display:flex;gap:8px;cursor:pointer}
.mom-av{width:38px;height:38px;border-radius:6px;flex-shrink:0;overflow:hidden;background:var(--card2)}
.mom-av img{width:100%;height:100%;object-fit:cover}
.mom-r{flex:1;min-width:0}
.mom-author{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:2px}
.mom-txt{font-size:13px;color:var(--text);line-height:1.45;margin-bottom:4px;word-break:break-word}
.mom-img{max-width:100%;max-height:150px;border-radius:6px;margin-bottom:4px}
.mom-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.mom-time{font-size:11px;color:var(--text3)}
.mom-abtn{background:var(--input-bg);border:none;border-radius:4px;padding:3px 8px;cursor:pointer}
.mom-abtn svg{width:14px;height:14px;fill:var(--text3)}
.mom-cmts{background:var(--card2);border-radius:4px;padding:5px 8px;margin-top:4px}
.mom-cmt{font-size:12px;color:var(--text);line-height:1.45;margin-bottom:1px}
.mom-cmt b{color:var(--accent);font-weight:600;cursor:pointer}
.mom-fab{position:absolute;bottom:76px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,122,255,.3);z-index:50;border:none;transition:transform .12s}
.mom-fab:active{transform:scale(.85)}
.mom-fab svg{width:20px;height:20px;fill:#fff}

.slist{padding:6px 14px 90px}
.sg-t{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:10px 0 3px;letter-spacing:.5px}
.sg{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:3px}
.si-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--sep);cursor:pointer}
.si-item:last-child{border-bottom:none}
.si-l{display:flex;align-items:center;gap:8px;color:var(--text);font-size:14px}
.si-l svg{width:18px;height:18px;fill:var(--accent)}
.si-r{display:flex;align-items:center;gap:3px;color:var(--text3);font-size:12px}
.si-r svg{width:12px;height:12px;fill:var(--text3)}
.tog{width:42px;height:26px;border-radius:13px;background:var(--input-bg);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.tog.on{background:var(--green)}
.tog-k{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tog.on .tog-k{left:18px}

.fs{position:absolute;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}

<script>
var D={theme:'light',pw:340,ph:580,pr:46,wallpaper:null,diArt:null,
user:{name:'我',avatar:null,sig:'',momBg:null},
chars:[],moments:[],
apis:[{id:_id(),name:'默认',url:'',key:'',model:'',temp:0.7}],aApi:0,
wbOrder:['chatSys','chatFmt','charRpFmt','rpFmt','voFmt','imgFmt','stkP','rpRecvP'],
wb:{
chatSys:'你是一个角色扮演助手。请根据角色设定以角色身份回复用户消息。每次回复1-3条，每条20-80字。JSON数组格式：[{"msg":"内容"}]',
chatFmt:'回复格式：JSON数组，每个元素含msg字段。示例：[{"msg":"你好"},{"msg":"在干嘛？"}]',
charRpFmt:'当角色想发红包：{"type":"redpacket","amount":"金额","note":"备注"}。语音：{"type":"voice","content":"内容","dur":"时长"}。图片：{"type":"image","desc":"描述"}。表情：{"type":"sticker","name":"表情名"}。混合在同一JSON数组返回。',
momPost:'根据角色设定生成一条朋友圈动态。JSON：{"content":"内容"}',
momReply:'根据角色设定对朋友圈评论。JSON数组：[{"name":"角色名","content":"评论"}]',
crossRP:'所有角色在评论区互相互动，修罗场氛围，可互相吃醋争论。',
sumP:'请总结以下对话，提取关键信息、情感变化、重要事件，200字以内：',
stkP:'角色可发表情包。格式{"type":"sticker","name":"名称"}。只能从列表选：',
rpFmt:'用户发红包格式[红包:金额:备注]，请做出合理回应。',
rpRecvP:'用户接收了你的红包。',
voFmt:'用户发语音格式[语音:内容]，请做出合理回应。',
imgFmt:'用户发图片格式[图片:描述]，请做出合理回应。',
momPostSys:'[朋友圈] {user}发了一条朋友圈：{content}',
momCharPostSys:'[系统] {char}刚才发了一条朋友圈：{content}',
momCmtSys:'[朋友圈评论更新] "{title}"的评论：\n{comments}',
musicSysP:'[一起听歌] 正在播放：{song}，歌词：{lyric}',
music:[]
},
cust:{uColor:'#007aff',cColor:'',uAlpha:1,cAlpha:1,enStk:true,enRP:true,enVo:true,enImg:true,syncT:false,crossR:true,musicSys:false},
stickers:[],wallet:{balance:0,txns:[]},
songI:0,playing:false,curChat:null,curMom:null};

function _id(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function e(ev){ev&&ev.stopPropagation()}
function bjt(){return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Shanghai"}))}
function ft(d){d=d||bjt();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fd(d){d=d||bjt();return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日'}
function save(){try{localStorage.setItem('mp5',JSON.stringify(D))}catch(ex){}}
function load(){try{var d=localStorage.getItem('mp5');if(d){var p=JSON.parse(d);Object.assign(D,p)}}catch(ex){}}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2200)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function $(id){return document.getElementById(id)}

load();

function init(){
applyTheme();applyPh();applyCol();updateClock();setInterval(updateClock,15000);
renderML();renderMom();buildFeatTogs();buildVis();
if(D.wallpaper)$('homeWall').style.backgroundImage='url('+D.wallpaper+')';
if(D.user.avatar)si('momUavI',D.user.avatar);
if(D.user.momBg)si('momBannerI',D.user.momBg);
if(D.user.sig)$('momSig').textContent=D.user.sig;
if(D.diArt){$('difArt').innerHTML='<div class="dif-spin"></div><img src="'+D.diArt+'">'}
$('momUN').textContent=D.user.name;$('setUN').textContent=D.user.name;
['crossR','syncT','musicSys'].forEach(function(k){if(D.cust[k])$('tog'+{crossR:'CR',syncT:'ST',musicSys:'MS'}[k]).classList.add('on')});
if(D.theme==='dark')$('togTh').classList.add('on');
$('pwR').value=D.pw;$('phR').value=D.ph;$('prR').value=D.pr;
$('pwB').textContent=D.pw;$('phB').textContent=D.ph;$('prB').textContent=D.pr;
initMu();startAutoChk();
document.getElementById('phone').addEventListener('click',function(ev){
var di=$('di');
if(di.classList.contains('expand')&&!di.contains(ev.target))di.classList.remove('expand');
var ma=$('maPop');
if(ma.classList.contains('show')&&!ma.contains(ev.target))ma.classList.remove('show');
});
}
function si(id,src){var i=$(id);if(i){i.src=src;i.style.display='block'}}
function applyTheme(){$('phone').classList.toggle('dark',D.theme==='dark')}
function applyPh(){var p=$('phone');p.style.setProperty('--pw',D.pw+'px');p.style.setProperty('--ph',D.ph+'px');p.style.setProperty('--pr',D.pr+'px')}
function updPh(){D.pw=+$('pwR').value;D.ph=+$('phR').value;D.pr=+$('prR').value;$('pwB').textContent=D.pw;$('phB').textContent=D.ph;$('prB').textContent=D.pr;applyPh();save()}
function applyCol(){
document.documentElement.style.setProperty('--bubble-user',hexA(D.cust.uColor||'#007aff',D.cust.uAlpha));
if(D.cust.cColor)document.documentElement.style.setProperty('--bubble-char',hexA(D.cust.cColor,D.cust.cAlpha));
}
function hexA(hex,a){if(a==null)a=1;var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')'}
function updateClock(){var t=bjt();$('sbTime').textContent=ft(t);$('homeTime').textContent=ft(t);$('homeDate').textContent=fd(t)}
function togTheme(){D.theme=D.theme==='dark'?'light':'dark';$('togTh').classList.toggle('on');applyTheme();save()}
function togOpt(k,el){el.classList.toggle('on');D.cust[k]=el.classList.contains('on');save()}
function buildVis(){var el=$('difVis');var h='';for(var i=0;i<12;i++)h+='<i></i>';el.innerHTML=h}

var curScr='scrHome';
function go(id){
document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
$(id).classList.add('active');
document.querySelectorAll('.bnav-item').forEach(function(n){n.classList.toggle('act',n.dataset.s===id)});
$('bnav').style.display=(['scrChat','scrMD'].indexOf(id)>=0)?'none':'flex';
curScr=id;
if(id==='scrMsg')renderML();
if(id==='scrMom')renderMom();
}
function exitChat(){go('scrMsg')}

function upFile(cb){var i=$('fInp');i.onchange=function(ev){var f=ev.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(v){cb(v.target.result)};r.readAsDataURL(f);i.value=''};i.click()}
function upUAv(){upFile(function(d){D.user.avatar=d;si('momUavI',d);save();toast('头像已更新')})}
function upMomBg(){upFile(function(d){D.user.momBg=d;si('momBannerI',d);save();toast('背景已更新')})}
function upDIArt(){upFile(function(d){D.diArt=d;$('difArt').innerHTML='<div class="dif-spin"></div><img src="'+d+'">';save()})}
function editSig(){var v=prompt('编辑签名',D.user.sig||'');if(v!==null){D.user.sig=v;$('momSig').textContent=v||'点击编辑签名';save()}}
function editUN(){var v=prompt('用户名',D.user.name||'我');if(v!==null&&v.trim()){D.user.name=v.trim();$('momUN').textContent=v;$('setUN').textContent=v;save()}}
function uploadWP(){upFile(function(d){D.wallpaper=d;$('homeWall').style.backgroundImage='url('+d+')';save();toast('壁纸已更新')})}

// DI
function toggleDI(){$('di').classList.toggle('expand')}
$('di').addEventListener('click',function(ev){if(!$('di').classList.contains('expand'))toggleDI()});

// Characters
var _tav=null;
function openCharNew(eid){
var ch=eid?gch(eid):null;_tav=null;
var h='<div class="mt-title">'+(ch?'编辑':'创建')+'角色</div>';
h+='<div class="av-up" onclick="upCAv(this)">'+(ch&&ch.avatar?'<img src="'+ch.avatar+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="var(--text3)"/></svg>')+'</div>';
h+='<div class="fg"><div class="fl">备注</div><input class="fi" id="fNk" value="'+(ch?ch.nick:'')+'"></div>';
h+='<div class="fg"><div class="fl">角色名</div><input class="fi" id="fNm" value="'+(ch?ch.name:'')+'"></div>';
h+='<div class="fg"><div class="fl">人设</div><textarea class="ft" id="fPs" rows="3">'+(ch?ch.persona:'')+'</textarea></div>';
h+='<button class="fbtn" onclick="saveChar(\''+(eid||'')+'\')">保存</button>';
if(ch)h+='<button class="fbtn red" style="margin-top:4px" onclick="delChar(\''+eid+'\')">删除</button>';
showBS(h);
}
function upCAv(el){upFile(function(d){_tav=d;el.innerHTML='<img src="'+d+'">'})}
function saveChar(eid){
var nk=$('fNk').value.trim(),nm=$('fNm').value.trim(),ps=$('fPs').value;
if(!nm){toast('请输入角色名');return}
if(eid){var ch=gch(eid);if(ch){ch.nick=nk;ch.name=nm;ch.persona=ps;if(_tav)ch.avatar=_tav}}
else D.chars.push({id:_id(),name:nm,nick:nk,avatar:_tav,persona:ps,msgs:[],memory:'',ctxL:20,autoS:false,sumI:20,sumP:'',lastM:'',lastT:'',chatBg:null,chatBgA:.3,userAv:null,hideSys:true,autoMsg:false,autoMsgMin:5});
_tav=null;save();closeBS();renderML();toast('已保存');
}
function delChar(id){if(!confirm('确定删除？'))return;D.chars=D.chars.filter(function(c){return c.id!==id});save();closeBS();closeFS('fsChar');renderML();go('scrMsg')}
function gch(id){return D.chars.find(function(c){return c.id===id})}

function renderML(){
var el=$('msgList');
if(!D.chars.length){el.innerHTML='<div style="text-align:center;padding:40px 16px;color:var(--text3);font-size:13px">暂无角色<br>点击右上角创建</div>';return}
var h='';D.chars.forEach(function(c){
var av=c.avatar?'<img src="'+c.avatar+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="var(--text3)"/></svg>';
h+='<div class="mitem" onclick="openChat(\''+c.id+'\')"><div class="mav">'+av+'</div><div class="minfo"><div class="mn">'+(c.nick||c.name)+'</div><div class="mp">'+(c.lastM||'暂无消息')+'</div></div><div class="mt">'+(c.lastT||'')+'</div></div>';
});el.innerHTML=h;
}

// CHAT
function openChat(id){
D.curChat=id;var ch=gch(id);if(!ch)return;
$('chatNm').textContent=ch.nick||ch.name;
go('scrChat');renderBub();applyCBg();
$('featTray').classList.remove('show');$('stkPanel').classList.remove('show');
}
function applyCBg(){
var ch=gch(D.curChat);if(!ch)return;
var b=$('chatBody'),ov=$('chatBgOv');
if(ch.chatBg){b.style.backgroundImage='url('+ch.chatBg+')';ov.style.opacity=1-(ch.chatBgA||.3)}
else{b.style.backgroundImage='none';ov.style.opacity=1}
}
function renderBub(){
var ch=gch(D.curChat);if(!ch)return;
var el=$('chatBody');
var bgOv='<div class="chat-bg-ov" id="chatBgOv"></div>';
var h=bgOv;
var uav=ch.userAv||D.user.avatar;
ch.msgs.forEach(function(m,i){
var cls=m.role==='user'?'u':m.role==='char'?'c':'s';
if(cls==='s'&&ch.hideSys)return;
var ts='<div class="msg-ts">'+(m.time||'')+'</div>';
var cavH=cls==='c'?'<div class="msg-cav">'+(ch.avatar?'<img src="'+ch.avatar+'">':'')+'</div>':'';
var uavH=cls==='u'?'<div class="msg-cav">'+(uav?'<img src="'+uav+'">':'')+'</div>':'';

// AI
function trigAI(){
var ch=gch(D.curChat);if(!ch)return;var p=D.apis[D.aApi];if(!p||!p.url){toast('请先配置API');return}
var btn=$('aiBtn');btn.classList.add('ld');
var msgs=buildPr(ch);
callAPI(msgs,p).then(function(r){parseR(ch,r);if(ch.autoS&&ch.msgs.length>0&&ch.msgs.length%ch.sumI===0)return autoSum(ch)})
.catch(function(er){toast('API错误: '+er.message);ch.msgs.push({role:'system',content:'[API失败: '+er.message+']',time:ft()})})
.finally(function(){btn.classList.remove('ld');save();renderBub();renderML()});
}
function buildPr(ch){
var sys='';
D.wbOrder.forEach(function(k){
if(!D.cust.enRP&&(k==='rpFmt'||k==='rpRecvP'))return;
if(!D.cust.enVo&&k==='voFmt')return;
if(!D.cust.enImg&&k==='imgFmt')return;
if(!D.cust.enStk&&k==='stkP')return;
if(D.wb[k])sys+=D.wb[k]+'\n\n';
});
sys+='角色名：'+ch.name+'\n';if(ch.nick)sys+='备注：'+ch.nick+'\n';
sys+='角色设定：\n'+ch.persona+'\n\n';
if(ch.memory)sys+='记忆：\n'+ch.memory+'\n\n';
if(D.cust.enStk&&D.stickers.length){D.stickers.forEach(function(s){sys+=s.name+': '+s.url+'\n'})}
if(D.cust.syncT)sys+='\n当前北京时间：'+ft()+' '+fd();
var m=[{role:'system',content:sys}];
var recent=ch.msgs.slice(-(ch.ctxL||20));
recent.forEach(function(msg){
if(msg.role==='system')m.push({role:'system',content:msg.content});
else if(msg.role==='user')m.push({role:'user',content:msg.content});
else m.push({role:'assistant',content:msg.content});
});
return m;
}
function callAPI(msgs,p){
var url=p.url.replace(/\/+$/,'')+'/v1/chat/completions';
var h={'Content-Type':'application/json'};if(p.key)h['Authorization']='Bearer '+p.key;
return fetch(url,{method:'POST',headers:h,body:JSON.stringify({model:p.model||'gpt-4o-mini',messages:msgs,temperature:p.temp||.7,max_tokens:1024})}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(d){return d.choices&&d.choices[0]&&d.choices[0].message?d.choices[0].message.content||'':''});
}
function parseR(ch,resp){
var parsed=[];
try{
var cl=resp.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
var arr=JSON.parse(cl);
if(Array.isArray(arr))arr.forEach(function(item){
if(item.type==='redpacket')parsed.push({role:'char',type:'redpacket',amount:item.amount||'',note:item.note||'恭喜发财',content:'[红包:'+item.amount+':'+item.note+']',time:ft(),recv:false});
else if(item.type==='voice'){var dur=item.dur||Math.max(1,Math.ceil((item.content||'').length/3))+'"';parsed.push({role:'char',type:'voice',content:item.content||'',dur:dur,time:ft()})}
else if(item.type==='image')parsed.push({role:'char',type:'image',desc:item.desc||'',src:null,content:'[图片:'+item.desc+']',time:ft()});
else if(item.type==='sticker'){var st=D.stickers.find(function(x){return x.name===item.name});parsed.push({role:'char',type:'sticker',url:st?st.url:'',content:'[sticker:'+item.name+']',time:ft()})}
else{var c=item.msg||item.message||item.content||JSON.stringify(item);parsed.push({role:'char',type:'text',content:c,time:ft()})}
});
}catch(ex){parsed.push({role:'char',type:'text',content:resp,time:ft()})}
parsed.forEach(function(p){ch.msgs.push(p)});
if(parsed.length){var l=parsed[parsed.length-1];ch.lastM=l.type==='text'?l.content:'['+l.type+']';ch.lastT=ft()}
}

var json=JSON.stringify(D,null,2);
var blob=new Blob([json],{type:'application/json'});
var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='phone_data_'+Date.now()+'.json';a.click();toast('已导出');
}
function impAll(){
var i=$('jInp');i.onchange=function(ev){
var f=ev.target.files[0];if(!f)return;
var r=new FileReader();r.onload=function(v){
try{var d=JSON.parse(v.target.result);Object.assign(D,d);save();toast('导入成功，刷新中...');setTimeout(function(){location.reload()},800)}
catch(ex){toast('导入失败: '+ex.message)}
};r.readAsText(f);i.value='';
};i.click();
}
function expChat(){
var ch=gch(D.curChat);if(!ch)return;
var data={name:ch.name,nick:ch.nick,msgs:ch.msgs,memory:ch.memory};
var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(ch.nick||ch.name)+'_chat.json';a.click();toast('已导出');
}
function expChatTxt(){
var ch=gch(D.curChat);if(!ch)return;
var txt='';ch.msgs.forEach(function(m){
var who=m.role==='user'?D.user.name:m.role==='char'?(ch.nick||ch.name):'[系统]';
txt+='['+m.time+'] '+who+': '+(m.content||'['+m.type+']')+'\n';
});
var blob=new Blob([txt],{type:'text/plain'});
var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(ch.nick||ch.name)+'_chat.txt';a.click();toast('已导出');
}
function impChat(){
var i=$('jInp');i.onchange=function(ev){
var f=ev.target.files[0];if(!f)return;
var r=new FileReader();r.onload=function(v){
try{var d=JSON.parse(v.target.result);var ch=gch(D.curChat);if(!ch)return;
if(d.msgs)ch.msgs=d.msgs;if(d.memory)ch.memory=d.memory;
save();renderBub();toast('导入成功')}catch(ex){toast('导入失败')}
};r.readAsText(f);i.value='';
};i.click();
}

function addAPI(){D.apis.push({id:_id(),name:'配置'+(D.apis.length+1),url:'',key:'',model:'',temp:.7});D.aApi=D.apis.length-1;save();closeBS();openAPI()}
function delAPIC(){if(D.apis.length<=1)return;D.apis.splice(D.aApi,1);D.aApi=0;save();closeBS();openAPI()}
function saveAPI(){var p=D.apis[D.aApi];p.name=$('apiN').value;p.url=$('apiU').value.trim();p.key=$('apiK').value.trim();p.model=$('apiM').value.trim();p.temp=parseFloat($('apiT').value)||.7;save();toast('已保存');closeBS()}
function testAPI(){var url=$('apiU').value.trim();if(!url){toast('请输入地址');return}toast('测试中...');var h={};var k=$('apiK').value;if(k)h['Authorization']='Bearer '+k;fetch(url.replace(/\/+$/,'')+'/v1/models',{headers:h}).then(function(r){if(r.ok)return r.json();throw new Error('HTTP '+r.status)}).then(function(d){toast('连接成功! 模型: '+(d.data?d.data.length:'?'))}).catch(function(er){toast('失败: '+er.message)})}
function fetchM(){var url=$('apiU').value.trim();if(!url){toast('请输入地址');return}toast('获取模型...');var h={};var k=$('apiK').value;if(k)h['Authorization']='Bearer '+k;fetch(url.replace(/\/+$/,'')+'/v1/models',{headers:h}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(d){_fm=(d.data||[]).map(function(m){return m.id}).sort();$('apiSrch').style.display='block';renderMdl(_fm);toast('找到 '+_fm.length+' 个模型')}).catch(function(er){toast('错误: '+er.message)})}

function postUM(){
var content=$('nmC').value.trim();if(!content){toast('请输入内容');return}
var sync=$('nmSy').classList.contains('on');
D.moments.push({id:_id(),author:'user',authorName:D.user.name,authorAv:D.user.avatar,content:content,image:_timg,comments:[],ts:ft()+' '+fd(),sync:sync});
if(sync){
var sysMsg=(D.wb.momPostSys||'[朋友圈] {user}发了朋友圈：{content}').replace('{user}',D.user.name).replace('{content}',content);
D.chars.forEach(function(c){c.msgs.push({role:'system',content:sysMsg,time:ft()})});
}
_timg=null;save();closeBS();renderMom();toast('已发布');
}
function createCM(cid){
var ch=gch(cid);if(!ch)return;closeBS();toast('生成中...');
var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}
callAPI([{role:'system',content:D.wb.momPost+'\n\n角色：'+ch.persona+(ch.memory?'\n记忆：'+ch.memory:'')},{role:'user',content:'生成一条朋友圈'}],p).then(function(r){
var content=r;try{var j=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));content=j.content||j.text||r}catch(ex){}
var m={id:_id(),author:cid,authorName:ch.nick||ch.name,authorAv:ch.avatar,content:content,comments:[],ts:ft()+' '+fd(),sync:true};
D.moments.push(m);
var sysMsg=(D.wb.momCharPostSys||'[系统] {char}发了朋友圈：{content}').replace('{char}',ch.nick||ch.name).replace('{content}',content);
ch.msgs.push({role:'system',content:sysMsg,time:ft()});
return genSocC(m,ch);
}).then(function(){save();renderMom();toast('已发布')}).catch(function(er){toast('失败: '+er.message)});
}
function genSocC(m,ch){
var p=D.apis[D.aApi];if(!p||!p.url)return Promise.resolve();
return callAPI([{role:'system',content:'为朋友圈生成3-5个社交圈角色评论，至少10条互动。发布者：'+ch.persona+'\n内容：'+m.content+'\nJSON数组：[{"name":"名","content":"评论"}]'},{role:'user',content:'生成评论'}],p).then(function(r){
try{var arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))m.comments=arr.map(function(c){return{name:c.name,content:c.content}})}catch(ex){m.comments=[{name:'好友',content:r.substring(0,50)}]}
if(m.comments.length){
var cmtStr=m.comments.map(function(c){return c.name+': '+c.content}).join('\n');
var sysMsg=(D.wb.momCmtSys||'[评论更新]').replace('{title}',m.content.substring(0,20)+'...').replace('{comments}',cmtStr);
ch.msgs.push({role:'system',content:sysMsg,time:ft()});
}
}).catch(function(){});
}
function refreshC(mid){
var m=D.moments.find(function(x){return x.id===mid});if(!m)return;
var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}
toast('刷新评论...');
var ci='';D.chars.forEach(function(c){ci+=c.name+'('+(c.nick||'')+'):'+c.persona+'\n'});
var existC=m.comments?m.comments.map(function(c){return c.name+': '+c.content}).join('\n'):'';
var crossP=D.cust.crossR?('\n'+D.wb.crossRP):'';
callAPI([{role:'system',content:D.wb.momReply+crossP+'\n\n角色：\n'+ci+'\n\n朋友圈：'+m.content+(existC?'\n已有评论：\n'+existC:'')},{role:'user',content:'所有角色评论'+(D.cust.crossR?'，互相互动':'，独立回复')}],p).then(function(r){
try{var arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))m.comments=arr.map(function(c){return{name:c.name,content:c.content}})}catch(ex){m.comments=[{name:'AI',content:r.substring(0,100)}]}
var cmtStr=m.comments.map(function(c){return c.name+': '+c.content}).join('\n');
var sysMsg=(D.wb.momCmtSys||'[评论更新]').replace('{title}',m.content.substring(0,20)+'...').replace('{comments}',cmtStr);
D.chars.forEach(function(c){c.msgs.push({role:'system',content:sysMsg,time:ft()})});
save();renderMom();toast('评论已刷新');
}).catch(function(er){toast('失败: '+er.message)});
}

go('scrMD');_rTo=null;
var h='<div style="padding:10px 14px;border-bottom:1px solid var(--sep)"><div style="display:flex;gap:8px">';
h+='<div class="mom-av">'+(m.authorAv?'<img src="'+m.authorAv+'">':'')+'</div>';
h+='<div><div class="mom-author">'+m.authorName+'</div><div class="mom-txt">'+esc(m.content)+'</div>';
if(m.image)h+='<img class="mom-img" src="'+m.image+'">';
h+='<div class="mom-time">'+m.ts+'</div></div></div></div>';
if(m.comments&&m.comments.length){
h+='<div style="padding:6px 14px">';
m.comments.forEach(function(c){
var mc=D.chars.find(function(x){return(x.nick||x.name)===c.name});
h+='<div style="display:flex;gap:6px;margin-bottom:8px;align-items:flex-start"><div class="mom-av" style="width:28px;height:28px;cursor:pointer" onclick="setRT(\''+c.name.replace(/'/g,"\\'")+'\')">'+(mc&&mc.avatar?'<img src="'+mc.avatar+'">':'')+'</div>';
h+='<div style="font-size:12px;color:var(--text);line-height:1.4"><b style="color:var(--accent);cursor:pointer" onclick="setRT(\''+c.name.replace(/'/g,"\\'")+'\')">'+c.name+'</b>：'+esc(c.content)+'</div></div>';
});h+='</div>';}
$('mdBody').innerHTML=h;
}
function setRT(name){_rTo=name;$('mdInp').placeholder='回复 '+name+'：';$('mdInp').focus()}
function sendMC(){
var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;
var txt=$('mdInp').value.trim();if(!txt)return;
if(!m.comments)m.comments=[];
m.comments.push({name:D.user.name,content:(_rTo?'回复 '+_rTo+'：':'')+txt});
$('mdInp').value='';_rTo=null;$('mdInp').placeholder='评论...';save();openMD(D.curMom);
}
function trigMomAI(){
var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;
var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}toast('AI回复中...');
var ci='';
if(_rTo){var tch=D.chars.find(function(c){return(c.nick||c.name)===_rTo});if(tch)ci='角色'+tch.name+'：'+tch.persona+(tch.memory?'\n记忆：'+tch.memory:'')}
else D.chars.forEach(function(c){ci+=c.name+'('+(c.nick||'')+'):'+c.persona+'\n'});
var ec=m.comments?m.comments.map(function(c){return c.name+': '+c.content}).join('\n'):'';
var crossP=D.cust.crossR?('\n'+D.wb.crossRP):'';
callAPI([{role:'system',content:D.wb.momReply+crossP+'\n\n'+ci+'\n\n朋友圈：'+m.content+'\n已有评论：\n'+ec},{role:'user',content:_rTo?'请'+_rTo+'回复':'各角色继续回复'}],p).then(function(r){
try{var arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))arr.forEach(function(a){if(!m.comments)m.comments=[];m.comments.push({name:a.name,content:a.content})})}
catch(ex){if(!m.comments)m.comments=[];m.comments.push({name:_rTo||'AI',content:r.substring(0,200)})}
_rTo=null;
var cmtStr=m.comments.map(function(c){return c.name+': '+c.content}).join('\n');
var sysMsg=(D.wb.momCmtSys||'[评论更新]').replace('{title}',m.content.substring(0,20)+'...').replace('{comments}',cmtStr);
D.chars.forEach(function(c){c.msgs.push({role:'system',content:sysMsg,time:ft()})});
save();openMD(D.curMom);toast('回复完成');
}).catch(function(er){toast('失败: '+er.message)});
}

// Music
function initMu(){
if(D.wb.music&&D.wb.music.length){
var s=D.wb.music[D.songI];
if(s){$('difN').textContent=s.name;$('difA').textContent=s.artist||''}
}else{$('difN').textContent='未播放';$('difA').textContent='在世界书添加音乐'}
$('di').classList.toggle('playing',D.playing);
}
function muTg(){
if(!D.wb.music||!D.wb.music.length){toast('请在世界书添加音乐');return}
var a=$('aud');
if(D.playing){a.pause();D.playing=false}
else{var s=D.wb.music[D.songI];if(s){a.src=s.url;a.play().catch(function(){toast('播放失败')});D.playing=true;sendMuSys(s)}}
upMUI();
}
function muNx(){if(!D.wb.music||!D.wb.music.length)return;D.songI=(D.songI+1)%D.wb.music.length;playCur()}
function muPv(){if(!D.wb.music||!D.wb.music.length)return;D.songI=(D.songI-1+D.wb.music.length)%D.wb.music.length;playCur()}
function playCur(){
var s=D.wb.music[D.songI];
$('difN').textContent=s.name;$('difA').textContent=s.artist||'';
if(D.playing){var a=$('aud');a.src=s.url;a.play().catch(function(){});sendMuSys(s)}
upMUI();
}
function upMUI(){
$('di').classList.toggle('playing',D.playing);
$('difPl').innerHTML=D.playing?'<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#fff"/></svg>':'<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#fff"/></svg>';
}
function sendMuSys(s){
if(!D.cust.musicSys)return;
var ly=s.lyrics?(s.lyrics.split('/')[0]||''):'♪';
var msg=(D.wb.musicSysP||'[一起听歌] 正在播放：{song}').replace('{song}',s.name+' - '+(s.artist||'')).replace('{lyric}',ly);
if(D.curChat){var ch=gch(D.curChat);if(ch){ch.msgs.push({role:'system',content:msg,time:ft()});save();renderBub()}}
}
function seekM(ev){var a=$('aud');if(!a.duration)return;var r=ev.currentTarget.getBoundingClientRect();a.currentTime=((ev.clientX-r.left)/r.width)*a.duration}
var aud=$('aud');
aud.addEventListener('timeupdate',function(){
if(!aud.duration)return;
$('difPF').style.width=(aud.currentTime/aud.duration)*100+'%';
$('difCu').textContent=fmtS(aud.currentTime);$('difDu').textContent=fmtS(aud.duration);
var s=D.wb.music&&D.wb.music[D.songI];
if(s&&s.lyrics){
var lines=s.lyrics.split('/');
var idx=Math.floor((aud.currentTime/aud.duration)*lines.length);
$('difLy').textContent=lines[Math.min(idx,lines.length-1)]||'♪';
}
});
aud.addEventListener('ended',function(){muNx()});
function fmtS(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

// Auto Message
var _autoTimers={};
function startAutoChk(){setInterval(chkAuto,30000)}
function chkAuto(){
D.chars.forEach(function(ch){
if(!ch.autoMsg||!ch.autoMsgMin)return;
var lastT=null;
for(var i=ch.msgs.length-1;i>=0;i--){
if(ch.msgs[i].role==='user'||ch.msgs[i].role==='char'){lastT=ch.msgs[i];break}
}
if(!lastT||lastT.role!=='user')return;
var now=Date.now();var key='_at_'+ch.id;
if(!_autoTimers[key])_autoTimers[key]=now;
if(now-_autoTimers[key]<ch.autoMsgMin*60000)return;
_autoTimers[key]=now;
var p=D.apis[D.aApi];if(!p||!p.url)return;
var msgs=buildPr(ch);
msgs.push({role:'system',content:'用户已经'+ch.autoMsgMin+'分钟没有回复了，请主动发起话题或关心用户'});
callAPI(msgs,p).then(function(r){
parseR(ch,r);save();
if(D.curChat===ch.id)renderBub();
else showNotif(ch,r);
renderML();
}).catch(function(){});
});
}

// Notification
function showNotif(ch,msg){
var nm=$('notifNm'),ms=$('notifMsg'),av=$('notifAv'),t=$('notifT'),n=$('notif');
nm.textContent=ch.nick||ch.name;
var preview=msg.length>40?msg.substring(0,40)+'...':msg;
try{var arr=JSON.parse(msg.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))preview=(arr[0].msg||arr[0].content||'').substring(0,40)}catch(ex){}
ms.textContent=preview;
t.textContent=ft();
av.innerHTML=ch.avatar?'<img src="'+ch.avatar+'">':'';
n.classList.add('show');n._cid=ch.id;
clearTimeout(n._t);n._t=setTimeout(function(){n.classList.remove('show')},5000);
}
function clickNotif(){var n=$('notif');n.classList.remove('show');if(n._cid)openChat(n._cid)}

// BS
function showBS(h){$('bss').innerHTML=h;$('bso').classList.add('show')}
function closeBS(){$('bso').classList.remove('show');_tav=null;_timg=null;_uavChat=null}

init();
</script>
