<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小手机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
--bg:#f2f2f7;--bg2:#fff;--text:#000;--text2:#3c3c43;--text3:#8e8e93;
--card:rgba(255,255,255,.85);--card2:rgba(242,242,247,.92);
--nav:rgba(249,249,249,.92);--sep:rgba(60,60,67,.1);
--accent:#007aff;--green:#34c759;--red:#ff3b30;
--input-bg:rgba(118,118,128,.12);
--bu:#007aff;--bc:rgba(229,229,234,.96);--bct:#000;
--glass:rgba(255,255,255,.78);
--ma-bg:rgba(248,248,248,.95);--ma-fg:#000;
--sb-c:#000;
--pw:340px;--ph:580px;--pr:46px
}
.dark{
--bg:#000;--bg2:#1c1c1e;--text:#fff;--text2:rgba(235,235,245,.6);--text3:#636366;
--card:rgba(44,44,46,.88);--card2:rgba(38,38,40,.92);
--nav:rgba(28,28,30,.96);--sep:rgba(84,84,88,.22);
--bc:rgba(58,58,60,.96);--bct:#fff;
--glass:rgba(44,44,46,.82);
--ma-bg:rgba(30,30,32,.96);--ma-fg:#fff;
--sb-c:#fff
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif}
body{display:flex;justify-content:center;align-items:center;min-height:100vh}
textarea,input{-webkit-user-select:text;user-select:text;font-family:inherit}

#phone{width:var(--pw);height:var(--ph);border-radius:var(--pr);
position:relative;overflow:hidden;background:var(--bg);
box-shadow:0 0 0 2px #222,0 0 0 4px #1a1a1a,0 32px 80px rgba(0,0,0,.65);
transition:background .3s,width .3s,height .3s,border-radius .3s}
#phone *::-webkit-scrollbar{display:none}

/* STATUS BAR */
.sb{position:absolute;top:0;left:0;right:0;height:44px;
display:flex;align-items:center;justify-content:space-between;
padding:14px 20px 0;z-index:200;pointer-events:none}
.sb span{font-size:14px;font-weight:600;color:var(--sb-c);letter-spacing:-.3px}
.sb-r{display:flex;align-items:center;gap:5px}
.sb-r svg{fill:var(--sb-c);display:block}

/* DYNAMIC ISLAND */
.di{position:absolute;top:8px;left:50%;transform:translateX(-50%);
height:26px;min-width:90px;background:#000;border-radius:50px;
z-index:201;display:flex;align-items:center;justify-content:center;
padding:0 12px;cursor:pointer;overflow:hidden;
transition:all .5s cubic-bezier(.32,.72,.24,1.02)}
.di.exp{width:calc(var(--pw) - 24px) !important;height:185px !important;
border-radius:26px !important;top:6px !important}
.di-mini{position:absolute;display:flex;align-items:center;gap:5px;transition:opacity .12s}
.di.exp .di-mini{opacity:0;pointer-events:none}
.di-w{display:flex;align-items:center;gap:1.5px;height:10px}
.di-w i{width:2px;border-radius:1px;background:#555;height:3px;display:block}
.di.pl .di-w i{background:#fff}
.di.pl .di-w i:nth-child(1){animation:dw .42s ease-in-out infinite alternate}
.di.pl .di-w i:nth-child(2){animation:dw .58s ease-in-out infinite alternate .07s}
.di.pl .di-w i:nth-child(3){animation:dw .36s ease-in-out infinite alternate .14s}
.di.pl .di-w i:nth-child(4){animation:dw .64s ease-in-out infinite alternate .04s}
.di.pl .di-w i:nth-child(5){animation:dw .5s ease-in-out infinite alternate .11s}
@keyframes dw{0%{height:3px}100%{height:10px}}
.di-sn{color:#fff;font-size:11px;font-weight:500;max-width:56px;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:none}
.di.pl .di-sn{display:block}
.di-full{position:absolute;inset:0;padding:12px;
display:flex;flex-direction:column;gap:0;
opacity:0;pointer-events:none;transition:opacity .2s .18s}
.di.exp .di-full{opacity:1;pointer-events:auto}
.dif-top{display:flex;align-items:center;gap:10px}
.dif-art{width:44px;height:44px;border-radius:12px;background:#1a1a1a;
overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;
display:flex;align-items:center;justify-content:center}
.dif-art img{width:100%;height:100%;object-fit:cover}
.dif-art svg{width:18px;height:18px;fill:#555}
.dif-spin{position:absolute;inset:-1px;border-radius:13px;
border:2px solid transparent;border-top-color:rgba(255,255,255,.55);opacity:0}
.di.pl .dif-spin{animation:dsp 1.2s linear infinite;opacity:1}
@keyframes dsp{to{transform:rotate(360deg)}}
.dif-info{flex:1;min-width:0}
.dif-nm{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dif-ar{color:#666;font-size:11px;margin-top:1px}
.dif-vis{display:flex;align-items:flex-end;gap:2px;height:22px;justify-content:center;margin:7px 0 3px}
.dif-vis i{width:3px;border-radius:2px;background:#333;height:4px}
.di.pl .dif-vis i{background:#fff;opacity:.65}
.di.pl .dif-vis i:nth-child(1){animation:dv .44s ease infinite alternate}
.di.pl .dif-vis i:nth-child(2){animation:dv .6s ease infinite alternate .09s}
.di.pl .dif-vis i:nth-child(3){animation:dv .36s ease infinite alternate .18s}
.di.pl .dif-vis i:nth-child(4){animation:dv .52s ease infinite alternate .05s}
.di.pl .dif-vis i:nth-child(5){animation:dv .4s ease infinite alternate .13s}
.di.pl .dif-vis i:nth-child(6){animation:dv .56s ease infinite alternate .07s}
.di.pl .dif-vis i:nth-child(7){animation:dv .48s ease infinite alternate .15s}
.di.pl .dif-vis i:nth-child(8){animation:dv .42s ease infinite alternate .1s}
.di.pl .dif-vis i:nth-child(9){animation:dv .62s ease infinite alternate .03s}
.di.pl .dif-vis i:nth-child(10){animation:dv .46s ease infinite alternate .12s}
@keyframes dv{0%{height:4px}100%{height:20px}}
.dif-pb{height:3px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;margin-bottom:3px}
.dif-pf{height:100%;background:#fff;border-radius:2px;transition:width .5s linear;width:0%}
.dif-ts{display:flex;justify-content:space-between;font-size:9px;color:#555;margin-bottom:5px}
.dif-ly{color:#888;font-size:11px;text-align:center;height:16px;overflow:hidden;transition:color .3s;margin-bottom:6px}
.di.pl .dif-ly{color:#ccc}
.dif-ct{display:flex;align-items:center;justify-content:space-around}
.dif-btn{background:none;border:none;color:#fff;cursor:pointer;padding:6px;
border-radius:50%;transition:background .12s}
.dif-btn:active{background:rgba(255,255,255,.15)}
.dif-btn svg{width:22px;height:22px;fill:#fff;display:block}
.dif-btn.pl svg{width:28px;height:28px}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;
background:var(--bg);z-index:10}
.screen.active{display:flex;animation:si .28s cubic-bezier(.2,.8,.3,1)}
@keyframes si{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.scr-s{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* HOME */
.hw{position:absolute;inset:0;background-size:cover;background-position:center;border-radius:var(--pr)}
.hc{position:relative;z-index:1;padding-top:44px}
.h-time{text-align:center;margin-top:22px;font-size:64px;font-weight:200;
color:var(--text);letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums}
.h-date{text-align:center;font-size:13px;color:var(--text2);margin-top:4px;font-weight:500}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px;
padding:26px 16px 90px;margin-top:6px}
.ai{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.ab{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;
justify-content:center;transition:transform .15s;position:relative;overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.14)}
.ab::after{content:'';position:absolute;inset:0;border-radius:14px;border:1px solid rgba(255,255,255,.18);pointer-events:none}
.ab:active{transform:scale(.76)}
.ab svg{width:24px;height:24px}
.al{font-size:10px;color:var(--text);font-weight:500}

/* BOTTOM NAV */
.bnav{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
height:52px;display:flex;align-items:center;justify-content:space-around;
z-index:90;background:var(--nav);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
border-radius:28px;padding:0 4px;width:calc(100% - 30px);
border:1px solid var(--sep);box-shadow:0 2px 18px rgba(0,0,0,.07)}
.bn{display:flex;flex-direction:column;align-items:center;gap:1px;
cursor:pointer;color:var(--text3);padding:5px 12px;border-radius:20px;transition:color .2s}
.bn.on{color:var(--accent)}
.bn svg{width:21px;height:21px;fill:currentColor}
.bn span{font-size:9px;font-weight:500}

/* SCREEN HEADERS */
.hbar{display:flex;align-items:center;justify-content:space-between;
padding:0 14px;height:44px;margin-top:44px;flex-shrink:0}
.hbar-t{font-size:18px;font-weight:700;color:var(--text)}
.hbtn{width:32px;height:32px;border-radius:50%;background:var(--input-bg);
display:flex;align-items:center;justify-content:center;
cursor:pointer;border:none;transition:transform .12s;flex-shrink:0}
.hbtn:active{transform:scale(.83)}
.hbtn svg{width:16px;height:16px;fill:var(--text3);display:block}

/* CHAT HEADER — unified glass, no gap with status bar */
.chat-hb{display:flex;align-items:center;gap:6px;
padding:50px 10px 9px;flex-shrink:0;
background:var(--nav);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
border-bottom:1px solid var(--sep);position:sticky;top:0;z-index:50}
.chat-bk{display:flex;align-items:center;cursor:pointer;color:var(--accent);
padding:4px;background:none;border:none;flex-shrink:0}
.chat-bk svg{width:22px;height:22px;fill:var(--accent)}
.chat-nm{flex:1;font-size:16px;font-weight:600;color:var(--text);
text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-dt{padding:4px;cursor:pointer;background:none;border:none;flex-shrink:0}
.chat-dt svg{width:18px;height:18px;fill:var(--text3)}

/* CHAT BODY */
.cbody{flex:1;overflow-y:auto;padding:6px 10px 4px;
display:flex;flex-direction:column;gap:1px;
position:relative;background-size:cover;background-position:center}
.cbg-ov{position:absolute;inset:0;background:var(--bg);pointer-events:none;z-index:0;transition:opacity .3s}
.cbody>*{position:relative;z-index:1}

/* MESSAGES */
.mr{display:flex;flex-direction:column;margin-bottom:3px}
.mr.u{align-items:flex-end;animation:mu .3s cubic-bezier(.2,.8,.3,1)}
.mr.c{align-items:flex-start;animation:mc .3s cubic-bezier(.2,.8,.3,1)}
.mr.s{align-items:center;animation:ms .22s ease}
@keyframes mu{from{opacity:0;transform:translateX(26px) scale(.92)}to{opacity:1;transform:none}}
@keyframes mc{from{opacity:0;transform:translateX(-26px) scale(.92)}to{opacity:1;transform:none}}
@keyframes ms{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.mw{display:flex;align-items:flex-end;gap:5px;max-width:80%}
.mr.u .mw{flex-direction:row-reverse}
.mav{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;
background:var(--card2);display:flex;align-items:center;justify-content:center}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:14px;height:14px;fill:var(--text3)}
.bub{padding:9px 13px;font-size:14px;line-height:1.45;word-break:break-word;
border-radius:19px;cursor:pointer;transition:transform .1s;max-width:100%}
.bub:active{transform:scale(.97)}
.mr.u .bub{background:var(--bu);color:#fff;border-bottom-right-radius:4px}
.mr.c .bub{background:var(--bc);color:var(--bct);border-bottom-left-radius:4px}
.mts{font-size:9px;color:var(--text3);margin-top:2px}
.mr.u .mts{text-align:right;padding-right:33px}
.mr.c .mts{text-align:left;padding-left:33px}

/* SYS MSG */
.sm-w{padding:2px 8px;text-align:center;max-width:90%;cursor:pointer}
.sm-i{background:rgba(118,118,128,.1);border-radius:8px;padding:4px 10px;
border:1px solid var(--sep);font-size:11px;color:var(--text3);
line-height:1.45;transition:transform .12s}
.sm-i:active{transform:scale(.97)}
.sm-tag{display:inline-block;background:var(--accent);color:#fff;
font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;
margin-bottom:2px;letter-spacing:.3px}

/* RED PACKET */
.rp-bub{background:var(--bg2) !important;color:var(--text) !important;
padding:0 !important;border-radius:17px !important;overflow:hidden;
min-width:178px;border:1px solid var(--sep) !important;
cursor:pointer;position:relative}
.rp-banner{background:linear-gradient(135deg,#f5a623,#f7ca5a);
padding:13px 13px 11px;display:flex;align-items:center;gap:10px}
.rp-ico{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.22);
display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rp-ico svg{width:20px;height:20px;fill:#fff}
.rp-in{flex:1;min-width:0}
.rp-note{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp-amt{font-size:12px;color:rgba(255,255,255,.78);margin-top:1px}
.rp-ft{padding:7px 13px;font-size:10px;color:var(--text3);
display:flex;align-items:center;justify-content:space-between}
.rp-ft-l{display:flex;align-items:center;gap:4px}
.rp-ft-l svg{width:10px;height:10px;fill:var(--text3)}
.rp-recv-ov{position:absolute;inset:0;background:rgba(0,0,0,.52);
border-radius:17px;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:4px;backdrop-filter:blur(3px)}
.rp-recv-ring{width:38px;height:38px;border-radius:50%;
background:linear-gradient(135deg,#f5a623,#f7ca5a);
display:flex;align-items:center;justify-content:center;
box-shadow:0 2px 10px rgba(245,166,35,.4)}
.rp-recv-ring svg{width:20px;height:20px;fill:#fff}
.rp-recv-lbl{color:#fff;font-size:12px;font-weight:600}
.rp-recv-sub{color:rgba(255,255,255,.65);font-size:10px}

/* VOICE */
.vb{display:flex;align-items:center;gap:8px;min-width:80px;padding:9px 13px !important}
.vw{display:flex;align-items:center;gap:2px;height:16px}
.vw i{width:2.5px;border-radius:2px;background:currentColor;opacity:.5;display:block}
.vd{font-size:11px;opacity:.62;flex-shrink:0}

/* IMAGE */
.ib{padding:3px !important;border-radius:15px !important;overflow:hidden;cursor:pointer;position:relative}
.ib img{width:160px;max-height:155px;object-fit:cover;border-radius:12px;display:block}
.ib-ov{position:absolute;inset:3px;background:rgba(0,0,0,.65);border-radius:12px;
display:none;align-items:center;justify-content:center;padding:10px;
color:#fff;font-size:11px;text-align:center;line-height:1.4;backdrop-filter:blur(4px)}
.ib.sd .ib-ov{display:flex}
.ib-ph{width:160px;height:100px;background:var(--card2);border-radius:12px;
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px}
.ib-ph svg{width:22px;height:22px;fill:var(--text3)}
.ib-ph span{font-size:10px;color:var(--text3)}

/* STICKER */
.skb{background:transparent !important;padding:2px !important}
.skb img{width:72px;height:72px;object-fit:contain}

/* CHAT INPUT */
.cib{display:flex;align-items:center;gap:5px;padding:6px 8px;
background:var(--nav);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
border-top:1px solid var(--sep);flex-shrink:0}
.cibtn{width:36px;height:36px;border-radius:50%;background:var(--input-bg);
display:flex;align-items:center;justify-content:center;
cursor:pointer;flex-shrink:0;border:none;transition:transform .12s,background .2s}
.cibtn:active{transform:scale(.83)}
.cibtn svg{width:16px;height:16px;fill:var(--text3);display:block}
.cibtn.ac{background:var(--accent)}
.cibtn.ac svg{fill:#fff}
.cibtn.gs{background:var(--green)}
.cibtn.gs svg{fill:#fff}
.cibtn.ld{animation:ld .9s infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.3}}
.ci-inp{flex:1;height:36px;border-radius:18px;border:1px solid var(--sep);
background:var(--bg2);padding:0 12px;font-size:13px;color:var(--text);outline:none}

/* FEAT TRAY */
.ft-tray{display:none;background:var(--nav);backdrop-filter:blur(30px);
border-top:1px solid var(--sep);flex-shrink:0;padding:10px 20px 12px}
.ft-tray.on{display:block}
.ft-row{display:flex;justify-content:space-around;gap:0}
.ft-row+.ft-row{margin-top:10px}
.ft-i{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex:1}
.ft-b{width:58px;height:58px;border-radius:15px;background:var(--card2);
border:1px solid var(--sep);display:flex;align-items:center;justify-content:center;
transition:transform .12s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ft-b:active{transform:scale(.87)}
.ft-b svg{width:26px;height:26px;fill:var(--text2);display:block}
.ft-i span{font-size:10px;color:var(--text3);font-weight:500}

/* STICKER PANEL */
.skp{display:none;position:absolute;bottom:0;left:0;right:0;height:155px;
background:var(--nav);backdrop-filter:blur(24px);border-top:1px solid var(--sep);
z-index:60;padding:8px;overflow-y:auto}
.skp.on{display:block}
.skg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.ski{display:flex;flex-direction:column;align-items:center;gap:2px;
cursor:pointer;padding:3px;border-radius:8px;transition:background .12s}
.ski:active{background:var(--input-bg)}
.ski img{width:44px;height:44px;object-fit:contain}
.ski span{font-size:8px;color:var(--text3);white-space:nowrap;overflow:hidden;
text-overflow:ellipsis;max-width:46px;text-align:center}

/* MSG LIST */
.mlist{padding:4px 14px 90px}
.mi{display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;
border-radius:14px;transition:background .15s;margin-bottom:1px}
.mi:active{background:var(--input-bg)}
.mia{width:46px;height:46px;border-radius:50%;flex-shrink:0;overflow:hidden;
background:var(--card2);display:flex;align-items:center;justify-content:center}
.mia img{width:100%;height:100%;object-fit:cover}
.mia svg{width:22px;height:22px;fill:var(--text3)}
.min{flex:1;min-width:0}
.mi-nm{font-size:15px;font-weight:600;color:var(--text)}
.mi-pr{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.mi-t{font-size:11px;color:var(--text3);flex-shrink:0;align-self:flex-start;margin-top:2px}

/* MOMENTS */
.mb-blur{position:absolute;top:0;left:0;right:0;height:54px;
background:linear-gradient(to bottom,rgba(0,0,0,.45),transparent);
z-index:22;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mb{width:100%;height:185px;position:relative;overflow:visible;
background:linear-gradient(135deg,#667eea,#764ba2)}
.mb img.mb-bg{width:100%;height:100%;object-fit:cover;display:block}
.mb-gr{position:absolute;inset:0;background:linear-gradient(transparent 45%,rgba(0,0,0,.38))}
.mb-bot{position:absolute;bottom:-26px;right:14px;display:flex;align-items:flex-end;gap:8px}
.mb-un{font-size:16px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);
margin-bottom:9px;cursor:pointer}
.mb-av{width:54px;height:54px;border-radius:10px;overflow:hidden;
background:var(--card);border:3px solid var(--bg);cursor:pointer;
display:flex;align-items:center;justify-content:center}
.mb-av img{width:100%;height:100%;object-fit:cover}
.mb-av svg{width:22px;height:22px;fill:var(--text3)}
.m-sig{text-align:right;padding:32px 14px 7px;font-size:11px;color:var(--text3);cursor:pointer}
.mfeed{padding:0 0 90px;background:var(--bg)}
.mitem{padding:11px 14px;border-bottom:1px solid var(--sep);
display:flex;gap:9px;cursor:pointer;background:var(--bg)}
.mitem-av{width:38px;height:38px;border-radius:7px;flex-shrink:0;overflow:hidden;
background:var(--card2);display:flex;align-items:center;justify-content:center}
.mitem-av img{width:100%;height:100%;object-fit:cover}
.mitem-av svg{width:18px;height:18px;fill:var(--text3)}
.mr2{flex:1;min-width:0}
.m-au{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:3px}
.m-tx{font-size:13px;color:var(--text);line-height:1.45;margin-bottom:5px;word-break:break-word}

function _id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function e(ev){ev&&ev.stopPropagation&&ev.stopPropagation()}
function $(id){return document.getElementById(id)}
function bjt(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Shanghai'}))}
function ft(d){d=d||bjt();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fd(d){d=d||bjt();return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function fmtS(s){s=s||0;return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

function save(){try{localStorage.setItem('mp6',JSON.stringify(D))}catch(x){}}
function load(){
try{
var s=localStorage.getItem('mp6');
if(!s)return;
var p=JSON.parse(s);
// deep assign key by key
['theme','pw','ph','pr','wallpaper','diArt','aApi','songI','playing','curChat','curMom'].forEach(function(k){if(p[k]!==undefined)D[k]=p[k]});
if(p.user)Object.assign(D.user,p.user);
if(p.chars)D.chars=p.chars;
if(p.moments)D.moments=p.moments;
if(p.apis)D.apis=p.apis;
if(p.wb)Object.assign(D.wb,p.wb);
if(p.wbOrder)D.wbOrder=p.wbOrder;
if(p.cust)Object.assign(D.cust,p.cust);
if(p.stickers)D.stickers=p.stickers;
if(p.wallet)Object.assign(D.wallet,p.wallet);
}catch(x){}
}

function toast(m){
var t=$('toast');t.textContent=m;t.classList.add('on');
clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on')},2400);
}

load();

updateClock();setInterval(updateClock,12000);

if(D.cust.hideSys)$('tog-hs').classList.add('on');
if(D.cust.syncT)$('tog-st').classList.add('on');
if(D.cust.musicSys)$('tog-ms').classList.add('on');
if(D.cust.crossR)$('tog-cr').classList.add('on');
if(D.theme==='dark')$('tog-th').classList.add('on');
$('pw-r').value=D.pw;$('ph-r').value=D.ph;$('pr-r').value=D.pr;
$('pw-b').textContent=D.pw;$('ph-b').textContent=D.ph;$('pr-b').textContent=D.pr;
// global click: close DI and map
$('phone').addEventListener('click',function(ev){
var di=$('di');
if(di.classList.contains('exp')&&!di.contains(ev.target))di.classList.remove('exp');
var mp=$('map');
if(mp.classList.contains('on')&&!mp.contains(ev.target))mp.classList.remove('on');
});
}

function si(id,src){var i=$(id);if(i){i.src=src;i.style.display='block'}}

var s=D.wb.music[D.songI];
$('dif-nm').textContent=s.name;$('dif-ar').textContent=s.artist||'';$('di-sn').textContent=s.name;

function updPlBtn(){

?'<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#fff"/></svg>'

function sendMuSys(s){

// ---- RED PACKET ----
// char→user: click to receive
function clkRP(ev,idx){
ev.stopPropagation();
var ch=gch(D.curChat);if(!ch)return;
var m=ch.msgs[idx];
if(m.role==='char'&&!m.recv){
m.recv=true;
var amt=parseFloat(m.amount)||0;
D.wallet.balance+=amt;
D.wallet.txns.push({type:'recv',from:ch.nick||ch.name,amount:amt,note:m.note||'',time:ft()+' '+fd()});
// Add system note (not the RP prompt — only tells user they received)
var sysC='已领取 '+(ch.nick||ch.name)+' 的红包 ¥'+amt;
ch.msgs.push({role:'system',content:sysC,time:ft()});
ch.lastM='[领取红包]';ch.lastT=ft();
save();renderBub();toast('已领取 ¥'+amt);
}
// user→char: no click needed, char auto-receives when AI responds
}

function sendMsg(){
var inp=$('ci-inp'),txt=inp.value.trim();if(!txt)return;
var ch=gch(D.curChat);if(!ch)return;
ch.msgs.push({role:'user',type:'text',content:txt,time:ft()});
ch.lastM=txt;ch.lastT=ft();inp.value='';save();renderBub();
$('ft-tray').classList.remove('on');$('skp').classList.remove('on');
}

function openRP(){
$('ft-tray').classList.remove('on');
showBS('<div class="bs-hd"></div><div class="mt">发红包</div><div class="fg"><div class="fl">金额（元）</div><input class="fi" id="rp-a" type="number" placeholder="0.00" min="0"></div><div class="fg"><div class="fl">备注</div><input class="fi" id="rp-n" value="恭喜发财"></div><button class="fbtn" onclick="sendRP()">发送</button>');
}
function sendRP(){
var a=$('rp-a').value,n=$('rp-n').value||'恭喜发财';
var ch=gch(D.curChat);if(!ch)return;
var amt=parseFloat(a)||0;
if(amt<=0){toast('请输入金额');return}
D.wallet.balance-=amt;
D.wallet.txns.push({type:'send',to:ch.nick||ch.name,amount:amt,note:n,time:ft()+' '+fd()});
ch.msgs.push({role:'user',type:'redpacket',amount:a,note:n,time:ft(),content:'[红包:'+a+':'+n+']',charRecv:false});
ch.lastM='[红包 ¥'+a+']';ch.lastT=ft();
save();closeBS();renderBub();
}

function showMA(ev,idx){

function buildPr(ch){
var sys='';
// wbOrder — exclude sumP always
var excluded=['sumP'];
var ordered=D.wbOrder.slice();
['chatSys','chatFmt','charFmt','rpFmt','rpRecvP','voFmt','imgFmt','stkP'].forEach(function(k){if(ordered.indexOf(k)<0)ordered.push(k)});
ordered.forEach(function(k){
if(excluded.indexOf(k)>=0)return;
if(!D.cust.enRP&&(k==='rpFmt'||k==='rpRecvP'))return;
if(!D.cust.enVo&&k==='voFmt')return;
if(!D.cust.enImg&&k==='imgFmt')return;
if(!D.cust.enStk&&k==='stkP')return;
if(D.wb[k])sys+=D.wb[k]+'\n\n';
});
// Sticker list
if(D.cust.enStk){
if(D.stickers.length>0){
sys+='【可用表情列表（type:sticker时name只能从下列选）】\n';
D.stickers.forEach(function(s){sys+=s.name+': '+s.url+'\n'});
sys+='\n';
} else {
sys+='【当前没有可用表情包，禁止发送type为sticker的消息】\n\n';
}
}
sys+='【角色信息】\n角色名：'+ch.name+'\n';
if(ch.nick)sys+='备注：'+ch.nick+'\n';
sys+='设定：'+ch.persona+'\n\n';
if(ch.memory)sys+='【记忆摘要】\n'+ch.memory+'\n\n';
// User info
sys+='【用户信息】\n用户名：'+(D.user.name||'用户')+'\n';
if(ch.isCouple)sys+='备注：你和用户是情侣关系（情头）\n';
sys+='\n';
if(D.cust.syncT)sys+='【当前时间】北京时间 '+ft()+' '+fd()+'\n\n';
var msgs=[{role:'system',content:sys}];
var recent=ch.msgs.slice(-(ch.ctxL||20));
recent.forEach(function(m){
if(m.role==='system')msgs.push({role:'system',content:m.content});
else if(m.role==='user')msgs.push({role:'user',content:m.content});
else msgs.push({role:'assistant',content:m.content});
});
return msgs;
}

function callAPI(msgs,p){
var url=p.url.replace(/\/+$/,'')+'/v1/chat/completions';
var h={'Content-Type':'application/json'};if(p.key)h['Authorization']='Bearer '+p.key;
return fetch(url,{method:'POST',headers:h,body:JSON.stringify({model:p.model||'gpt-4o-mini',messages:msgs,temperature:p.temp!=null?p.temp:.7,max_tokens:1200})})
.then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
.then(function(d){return d.choices&&d.choices[0]?d.choices[0].message.content||'':''});
}

function parseR(ch,resp){
var parsed=[];
try{
var cl=resp.replace(/```json\n?/gi,'').replace(/```\n?/g,'').trim();
// Try to find JSON array
var start=cl.indexOf('[');var end=cl.lastIndexOf(']');
if(start>=0&&end>start)cl=cl.slice(start,end+1);
var arr=JSON.parse(cl);
if(!Array.isArray(arr))arr=[arr];
arr.forEach(function(item){
if(!item)return;
if(item.type==='redpacket'){
parsed.push({role:'char',type:'redpacket',amount:item.amount||'',note:item.note||'恭喜发财',content:'[红包:'+item.amount+':'+item.note+']',time:ft(),recv:false});
} else if(item.type==='voice'){
var dur=item.dur||Math.max(1,Math.ceil((item.content||'').length/3))+'″';
parsed.push({role:'char',type:'voice',content:item.content||'',dur:dur,time:ft()});
} else if(item.type==='image'){
parsed.push({role:'char',type:'image',desc:item.desc||'',src:null,content:'[图片:'+item.desc+']',time:ft()});
} else if(item.type==='sticker'){
// Only use if sticker actually exists
var st=D.stickers.find(function(x){return x.name===item.name});
if(st){parsed.push({role:'char',type:'sticker',url:st.url,content:'[sticker:'+item.name+']',time:ft()})}
else{parsed.push({role:'char',type:'text',content:'[表情]',time:ft()})}
} else {
var c=item.msg||item.message||item.content||item.text;
if(typeof c==='string'&&c)parsed.push({role:'char',type:'text',content:c,time:ft()});
}
});
} catch(ex){
// Plain text fallback
if(resp.trim())parsed.push({role:'char',type:'text',content:resp.trim(),time:ft()});
}
if(!parsed.length){parsed.push({role:'char',type:'text',content:resp||'…',time:ft()})}
parsed.forEach(function(p){ch.msgs.push(p)});
if(parsed.length){var l=parsed[parsed.length-1];ch.lastM=l.type==='text'?l.content:'['+l.type+']';ch.lastT=ft()}
// Auto-mark user's unrecv'd redpacket as received by char (user sent to char)
ch.msgs.forEach(function(m){
if(m.role==='user'&&m.type==='redpacket'&&!m.charRecv){m.charRecv=true}
});
if(ch.autoS&&ch.msgs.length>0&&ch.msgs.length%ch.sumI===0)autoSum(ch);
}

.then(function(r){ch.memory=(ch.memory?ch.memory+'\n---\n':'')+r;save();toast('自动总结完成')}).catch(function(){});
}

function chkAuto(){
var now=Date.now();
D.chars.forEach(function(ch){
if(!ch.autoMsg||!ch.autoMsgMin)return;

for(var i=ch.msgs.length-1;i>=0;i--){if(ch.msgs[i].role==='user'||ch.msgs[i].role==='char'){lastU=ch.msgs[i];break}}
