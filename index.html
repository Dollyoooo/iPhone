<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>小手机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#f2f2f7;--bg2:rgba(255,255,255,.72);--bg3:rgba(255,255,255,.55);--text:#000;--text2:#3c3c43;--text3:#8e8e93;
--card:rgba(255,255,255,.65);--card2:rgba(255,255,255,.45);--nav:rgba(245,245,249,.82);--sep:rgba(60,60,67,.12);
--accent:#007aff;--bubble-user:#007aff;--bubble-char:rgba(229,229,234,.85);--bubble-char-text:#000;
--red:#ff3b30;--green:#34c759;--overlay:rgba(0,0,0,.3);--input-bg:rgba(118,118,128,.12);
--glass:rgba(255,255,255,.6);--glass-border:rgba(255,255,255,.3);
transition:all .4s ease;
}
.dark{
--bg:#000;--bg2:rgba(28,28,30,.78);--bg3:rgba(44,44,46,.65);--text:#fff;--text2:rgba(235,235,245,.6);--text3:#636366;
--card:rgba(44,44,46,.65);--card2:rgba(58,58,60,.5);--nav:rgba(22,22,24,.88);--sep:rgba(84,84,88,.35);
--bubble-char:rgba(58,58,60,.8);--bubble-char-text:#fff;--overlay:rgba(0,0,0,.55);--input-bg:rgba(118,118,128,.24);
--glass:rgba(44,44,46,.55);--glass-border:rgba(84,84,88,.3);
}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif}
#phone{width:360px;height:580px;border-radius:46px;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 0 3px #222,0 20px 60px rgba(0,0,0,.5);transition:background .4s}
#phone *{scrollbar-width:none}
#phone *::-webkit-scrollbar{display:none}
.wallpaper-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;border-radius:46px;transition:opacity .3s}
.status-bar{position:absolute;top:0;left:0;right:0;height:44px;display:flex;justify-content:space-between;align-items:center;padding:12px 28px 0;z-index:100;color:var(--text);font-size:12px;font-weight:600}
.status-left{display:flex;align-items:center;gap:4px}
.status-right{display:flex;align-items:center;gap:5px}
.status-right svg{width:16px;height:12px;fill:var(--text)}
.dynamic-island{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#000;border-radius:20px;z-index:200;display:flex;align-items:center;justify-content:center;gap:6px;padding:0 10px;cursor:pointer;transition:width .3s,height .3s}
.dynamic-island.expanded{width:200px;height:56px;border-radius:24px;top:4px}
.di-dot{width:6px;height:6px;background:#4cd964;border-radius:50%}
.di-info{color:#fff;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.di-controls{display:none;gap:8px;align-items:center}
.dynamic-island.expanded .di-controls{display:flex}
.dynamic-island.expanded .di-info{max-width:100px;font-size:10px}
.di-btn{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;padding:2px 4px}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;z-index:10;transition:opacity .25s,transform .25s}
.screen.active{display:flex}
.screen-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* Bottom Nav */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:72px;background:var(--nav);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;justify-content:space-around;align-items:flex-start;padding-top:8px;z-index:90;border-top:1px solid var(--sep)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text3);transition:color .2s;-webkit-user-select:none;user-select:none}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:24px;height:24px;fill:currentColor}
.nav-item span{font-size:10px;font-weight:500}
/* Home Screen */
.home-screen{padding-top:44px}
.home-time{text-align:center;margin-top:40px;font-size:58px;font-weight:700;color:var(--text);letter-spacing:-2px;line-height:1}
.home-date{text-align:center;font-size:14px;color:var(--text2);margin-top:4px;font-weight:500}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:30px 24px 80px;margin-top:20px}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.app-icon-img{width:52px;height:52px;border-radius:14px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;border:1px solid var(--glass-border);transition:transform .15s,background .3s}
.app-icon-img:active{transform:scale(.88)}
.app-icon-img svg{width:26px;height:26px;fill:var(--text3)}
.dark .app-icon-img svg{fill:#ccc}
.app-icon span{font-size:10px;color:var(--text);font-weight:500}
/* Messages List */
.msg-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;margin-top:44px}
.msg-header-title{font-size:17px;font-weight:700;color:var(--text)}
.hdr-btn{width:32px;height:32px;border-radius:50%;background:var(--card2);backdrop-filter:blur(10px);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr-btn svg{width:16px;height:16px;fill:var(--text3)}
.msg-list{padding:4px 16px 80px}
.msg-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--card);backdrop-filter:blur(16px);border-radius:16px;margin-bottom:6px;cursor:pointer;border:1px solid var(--glass-border);transition:transform .12s}
.msg-item:active{transform:scale(.97)}
.msg-avatar{width:44px;height:44px;border-radius:50%;background:var(--card2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-avatar svg{width:22px;height:22px;fill:var(--text3)}
.msg-info{flex:1;min-width:0}
.msg-name{font-size:15px;font-weight:600;color:var(--text)}
.msg-preview{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.msg-time{font-size:11px;color:var(--text3);flex-shrink:0}
/* Chat Screen */
.chat-screen{background:var(--bg)}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:44px;margin-top:44px;flex-shrink:0}
.chat-header-left{display:flex;align-items:center;gap:6px}
.chat-back{cursor:pointer;display:flex;align-items:center;padding:4px}
.chat-back svg{width:20px;height:20px;fill:var(--accent)}
.chat-char-name{font-size:16px;font-weight:600;color:var(--text)}
.chat-dots{cursor:pointer;padding:8px}
.chat-dots svg{width:18px;height:18px;fill:var(--text3)}
.chat-messages{flex:1;overflow-y:auto;padding:8px 12px 4px;display:flex;flex-direction:column;gap:3px}
.chat-bubble-wrap{display:flex;align-items:flex-end;gap:6px;max-width:82%}
.chat-bubble-wrap.user{align-self:flex-end;flex-direction:row-reverse}
.chat-bubble-wrap.char{align-self:flex-start}
.chat-bubble-wrap.system{align-self:center;max-width:90%}
.chat-bubble-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2);display:flex;align-items:center;justify-content:center}
.chat-bubble-avatar img{width:100%;height:100%;object-fit:cover}
.chat-bubble{padding:8px 12px;border-radius:18px;font-size:14px;line-height:1.38;word-break:break-word;position:relative}
.chat-bubble-wrap.user .chat-bubble{background:var(--bubble-user);color:#fff;border-bottom-right-radius:6px}
.chat-bubble-wrap.char .chat-bubble{background:var(--bubble-char);color:var(--bubble-char-text);border-bottom-left-radius:6px;backdrop-filter:blur(8px)}
.chat-bubble-wrap.system .chat-bubble{background:var(--card2);color:var(--text3);font-size:11px;border-radius:10px;text-align:center;backdrop-filter:blur(8px)}
.chat-bubble .time-tag{font-size:9px;opacity:.6;margin-top:3px;display:block;text-align:right}
.chat-bubble-wrap.char .chat-bubble .time-tag{text-align:left}
/* Red Packet */
.red-packet{background:linear-gradient(135deg,#fa4238,#e8352a)!important;color:#fff!important;border-radius:14px!important;padding:12px 14px!important;min-width:160px;cursor:pointer}
.dark .red-packet{background:linear-gradient(135deg,#c0392b,#a93226)!important}
.rp-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:4px}
.rp-note{font-size:11px;opacity:.85;margin-top:4px}
.rp-line{height:1px;background:rgba(255,255,255,.25);margin:6px 0}
.rp-bottom{font-size:10px;opacity:.7}
/* Voice */
.voice-msg{display:flex;align-items:center;gap:6px;min-width:100px;cursor:pointer}
.voice-bars{display:flex;align-items:center;gap:2px;height:20px}
.voice-bar{width:3px;background:currentColor;border-radius:2px;opacity:.7}
.voice-dur{font-size:11px;opacity:.7}
/* Image msg */
.img-msg{border-radius:12px!important;padding:4px!important;overflow:hidden;cursor:pointer}
.img-msg img{width:160px;max-height:160px;object-fit:cover;border-radius:10px;display:block}
/* Sticker msg */
.sticker-msg{background:transparent!important;padding:4px!important}
.sticker-msg img{width:100px;height:100px;object-fit:contain}
/* Chat Input */
.chat-input-area{display:flex;align-items:center;gap:6px;padding:6px 10px 24px;background:var(--nav);backdrop-filter:blur(24px);border-top:1px solid var(--sep);flex-shrink:0}
.chat-plus{width:30px;height:30px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-plus svg{width:16px;height:16px;fill:var(--text3)}
.chat-input{flex:1;height:34px;border-radius:18px;border:1px solid var(--sep);background:var(--card);padding:0 12px;font-size:14px;color:var(--text);outline:none;backdrop-filter:blur(8px)}
.chat-send-btn{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-send-btn svg{width:14px;height:14px;fill:#fff}
.chat-ai-btn{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative}
.chat-ai-btn svg{width:14px;height:14px;fill:#fff}
.chat-ai-btn.loading{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-voice-btn{width:30px;height:30px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-voice-btn svg{width:14px;height:14px;fill:var(--text3)}
/* Features Panel */
.features-panel{display:none;padding:8px 16px 4px;background:var(--nav);backdrop-filter:blur(20px);gap:16px;flex-shrink:0;flex-wrap:wrap}
.features-panel.show{display:flex}
.feat-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.feat-item-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.feat-item-icon svg{width:22px;height:22px;fill:#fff}
.feat-item span{font-size:10px;color:var(--text3)}
/* Moments */
.moments-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;margin-top:44px}
.moments-bg{width:100%;height:180px;background:var(--card2);position:relative;overflow:hidden}
.moments-bg img{width:100%;height:100%;object-fit:cover}
.moments-user-info{position:absolute;bottom:-22px;right:16px;display:flex;align-items:flex-end;gap:8px}
.moments-user-avatar{width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--card);border:2px solid var(--bg)}
.moments-user-avatar img{width:100%;height:100%;object-fit:cover}
.moments-sig{font-size:11px;color:var(--text3);text-align:right;padding:26px 16px 6px 0}
.moments-feed{padding:4px 12px 80px}
.moment-card{background:var(--card);backdrop-filter:blur(16px);border-radius:16px;padding:12px;margin-bottom:8px;border:1px solid var(--glass-border);cursor:pointer}
.moment-top{display:flex;gap:10px;align-items:flex-start}
.moment-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2)}
.moment-avatar img{width:100%;height:100%;object-fit:cover}
.moment-author{font-size:14px;font-weight:600;color:var(--text)}
.moment-text{font-size:13px;color:var(--text);margin-top:4px;line-height:1.4}
.moment-img{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-top:6px}
.moment-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.moment-time{font-size:11px;color:var(--text3)}
.moment-actions{display:flex;gap:12px}
.moment-action-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px}
.moment-action-btn svg{width:14px;height:14px;fill:var(--text3)}
.moment-comments{margin-top:8px;padding:8px;background:var(--card2);border-radius:10px}
.moment-comment{font-size:12px;color:var(--text);margin-bottom:4px;line-height:1.35}
.moment-comment b{color:var(--accent);font-weight:600;cursor:pointer}
.moments-fab{position:absolute;bottom:80px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 14px rgba(0,122,255,.4);z-index:50}
.moments-fab svg{width:20px;height:20px;fill:#fff}
/* Moment Detail */
.md-header{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:44px;margin-top:44px;flex-shrink:0}
.md-content{flex:1;overflow-y:auto;padding:12px}
.md-input-area{display:flex;align-items:center;gap:6px;padding:6px 10px 24px;background:var(--nav);backdrop-filter:blur(24px);border-top:1px solid var(--sep);flex-shrink:0}
/* Settings */
.settings-list{padding:12px 16px 80px}
.settings-group{background:var(--card);backdrop-filter:blur(16px);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--glass-border)}
.settings-group-title{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:8px 16px 4px;letter-spacing:.5px}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--sep);cursor:pointer}
.settings-item:last-child{border-bottom:none}
.settings-item-left{display:flex;align-items:center;gap:10px;color:var(--text);font-size:14px}
.settings-item-left svg{width:18px;height:18px;fill:var(--accent)}
.settings-item-right{display:flex;align-items:center;gap:4px;color:var(--text3);font-size:13px}
.settings-item-right svg{width:14px;height:14px;fill:var(--text3)}
.toggle{width:44px;height:26px;border-radius:13px;background:var(--input-bg);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle-knob{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-knob{left:20px}
/* Modal */
.modal-overlay{position:absolute;inset:0;background:var(--overlay);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{width:100%;max-height:85%;background:var(--nav);backdrop-filter:blur(40px);border-radius:20px 20px 0 0;padding:16px;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;color:var(--text);text-align:center;margin-bottom:12px}
.modal-close{position:absolute;top:16px;right:16px;background:var(--input-bg);border:none;width:28px;height:28px;border-radius:50%;color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-group{margin-bottom:10px}
.form-label{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.form-input{width:100%;height:34px;border-radius:10px;border:1px solid var(--sep);background:var(--card);padding:0 10px;font-size:13px;color:var(--text);outline:none}
.form-textarea{width:100%;border-radius:10px;border:1px solid var(--sep);background:var(--card);padding:8px 10px;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:60px;font-family:inherit}
.form-btn{width:100%;height:38px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .15s}
.form-btn:active{opacity:.7}
.form-btn.danger{background:var(--red)}
.avatar-upload{width:60px;height:60px;border-radius:50%;background:var(--card2);border:2px dashed var(--sep);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin:0 auto 8px}
.avatar-upload img{width:100%;height:100%;object-fit:cover}
.avatar-upload svg{width:24px;height:24px;fill:var(--text3)}
/* World Book */
.wb-section{margin-bottom:12px}
.wb-section-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
/* Color picker */
.color-row{display:flex;align-items:center;gap:8px}
.color-preview{width:30px;height:30px;border-radius:8px;border:2px solid var(--sep);cursor:pointer}
/* Sticker panel */
.sticker-panel{display:none;position:absolute;bottom:70px;left:0;right:0;height:180px;background:var(--nav);backdrop-filter:blur(24px);border-top:1px solid var(--sep);z-index:60;padding:8px;overflow-y:auto}
.sticker-panel.show{display:block}
.sticker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sticker-grid-item{width:100%;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;background:var(--card2);display:flex;align-items:center;justify-content:center}
.sticker-grid-item img{width:90%;height:90%;object-fit:contain}
/* Toast */
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:500;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
/* Scroll indicator */
.scroll-top-shadow{position:absolute;top:88px;left:0;right:0;height:12px;background:linear-gradient(var(--bg),transparent);z-index:20;pointer-events:none}
/* API Profile chip */
.api-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--card);border-radius:8px;font-size:12px;color:var(--text);border:1px solid var(--sep);cursor:pointer;margin:2px}
.api-chip.active{border-color:var(--accent);background:rgba(0,122,255,.1)}
/* Range slider */
.range-slider{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--sep);outline:none}
.range-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.context-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;background:var(--accent);color:#fff;border-radius:6px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<div id="phone">
<div class="wallpaper-bg" id="wallpaperBg"></div>
<div class="status-bar" id="statusBar">
<div class="status-left"><span id="statusTime">9:41</span></div>
<div class="status-right">
<svg viewBox="0 0 18 14"><path d="M1 10.5c2.7-3.3 5.8-5 9-5s6.3 1.7 9 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4.5 13c1.6-2 3.4-3 5.5-3s3.9 1 5.5 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="10" cy="16" r="1.2"/></svg>
<svg viewBox="0 0 20 14"><rect x="1" y="6" width="3" height="8" rx="1"/><rect x="6" y="3" width="3" height="11" rx="1"/><rect x="11" y="0" width="3" height="14" rx="1"/><rect x="16" y="4" width="3" height="10" rx="1" opacity=".3"/></svg>
<svg viewBox="0 0 28 14"><rect x="1" y="1" width="22" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="24" y="4.5" width="2.5" height="5" rx="1"/><rect x="3" y="3" width="14" height="8" rx="1.5" fill="var(--green)"/></svg>
</div>
</div>
<div class="dynamic-island" id="dynamicIsland" onclick="toggleDI()">
<div class="di-dot" id="diDot" style="display:none"></div>
<div class="di-info" id="diInfo"></div>
<div class="di-controls">
<button class="di-btn" onclick="event.stopPropagation();musicPrev()">◁</button>
<button class="di-btn" id="diPlayBtn" onclick="event.stopPropagation();musicToggle()">▷</button>
<button class="di-btn" onclick="event.stopPropagation();musicNext()">▷▷</button>
</div>
</div>
<div class="toast" id="toast"></div>

  worldBook:{
    chatSystemPrompt:'你是一个角色扮演助手。请根据角色设定，以角色的身份回复用户的消息。每次回复1-3条消息，每条消息控制在20-80字。用JSON数组格式回复，如：[{"msg":"消息内容"}]',
    chatFormatPrompt:'回复格式要求：请用JSON数组格式回复，每个元素包含msg字段。示例：[{"msg":"你好啊"},{"msg":"今天怎么样？"}]',
    momentsPostPrompt:'请根据角色设定生成一条朋友圈动态，要符合角色性格。用JSON格式：{"content":"朋友圈内容"}',
    momentsReplyPrompt:'请根据角色设定，对这条朋友圈动态进行评论回复。每个角色回复1条，用JSON数组格式：[{"name":"角色名","content":"评论内容"}]',
    summaryPrompt:'请总结以下对话内容，提取关键信息、情感变化和重要事件，生成简洁的记忆摘要（200字以内）：',
    stickerPrompt:'角色在聊天时可以发送表情包。可用的表情包列表如下，只能从中选择，不可编造。发送表情包时格式为[sticker:表情包名称]。表情包列表：',
    redPacketFormat:'当用户发送红包时，格式为[红包:金额:备注]。请对红包做出符合角色性格的回应。',
    voiceFormat:'当用户发送语音消息时，格式为[语音:语音内容]。请对语音消息做出回应。',
    imageFormat:'当用户发送图片时，格式为[图片:图片描述]。请根据描述对图片做出回应。',
    musicUrls:[]
  },
  customization:{
    userBubbleColor:'#007aff',charBubbleColor:'',
    enableStickers:true,enableRedPacket:true,enableVoice:true,enableImage:true,
    syncTime:false,crossReply:true
  },
  stickers:[],currentSongIndex:0,isPlaying:false,
  currentChatId:null,currentMomentId:null

function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function bjTime(){const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Shanghai"}));return d}
function fmtTime(d){if(!d)d=bjTime();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function fmtDate(d){if(!d)d=bjTime();const days=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];return days[d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日'}

// ===== PERSISTENCE =====
function saveState(){try{localStorage.setItem('miniphone',JSON.stringify(S))}catch(e){}}
function loadState(){try{const d=localStorage.getItem('miniphone');if(d){const p=JSON.parse(d);Object.assign(S,p)}}catch(e){}}

// ===== INIT =====
loadState();
function init(){
  applyTheme();updateTime();setInterval(updateTime,10000);
  renderMsgList();renderMoments();renderFeatureToggles();

// ===== AI TRIGGER =====
async function triggerAI(){
  const ch=S.characters.find(c=>c.id===S.currentChatId);if(!ch)return;
  const profile=S.apiProfiles[S.activeApiProfile];
  if(!profile||!profile.url){toast('请先配置API');return}
  const btn=document.getElementById('chatAiBtn');
  btn.classList.add('loading');
  try{
    const msgs=buildPrompt(ch);
    const resp=await callAPI(msgs,profile);
    parseAndAddResponse(ch,resp);
    // Auto summary check
    if(ch.autoSummary&&ch.messages.length>0&&ch.messages.length%ch.summaryInterval===0){
      await autoSummarize(ch);
    }
  }catch(e){
    toast('API错误: '+e.message);
    ch.messages.push({role:'system',content:'[API响应失败: '+e.message+']',time:fmtTime()});
  }
  btn.classList.remove('loading');
  saveState();renderMessages();renderMsgList();
}

function buildPrompt(ch){
  let msgs=[];
  // System prompt
  let sys=S.worldBook.chatSystemPrompt+'\n\n';
  sys+='角色名：'+ch.name+'\n';
  if(ch.nickname)sys+='备注：'+ch.nickname+'\n';
  sys+='角色设定：\n'+ch.persona+'\n\n';
  if(ch.memory)sys+='记忆摘要：\n'+ch.memory+'\n\n';
  sys+=S.worldBook.chatFormatPrompt+'\n';
  // Feature prompts
  if(S.customization.enableRedPacket)sys+='\n'+S.worldBook.redPacketFormat;
  if(S.customization.enableVoice)sys+='\n'+S.worldBook.voiceFormat;
  if(S.customization.enableImage)sys+='\n'+S.worldBook.imageFormat;
  if(S.customization.enableStickers&&S.stickers.length){
    sys+='\n'+S.worldBook.stickerPrompt+'\n';
    sys+=S.stickers.map(s=>s.name+': '+s.url).join('\n');
  }
  if(S.customization.syncTime)sys+='\n\n当前北京时间：'+fmtTime()+' '+fmtDate();
  msgs.push({role:'system',content:sys});
  // Context messages
  const recent=ch.messages.slice(-ch.contextLength);
  recent.forEach(m=>{
    if(m.role==='system')msgs.push({role:'system',content:m.content});
    else if(m.role==='user')msgs.push({role:'user',content:m.content});
    else msgs.push({role:'assistant',content:m.content});
  });
  return msgs;
}

async function callAPI(messages,profile){
  const url=profile.url.replace(/\/+$/,'')+'/v1/chat/completions';
  const headers={'Content-Type':'application/json'};
  if(profile.key)headers['Authorization']='Bearer '+profile.key;
  const body={model:profile.model||'gpt-3.5-turbo',messages,temperature:profile.temperature||0.7,max_tokens:1024};
  const resp=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!resp.ok){const t=await resp.text();throw new Error(resp.status+' '+t.substring(0,100))}
  const data=await resp.json();
  return data.choices?.[0]?.message?.content||'';
}

function parseAndAddResponse(ch,resp){
  let parsed=[];
  try{
    // Try JSON parse
    const clean=resp.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
    const arr=JSON.parse(clean);
    if(Array.isArray(arr)){
      arr.forEach(item=>{
        const content=item.msg||item.message||item.content||JSON.stringify(item);
        if(content.startsWith('[sticker:')){
          const name=content.match(/\[sticker:(.*?)\]/)?.[1];
          const st=S.stickers.find(s=>s.name===name);
          parsed.push({role:'char',type:'sticker',url:st?st.url:'',content,time:fmtTime()});
        }else{
          parsed.push({role:'char',type:'text',content,time:fmtTime()});
        }
      });
    }
  }catch(e){
    // Plain text response
    parsed.push({role:'char',type:'text',content:resp,time:fmtTime()});
  }
  parsed.forEach(m=>ch.messages.push(m));
  if(parsed.length)ch.lastMessage=parsed[parsed.length-1].content;
  ch.lastMessageTime=fmtTime();
}

// ===== SUMMARY =====
async function autoSummarize(ch){
  const profile=S.apiProfiles[S.activeApiProfile];if(!profile||!profile.url)return;
  const prompt=S.worldBook.summaryPrompt||ch.summaryPrompt||'请总结以下对话：';
  const ctx=ch.messages.slice(-ch.summaryInterval).map(m=>(m.role==='user'?'用户':ch.name)+': '+m.content).join('\n');
  const msgs=[{role:'system',content:prompt+'\n\n角色设定：'+ch.persona},{role:'user',content:ctx}];
  try{
    const resp=await callAPI(msgs,profile);
    ch.memory=(ch.memory?ch.memory+'\n---\n':'')+resp;
    toast('记忆已自动总结');
  }catch(e){toast('总结失败')}
}

async function manualSummary(){
  const ch=S.characters.find(c=>c.id===S.currentChatId);if(!ch)return;
  const from=parseInt(prompt('从第几条消息开始？(1开始)',1))||1;
  const to=parseInt(prompt('到第几条消息？',ch.messages.length))||ch.messages.length;
  const msgs=ch.messages.slice(from-1,to);
  if(!msgs.length){toast('无消息');return}
  toast('正在总结...');
  const profile=S.apiProfiles[S.activeApiProfile];
  if(!profile||!profile.url){toast('请先配置API');return}
  const prompt2=(document.getElementById('csSumPrompt')?.value)||S.worldBook.summaryPrompt;
  const ctx=msgs.map(m=>(m.role==='user'?'用户':ch.name)+': '+m.content).join('\n');
  try{
    const resp=await callAPI([{role:'system',content:prompt2+'\n\n角色设定：'+ch.persona},{role:'user',content:ctx}],profile);
    ch.memory=(ch.memory?ch.memory+'\n---\n':'')+resp;
    document.getElementById('csMemory').value=ch.memory;
    saveState();toast('总结完成');
  }catch(e){toast('总结失败: '+e.message)}
}

async function createMoment(charId){
  const ch=S.characters.find(c=>c.id===charId);if(!ch)return;
  closeModal();toast('AI正在生成朋友圈...');
  const profile=S.apiProfiles[S.activeApiProfile];
  if(!profile||!profile.url){toast('请先配置API');return}
  try{
    const msgs=[{role:'system',content:S.worldBook.momentsPostPrompt+'\n\n角色设定：'+ch.persona+(ch.memory?'\n记忆：'+ch.memory:'')},{role:'user',content:'请生成一条朋友圈'}];
    const resp=await callAPI(msgs,profile);
    let content=resp;
    try{const j=JSON.parse(resp.replace(/```json?\n?/g,'').replace(/```/g,''));content=j.content||j.text||resp}catch(e){}
    const m={id:uid(),author:charId,authorName:ch.nickname||ch.name,authorAvatar:ch.avatar,content,image:null,comments:[],timestamp:fmtTime()+' '+fmtDate(),syncToChat:true};
    S.moments.push(m);
    // Generate social circle comments
    await generateSocialComments(m,ch);
    // Sync to chat
    ch.messages.push({role:'system',content:`[系统] ${ch.nickname||ch.name}刚才发了一条朋友圈：${content}`,time:fmtTime()});
    saveState();renderMoments();toast('角色朋友圈已发布');
  }catch(e){toast('生成失败: '+e.message)}
}

async function generateSocialComments(moment,ch){
  const profile=S.apiProfiles[S.activeApiProfile];if(!profile||!profile.url)return;
  try{
    const msgs=[{role:'system',content:`请为这条朋友圈生成3-5个虚拟社交圈角色的评论，至少10条互动。角色之间可以互相回复。发布者设定：${ch.persona}\n朋友圈内容：${moment.content}\n用JSON数组格式回复：[{"name":"角色名","content":"评论内容"}]`},{role:'user',content:'请生成评论'}];
    const resp=await callAPI(msgs,profile);
    try{
      const arr=JSON.parse(resp.replace(/```json?\n?/g,'').replace(/```/g,''));
      if(Array.isArray(arr))moment.comments=arr.map(c=>({authorName:c.name,content:c.content}));
    }catch(e){moment.comments=[{authorName:'好友',content:resp.substring(0,50)}]}
    // Sync comments to char's chat
    if(moment.comments.length){
      const summary=moment.comments.map(c=>c.authorName+': '+c.content).join('\n');
      ch.messages.push({role:'system',content:`[朋友圈评论] ${ch.nickname||ch.name}的朋友圈收到了评论：\n${summary}`,time:fmtTime()});
    }
  }catch(e){}
}

async function refreshComments(momentId){
  const m=S.moments.find(x=>x.id===momentId);if(!m)return;
  const profile=S.apiProfiles[S.activeApiProfile];
  if(!profile||!profile.url){toast('请先配置API');return}
  toast('刷新评论中...');
  try{
    let charInfo='';
    S.characters.forEach(c=>{charInfo+=c.name+'('+c.nickname+'): '+c.persona+'\n'});
    const msgs=[{role:'system',content:S.worldBook.momentsReplyPrompt+'\n\n可用角色：\n'+charInfo+'\n\n朋友圈内容：'+m.content+(m.comments?.length?'\n已有评论：\n'+m.comments.map(c=>c.authorName+': '+c.content).join('\n'):'')},
      {role:'user',content:'请所有角色对这条朋友圈进行评论'+(S.customization.crossReply?'，角色之间可以互相互动':'，每个角色独立回复')}];
    const resp=await callAPI(msgs,profile);
    try{
      const arr=JSON.parse(resp.replace(/```json?\n?/g,'').replace(/```/g,''));
      if(Array.isArray(arr))m.comments=arr.map(c=>({authorName:c.name,content:c.content}));
    }catch(e){m.comments=[{authorName:'AI',content:resp.substring(0,100)}]}
    // Sync to chats
    S.characters.forEach(ch=>{
      ch.messages.push({role:'system',content:`[朋友圈评论更新] 朋友圈"${m.content.substring(0,20)}..."的评论已更新：\n${m.comments.map(c=>c.authorName+': '+c.content).join('\n')}`,time:fmtTime()});
    });
    saveState();renderMoments();toast('评论已刷新');
  }catch(e){toast('刷新失败: '+e.message)}
}

async function triggerMomentAI(){
  const m=S.moments.find(x=>x.id===S.currentMomentId);if(!m)return;
  const profile=S.apiProfiles[S.activeApiProfile];
  if(!profile||!profile.url){toast('请先配置API');return}

  try{

      const ch=S.characters.find(c=>(c.nickname||c.name)===_replyTarget);
      if(ch)charInfo=`角色${ch.name}的设定：${ch.persona}\n${ch.memory?'记忆：'+ch.memory:''}`;
    }else{
      S.characters.forEach(c=>{charInfo+=c.name+'('+c.nickname+'): '+c.persona+'\n'});
    }
    const existingComments=m.comments.map(c=>c.authorName+': '+c.content).join('\n');
    const msgs=[{role:'system',content:S.worldBook.momentsReplyPrompt+'\n\n'+charInfo+'\n\n朋友圈内容：'+m.content+'\n已有评论：\n'+existingComments},
      {role:'user',content:_replyTarget?`请${_replyTarget}回复最新评论`:'请各角色继续回复评论'+(S.customization.crossReply?'，可以互相互动':'')}];
    const resp=await callAPI(msgs,profile);
    try{
      const arr=JSON.parse(resp.replace(/```json?\n?/g,'').replace(/```/g,''));
      if(Array.isArray(arr))arr.forEach(c=>m.comments.push({authorName:c.name,content:c.content}));
    }catch(e){m.comments.push({authorName:_replyTarget||'AI',content:resp.substring(0,200)})}
