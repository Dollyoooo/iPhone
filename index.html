<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>SmartPhone RP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--pw:375px;--ph:720px;--pr:46px;--bz:9px}
body{font-family:-apple-system,'SF Pro Display','SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111;user-select:none;-webkit-user-select:none}

/* Phone Frame */
.phone-frame{position:relative;width:var(--pw);height:var(--ph);border-radius:var(--pr);background:linear-gradient(145deg,#2a2a2a,#1a1a1a);padding:var(--bz);box-shadow:0 0 0 1.5px #444,0 0 0 3px #1a1a1a,0 24px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05)}
.frame-btn-l1{position:absolute;left:-3px;top:100px;width:3px;height:26px;background:linear-gradient(90deg,#2a2a2a,#3a3a3a);border-radius:2px 0 0 2px}
.frame-btn-l2{position:absolute;left:-3px;top:140px;width:3px;height:46px;background:linear-gradient(90deg,#2a2a2a,#3a3a3a);border-radius:2px 0 0 2px}
.frame-btn-l3{position:absolute;left:-3px;top:196px;width:3px;height:46px;background:linear-gradient(90deg,#2a2a2a,#3a3a3a);border-radius:2px 0 0 2px}
.frame-btn-r{position:absolute;right:-3px;top:155px;width:3px;height:60px;background:linear-gradient(270deg,#2a2a2a,#3a3a3a);border-radius:0 2px 2px 0}

/* Screen & Theme */
.screen{position:relative;width:100%;height:100%;border-radius:calc(var(--pr) - var(--bz));overflow:hidden;background:var(--bg);transition:background .35s ease;font-size:14px;line-height:1.5}
.screen{--bg:#000;--bg2:#0c0c0c;--bg3:#1c1c1e;--card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.07);--fg:#fff;--fg2:#e5e5ea;--fg3:#8e8e93;--fg4:rgba(255,255,255,.5);--sep:rgba(255,255,255,.06);--acc:#0a84ff;--acc2:rgba(10,132,255,.15);--glass:rgba(28,28,30,.82);--glass2:rgba(44,44,46,.6);--bubble-other:#2c2c2e;--bubble-self:#0a84ff;--danger:#ff453a;--success:#30d158;--warn:#ff9f0a}
.screen.light{--bg:#f2f2f7;--bg2:#fff;--bg3:#e5e5ea;--card:rgba(0,0,0,.03);--card2:rgba(0,0,0,.05);--fg:#000;--fg2:#1c1c1e;--fg3:#8e8e93;--fg4:rgba(0,0,0,.4);--sep:rgba(0,0,0,.08);--acc:#007aff;--acc2:rgba(0,122,255,.1);--glass:rgba(255,255,255,.82);--glass2:rgba(245,245,247,.7);--bubble-other:#e9e9eb;--bubble-self:#007aff;--danger:#ff3b30;--success:#34c759;--warn:#ff9500}

/* Status Bar */
.status-bar{position:absolute;top:0;left:0;right:0;height:48px;display:flex;justify-content:space-between;align-items:center;padding:0 24px;z-index:500;color:var(--fg);font-size:15px;font-weight:600;letter-spacing:.3px;pointer-events:none}
.status-bar-r{display:flex;align-items:center;gap:5px}
.status-bar-r svg{width:16px;height:16px;fill:currentColor}
.batt{width:24px;height:11px;border:1.8px solid currentColor;border-radius:3.5px;position:relative;padding:1.5px}
.batt::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:1.8px;height:5px;background:currentColor;border-radius:0 1.5px 1.5px 0}
.batt-in{width:68%;height:100%;background:currentColor;border-radius:1.5px}

/* Dynamic Island */
.di{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:17px;z-index:600;cursor:pointer;overflow:hidden;border:.5px solid rgba(255,255,255,.06);transition:all .45s cubic-bezier(.4,0,.2,1)}
.di:not(.exp):hover{transform:translateX(-50%) scale(1.04)}
.di.exp{width:calc(var(--pw) - var(--bz)*2 - 28px);height:180px;border-radius:26px;top:9px}
.di-pill{display:flex;align-items:center;justify-content:center;height:34px;gap:6px;transition:opacity .2s}
.di.exp .di-pill{opacity:0;pointer-events:none;height:0}
.di-dot{width:8px;height:8px;background:radial-gradient(circle,#1a1a2e,#050510);border-radius:50%}
.mini-eq{display:none;align-items:flex-end;gap:1.5px;height:10px}
.mini-eq.on{display:flex}
.mini-eq i{display:block;width:2px;background:#fff;border-radius:1px;height:3px}
.mini-eq.on i{animation:meqA .45s ease-in-out infinite alternate}
.mini-eq.on i:nth-child(2){animation-delay:.12s}
.mini-eq.on i:nth-child(3){animation-delay:.25s}
@keyframes meqA{0%{height:2px}100%{height:10px}}

/* Player Panel */
.player-panel{display:none;flex-direction:column;padding:14px 18px 10px;height:100%}
.di.exp .player-panel{display:flex}
.player-top{display:flex;align-items:center;gap:12px;flex:1}
.vinyl{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,#1a1a1a 0%,#111 35%,#0d0d0d 60%,#1a1a1a 61%,#111 100%);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(0,0,0,.5);position:relative;border:.5px solid rgba(255,255,255,.08)}
.vinyl::after{content:'';width:8px;height:8px;border-radius:50%;background:#0a0a0a;border:.5px solid rgba(255,255,255,.08);position:absolute}
.vinyl.spin{animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.player-info{flex:1;min-width:0}
.player-name{color:#fff;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-artist{color:rgba(255,255,255,.4);font-size:10px;margin-top:2px}
.eq-bars{display:flex;align-items:flex-end;gap:2px;height:18px;margin-left:auto}
.eq-bars i{display:block;width:3px;background:#fff;border-radius:1.5px;height:3px;transition:height .3s}
.eq-bars.on i{animation:eqA .5s ease-in-out infinite alternate}
.eq-bars.on i:nth-child(2){animation-delay:.1s}
.eq-bars.on i:nth-child(3){animation-delay:.22s}
.eq-bars.on i:nth-child(4){animation-delay:.07s}
@keyframes eqA{0%{height:3px}100%{height:18px}}
.player-progress{height:3px;background:rgba(255,255,255,.15);border-radius:3px;margin:10px 0 8px;overflow:hidden}
.player-progress-fill{width:0%;height:100%;background:#fff;border-radius:3px;transition:width .3s linear}
.player-controls{display:flex;align-items:center;justify-content:center;gap:22px}
.p-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center}
.p-btn:active{transform:scale(.82);transition:transform .08s}
.p-btn svg{width:20px;height:20px;fill:#fff}
.p-btn.play-pause{width:36px;height:36px;background:rgba(255,255,255,.1);border-radius:50%}
.p-btn.play-pause svg{width:15px;height:15px}
.di-overlay{display:none;position:absolute;inset:0;z-index:550}
.di-overlay.on{display:block}

/* Common */
.scroller{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroller::-webkit-scrollbar{display:none}
.page{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;background:var(--bg);transition:background .35s}
.page.active{display:flex}
.glass-bar{background:var(--glass);-webkit-backdrop-filter:saturate(180%) blur(40px);backdrop-filter:saturate(180%) blur(40px)}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s}
.icon-btn:active{background:var(--card2);transform:scale(.9)}
.icon-btn svg{width:20px;height:20px;fill:var(--fg3)}
.section-title{font-size:11px;font-weight:600;color:var(--fg4);letter-spacing:.5px;text-transform:uppercase;padding:16px 16px 8px;display:flex;align-items:center;gap:4px}

/* Theme Toggle */
.theme-toggle{position:absolute;bottom:86px;right:14px;z-index:400;width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(120,120,128,.22);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);transition:background .3s}
.theme-toggle:active{transform:scale(.84)}
.theme-toggle svg{width:15px;height:15px;fill:var(--fg);transition:fill .3s}

/* ===== HOME ===== */
.pg-home{background:#000!important}
.home-bg{position:absolute;inset:0;z-index:0}
.home-bg img{width:100%;height:100%;object-fit:cover}
.home-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.02) 0%,rgba(0,0,0,.1) 60%,rgba(0,0,0,.45) 100%)}
.home-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding-top:50px}
.home-clock{text-align:center;padding:4px 0 0}
.home-clock-time{font-size:58px;font-weight:200;color:#fff;letter-spacing:.5px;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.3)}
.home-clock-date{font-size:11px;color:rgba(255,255,255,.7);margin-top:4px;font-weight:400;letter-spacing:.3px}
.home-apps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px 0;padding:28px 26px 0}
.home-app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:transform .15s}
.home-app:active{transform:scale(.82)}
.app-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.3)}
.app-icon svg{width:24px;height:24px;fill:#fff}
.app-icon.ic-msg{background:linear-gradient(135deg,#34c759,#30d158)}
.app-icon.ic-moments{background:linear-gradient(135deg,#ff6b6b,#ee5a24)}
.app-icon.ic-forum{background:linear-gradient(135deg,#5e5ce6,#6c63ff)}
.app-icon.ic-wallet{background:linear-gradient(135deg,#1c1c1e,#2c2c2e);border:.5px solid rgba(255,255,255,.08)}
.app-icon.ic-diary{background:linear-gradient(135deg,#ff9f0a,#f7971e)}
.app-icon.ic-browser{background:linear-gradient(135deg,#0a84ff,#007aff)}
.app-icon.ic-settings{background:linear-gradient(135deg,#636366,#8e8e93)}
.app-icon.ic-album{background:linear-gradient(135deg,#af52de,#bf5af2)}
.app-label{font-size:10px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.55);font-weight:400}

/* Dock */
.dock{position:absolute;bottom:0;left:0;right:0;z-index:400;padding:0 12px 8px}
.dock-inner{height:54px;border-radius:22px;display:flex;align-items:center;justify-content:space-around;padding:0 6px;border:.5px solid rgba(255,255,255,.04);transition:background .3s,border-color .3s}
.screen.light .dock-inner{border-color:rgba(0,0,0,.04)}
.dock-tab{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;padding:4px 8px 3px;transition:transform .1s;position:relative}
.dock-tab:active{transform:scale(.85)}
.dock-tab svg{width:21px;height:21px;fill:rgba(255,255,255,.5);transition:fill .2s}
.dock-tab span{font-size:9px;color:rgba(255,255,255,.5);transition:color .2s;font-weight:500}
.screen.light .dock-tab svg{fill:rgba(0,0,0,.35)}
.screen.light .dock-tab span{color:rgba(0,0,0,.35)}
.dock-tab.active svg{fill:var(--acc)}
.dock-tab.active span{color:var(--acc)}
.dock-badge{position:absolute;top:0;right:4px;min-width:16px;height:16px;background:var(--danger);color:#fff;font-size:10px;font-weight:600;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px;line-height:1}
.dock-badge.show{display:flex}
.home-indicator{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:100px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;z-index:401}
.screen.light .home-indicator{background:rgba(0,0,0,.15)}

/* ===== CONTACTS ===== */
.contacts-header{padding:50px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.contacts-title{font-size:28px;font-weight:700;color:var(--fg);letter-spacing:-.3px}
.contacts-actions{display:flex;gap:4px}
.contact-list{padding:0 16px 80px}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .15s;border-radius:12px}
.contact-item:active{background:var(--card2)}
.contact-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;background:var(--bg3);flex-shrink:0}
.contact-avatar img{width:100%;height:100%;object-fit:cover}
.contact-avatar.no-img{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--acc),#5856d6);color:#fff;font-size:18px;font-weight:600}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:15px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-preview{font-size:13px;color:var(--fg3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.contact-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.contact-time{font-size:11px;color:var(--fg3)}
.contact-unread{width:18px;height:18px;background:var(--acc);color:#fff;font-size:10px;font-weight:600;border-radius:50%;display:none;align-items:center;justify-content:center}
.contact-unread.show{display:flex}
.contacts-empty{text-align:center;padding:60px 20px;color:var(--fg3);font-size:14px;line-height:2}
.contacts-empty svg{width:48px;height:48px;fill:var(--fg3);opacity:.4;margin-bottom:12px}

/* ===== CHAT ===== */
.chat-header{position:sticky;top:0;z-index:10;padding:44px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--sep)}
.chat-header-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--bg3);flex-shrink:0}
.chat-header-avatar img{width:100%;height:100%;object-fit:cover}
.chat-header-avatar.no-img{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--acc),#5856d6);color:#fff;font-size:14px;font-weight:600}
.chat-header-info{flex:1;min-width:0}
.chat-header-name{font-size:15px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-header-status{font-size:11px;color:var(--fg3)}
.chat-messages{padding:12px 14px 8px;display:flex;flex-direction:column;gap:3px;min-height:100%}
.msg-time-divider{text-align:center;font-size:11px;color:var(--fg3);padding:12px 0 6px;font-weight:400}
.msg-bubble-wrap{display:flex;flex-direction:column;max-width:78%;cursor:pointer;transition:opacity .15s}
.msg-bubble-wrap:active{opacity:.7}
.msg-bubble-wrap.self{align-self:flex-end;align-items:flex-end}
.msg-bubble-wrap.other{align-self:flex-start;align-items:flex-start}
.msg-sender{font-size:11px;color:var(--fg3);margin-bottom:2px;padding:0 4px}
.msg-bubble{padding:8px 13px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap;position:relative}
.msg-bubble-wrap.other .msg-bubble{background:var(--bubble-other);color:var(--fg2);border-radius:18px 18px 18px 6px}
.msg-bubble-wrap.self .msg-bubble{background:var(--bubble-self);color:#fff;border-radius:18px 18px 6px 18px;box-shadow:0 2px 8px var(--acc2)}
.msg-bubble img{max-width:100%;border-radius:10px;margin:4px 0}
.msg-notification{align-self:center;max-width:88%;background:var(--card2);border-radius:12px;padding:10px 14px;margin:8px 0;cursor:pointer;transition:background .2s;border:.5px solid var(--sep)}
.msg-notification:active{background:var(--card)}
.msg-notification-title{font-size:12px;font-weight:600;color:var(--acc);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.msg-notification-title svg{width:14px;height:14px;fill:var(--acc)}
.msg-notification-body{font-size:13px;color:var(--fg2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.chat-input-area{flex-shrink:0;border-top:.5px solid var(--sep);padding:6px 10px 28px;display:flex;align-items:flex-end;gap:8px;background:var(--bg);transition:background .35s}
.chat-input-plus{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--card2);flex-shrink:0;margin-bottom:3px;transition:transform .2s}
.chat-input-plus:active{transform:scale(.88)}
.chat-input-plus svg{width:16px;height:16px;fill:var(--fg3)}
.chat-input-wrap{flex:1;display:flex;align-items:flex-end;min-height:34px;border-radius:18px;border:1px solid var(--sep);padding:4px 12px;background:var(--card);transition:border-color .2s}
.chat-input-wrap:focus-within{border-color:var(--acc)}
.chat-input{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--fg);font-family:inherit;resize:none;max-height:100px;line-height:1.5;padding:2px 0}
.chat-input::placeholder{color:var(--fg4)}
.chat-send-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--acc);flex-shrink:0;margin-bottom:3px;transition:transform .15s,opacity .15s;opacity:0;pointer-events:none}
.chat-send-btn.show{opacity:1;pointer-events:auto}
.chat-send-btn:active{transform:scale(.85)}
.chat-send-btn svg{width:16px;height:16px;fill:#fff}
.chat-loading{align-self:flex-start;padding:8px 16px;display:none;align-items:center;gap:6px}
.chat-loading.show{display:flex}
.chat-loading-dot{width:6px;height:6px;background:var(--fg3);border-radius:50%;animation:loadDot 1.2s ease-in-out infinite}
.chat-loading-dot:nth-child(2){animation-delay:.2s}
.chat-loading-dot:nth-child(3){animation-delay:.4s}
@keyframes loadDot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Plus Menu */
.plus-menu{display:none;padding:8px 12px 4px;border-top:.5px solid var(--sep);background:var(--bg)}
.plus-menu.show{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.plus-menu-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;border-radius:10px;transition:background .15s}
.plus-menu-item:active{background:var(--card2)}
.plus-menu-item .pm-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--card2)}
.plus-menu-item .pm-icon svg{width:22px;height:22px;fill:var(--fg3)}
.plus-menu-item span{font-size:10px;color:var(--fg3);font-weight:500}

/* Sticker Panel */
.sticker-panel{display:none;height:200px;border-top:.5px solid var(--sep);background:var(--bg2);flex-direction:column}
.sticker-panel.show{display:flex}
.sticker-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:.5px solid var(--sep)}
.sticker-header span{font-size:12px;font-weight:600;color:var(--fg3)}
.sticker-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 12px}
.sticker-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;background:var(--card);display:flex;align-items:center;justify-content:center;transition:transform .1s}
.sticker-item:active{transform:scale(.9)}
.sticker-item img{width:100%;height:100%;object-fit:cover}
.sticker-add{border:2px dashed var(--sep);display:flex;align-items:center;justify-content:center}
.sticker-add svg{width:24px;height:24px;fill:var(--fg4)}

/* ===== MOMENTS ===== */
.moments-header{padding:50px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.moments-title{font-size:28px;font-weight:700;color:var(--fg);letter-spacing:-.3px}
.moments-feed{padding:0 0 80px}
.moment-card{padding:14px 16px;border-bottom:.5px solid var(--sep)}
.moment-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.moment-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--bg3);flex-shrink:0}
.moment-avatar img{width:100%;height:100%;object-fit:cover}
.moment-avatar.no-img{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--acc),#5856d6);color:#fff;font-size:16px;font-weight:600}
.moment-author{flex:1}
.moment-author-name{font-size:14px;font-weight:600;color:var(--acc)}
.moment-author-time{font-size:11px;color:var(--fg3);margin-top:1px}
.moment-actions-btn{display:flex;gap:2px}
.moment-content{font-size:14px;color:var(--fg2);line-height:1.8;white-space:pre-wrap;word-break:break-word;margin-bottom:8px;cursor:pointer;transition:opacity .15s}
.moment-content:active{opacity:.6}
.moment-images{display:grid;gap:4px;margin-bottom:8px;border-radius:10px;overflow:hidden}
.moment-images.cols-1{grid-template-columns:1fr;max-width:200px}
.moment-images.cols-2{grid-template-columns:1fr 1fr}
.moment-images.cols-3{grid-template-columns:1fr 1fr 1fr}
.moment-images img{width:100%;aspect-ratio:1;object-fit:cover}
.moment-stats{display:flex;align-items:center;gap:16px;padding:6px 0}
.moment-stat{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--fg3);cursor:pointer}
.moment-stat svg{width:16px;height:16px;fill:var(--fg3)}
.moment-stat:active svg{fill:var(--acc)}
.moment-comments{background:var(--card);border-radius:10px;padding:8px 12px;margin-top:6px}
.moment-comment{font-size:13px;color:var(--fg2);line-height:1.7;padding:3px 0;cursor:pointer;transition:opacity .15s}
.moment-comment:active{opacity:.6}
.moment-comment-author{color:var(--acc);font-weight:600}
.moment-empty{text-align:center;padding:60px 20px;color:var(--fg3);font-size:14px}

/* ===== FORUM ===== */
.forum-header{padding:50px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.forum-title{font-size:28px;font-weight:700;color:var(--fg);letter-spacing:-.3px}
.forum-feed{padding:0 0 80px}
.forum-post{padding:14px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .15s}
.forum-post:active{background:var(--card)}
.forum-post-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.forum-post-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--bg3);flex-shrink:0}
.forum-post-avatar img{width:100%;height:100%;object-fit:cover}
.forum-post-avatar.no-img{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#5e5ce6,#6c63ff);color:#fff;font-size:14px;font-weight:600}
.forum-post-author{font-size:13px;font-weight:600;color:var(--fg)}
.forum-post-time{font-size:11px;color:var(--fg3);margin-left:auto}
.forum-post-tag{font-size:10px;font-weight:600;color:#ff6b00;background:rgba(255,107,0,.1);padding:2px 6px;border-radius:4px;margin-left:6px}
.forum-post-content{font-size:14px;color:var(--fg2);line-height:1.75;white-space:pre-wrap;word-break:break-word;margin-bottom:8px}
.forum-post-stats{display:flex;gap:16px}
.forum-post-stat{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--fg3)}
.forum-post-stat svg{width:15px;height:15px;fill:var(--fg3)}

/* Forum Detail */
.forum-detail-header{padding:44px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--sep)}
.forum-detail-title{font-size:15px;font-weight:600;color:var(--fg);flex:1}
.forum-detail-body{padding:14px 16px}
.forum-detail-op{padding-bottom:14px;border-bottom:.5px solid var(--sep);margin-bottom:14px}
.forum-detail-op .forum-post-content{cursor:pointer}
.forum-detail-op .forum-post-content:active{opacity:.6}
.forum-reply{padding:10px 0;border-bottom:.5px solid var(--sep)}
.forum-reply:last-child{border-bottom:none}
.forum-reply-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.forum-reply-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;background:var(--bg3);flex-shrink:0}
.forum-reply-avatar img{width:100%;height:100%;object-fit:cover}
.forum-reply-avatar.no-img{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#5e5ce6,#6c63ff);color:#fff;font-size:11px;font-weight:600}
.forum-reply-author{font-size:12px;font-weight:600;color:var(--acc)}
.forum-reply-time{font-size:10px;color:var(--fg3);margin-left:auto}
.forum-reply-floor{font-size:10px;color:var(--fg4);margin-left:4px}
.forum-reply-content{font-size:13px;color:var(--fg2);line-height:1.7;white-space:pre-wrap;word-break:break-word;padding-left:36px;cursor:pointer}
.forum-reply-content:active{opacity:.6}
.forum-input-bar{flex-shrink:0;padding:6px 10px 28px;display:flex;align-items:center;gap:8px;border-top:.5px solid var(--sep);background:var(--bg)}
.forum-input-wrap{flex:1;display:flex;align-items:center;height:34px;border-radius:18px;border:1px solid var(--sep);padding:0 12px;background:var(--card)}
.forum-input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--fg);font-family:inherit}
.forum-input::placeholder{color:var(--fg4)}

/* ===== WALLET ===== */
.wallet-header{padding:44px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--sep)}
.wallet-header-title{font-size:15px;font-weight:600;color:var(--fg);flex:1;text-align:center}
.wallet-card{margin:16px;border-radius:18px;padding:24px 22px;background:linear-gradient(135deg,#2a2a2e,#1c1c1e,#0a0a0c);box-shadow:0 6px 26px rgba(0,0,0,.4)}
.screen.light .wallet-card{background:linear-gradient(135deg,#f5f5f7,#e8e8ea);box-shadow:0 6px 18px rgba(0,0,0,.08)}
.wallet-label{font-size:11px;color:var(--fg4);font-weight:500;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.wallet-amount{font-size:34px;font-weight:500;color:var(--fg);letter-spacing:1px;margin-top:6px}
.wallet-amount::before{content:'\xA5';font-size:22px;font-weight:400;margin-right:3px;opacity:.7}
.wallet-txn-list{padding:0 16px 80px}
.wallet-txn-item{padding:12px 0;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.wallet-txn-item:active{opacity:.6}
.wallet-txn-desc{font-size:14px;color:var(--fg2)}
.wallet-txn-amount{font-size:14px;font-weight:600}
.wallet-txn-amount.income{color:var(--success)}
.wallet-txn-amount.expense{color:var(--fg2)}
.wallet-txn-time{font-size:11px;color:var(--fg3);margin-top:2px}
.wallet-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-around;padding:8px 18px 28px;border-top:.5px solid var(--sep)}
.wallet-bar-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer}
.wallet-bar-ico{width:40px;height:40px;border-radius:50%;background:var(--fg);display:flex;align-items:center;justify-content:center}
.wallet-bar-ico svg{width:18px;height:18px;fill:var(--bg)}
.wallet-bar-btn span{font-size:10px;color:var(--fg3);font-weight:500}

/* ===== DIARY ===== */
.diary-header{padding:44px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--sep)}
.diary-header-title{font-size:15px;font-weight:600;color:var(--fg);flex:1;text-align:center}
.diary-list{padding:12px 16px 80px}
.diary-entry{padding:14px 0;border-bottom:.5px solid var(--sep);cursor:pointer;transition:opacity .15s}
.diary-entry:active{opacity:.6}
.diary-entry-date{font-size:12px;font-weight:600;color:var(--acc);margin-bottom:4px}
.diary-entry-content{font-size:14px;color:var(--fg2);line-height:1.8;white-space:pre-wrap;word-break:break-word;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.diary-empty{text-align:center;padding:60px 20px;color:var(--fg3);font-size:14px}

/* ===== BROWSER ===== */
.browser-header{padding:44px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--sep)}
.browser-header-title{font-size:15px;font-weight:600;color:var(--fg);flex:1;text-align:center}
.browser-search{margin:14px 14px 0;height:38px;border-radius:10px;background:var(--card);display:flex;align-items:center;padding:0 12px;gap:6px;border:.5px solid var(--sep)}
.browser-search svg{width:14px;height:14px;fill:var(--fg3);flex-shrink:0}
.browser-search span{font-size:14px;color:var(--fg4)}
.browser-list{padding:12px 16px 80px}
.browser-item{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:opacity .15s}
.browser-item:active{opacity:.6}
.browser-item svg{width:16px;height:16px;fill:var(--fg3);flex-shrink:0}
.browser-item-text{flex:1;font-size:14px;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.browser-empty{text-align:center;padding:60px 20px;color:var(--fg3);font-size:14px}

/* ===== SETTINGS ===== */
.settings-header{padding:50px 18px 12px}
.settings-title{font-size:28px;font-weight:700;color:var(--fg);letter-spacing:-.3px}
.settings-scroll{padding:0 0 80px}
.settings-group{margin:12px 16px 0;background:var(--bg2);border-radius:14px;overflow:hidden;border:.5px solid var(--sep)}
.screen.light .settings-group{background:var(--bg2)}
.settings-group-title{padding:14px 16px 6px;font-size:11px;font-weight:600;color:var(--fg4);letter-spacing:.5px;text-transform:uppercase;background:none}
.settings-row{display:flex;align-items:center;padding:12px 16px;border-bottom:.5px solid var(--sep);gap:10px}
.settings-row:last-child{border-bottom:none}
.settings-row label{font-size:14px;color:var(--fg);flex-shrink:0;min-width:65px}
.settings-row input[type="text"],.settings-row input[type="password"],.settings-row input[type="number"],.settings-row select{flex:1;background:var(--card);border:1px solid var(--sep);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--fg);font-family:inherit;outline:none;transition:border-color .2s}
.settings-row input:focus,.settings-row select:focus{border-color:var(--acc)}
.settings-row select{-webkit-appearance:none;appearance:none}
.settings-row textarea{flex:1;background:var(--card);border:1px solid var(--sep);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--fg);font-family:inherit;outline:none;resize:vertical;min-height:60px;line-height:1.6;transition:border-color .2s}
.settings-row textarea:focus{border-color:var(--acc)}
.settings-toggle{position:relative;width:48px;height:28px;border-radius:14px;background:var(--bg3);cursor:pointer;transition:background .25s;flex-shrink:0}
.settings-toggle.on{background:var(--success)}
.settings-toggle::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .25s}
.settings-toggle.on::after{transform:translateX(20px)}
.settings-btn{display:block;width:calc(100% - 32px);margin:12px 16px;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.settings-btn:active{opacity:.7}
.settings-btn.primary{background:var(--acc);color:#fff}
.settings-btn.danger{background:var(--danger);color:#fff}
.settings-btn.secondary{background:var(--card2);color:var(--fg)}

/* Character List in Settings */
.char-list{padding:0 16px}
.char-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .15s}
.char-item:active{background:var(--card2)}
.char-item-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--bg3);flex-shrink:0}
.char-item-avatar img{width:100%;height:100%;object-fit:cover}
.char-item-avatar.no-img{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--acc),#5856d6);color:#fff;font-size:16px;font-weight:600}
.char-item-name{flex:1;font-size:14px;font-weight:500;color:var(--fg)}
.char-item-del{color:var(--danger);font-size:12px;font-weight:500;padding:4px 8px;border-radius:6px;background:rgba(255,69,58,.1)}

/* ===== MODALS ===== */
.modal-overlay{display:none;position:absolute;inset:0;z-index:800;background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-sheet{width:100%;max-height:85%;background:var(--bg2);border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:modalSlideUp .3s ease}
@keyframes modalSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:.5px solid var(--sep);flex-shrink:0}
.modal-sheet-title{font-size:16px;font-weight:600;color:var(--fg)}
.modal-sheet-close{font-size:14px;color:var(--acc);font-weight:500;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 8px}
.modal-sheet-body{flex:1;overflow-y:auto;padding:8px 0}
.modal-sheet-body .settings-row{padding:10px 18px}
.modal-sheet-body .settings-row label{min-width:60px}
.modal-sheet-body textarea{min-height:80px}

/* Edit Modal */
.edit-modal-content{padding:14px 18px}
.edit-textarea{width:100%;background:var(--card);border:1px solid var(--sep);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--fg);font-family:inherit;outline:none;resize:vertical;min-height:100px;line-height:1.7}
.edit-textarea:focus{border-color:var(--acc)}
.edit-save-btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--acc);color:#fff;margin-top:12px}

/* FAB */
.fab{position:absolute;bottom:76px;right:16px;z-index:300;width:44px;height:44px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px var(--acc2);transition:transform .15s}
.fab:active{transform:scale(.88)}
.fab svg{width:22px;height:22px;fill:#fff}
.fab-menu{position:absolute;bottom:76px;right:16px;z-index:310;display:none;flex-direction:column;gap:6px;align-items:flex-end}
.fab-menu.show{display:flex}
.fab-menu-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 14px;border-radius:12px;transition:background .15s}
.fab-menu-item:active{background:var(--card2)}
.fab-menu-item span{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;background:var(--glass);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);padding:4px 12px;border-radius:8px}
.fab-menu-item .fab-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.fab-menu-item .fab-icon svg{width:18px;height:18px;fill:#fff}
.fab-menu-item:nth-child(1) .fab-icon{background:var(--acc)}
.fab-menu-item:nth-child(2) .fab-icon{background:#5856d6}
.fab-menu-item:nth-child(3) .fab-icon{background:var(--success)}
.fab-menu-item:nth-child(4) .fab-icon{background:var(--warn)}

/* Loading Overlay */
.loading-overlay{display:none;position:absolute;inset:0;z-index:900;background:rgba(0,0,0,.3);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.loading-spinner{width:36px;height:36px;border:3px solid var(--sep);border-top-color:var(--acc);border-radius:50%;animation:spinLoader .8s linear infinite}
@keyframes spinLoader{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:999;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;opacity:0;transition:all .3s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--glass);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}

/* Select Menu (for character selection) */
.select-menu{position:absolute;bottom:76px;left:16px;right:16px;z-index:320;display:none;flex-direction:column;background:var(--bg2);border-radius:14px;overflow:hidden;border:.5px solid var(--sep);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.select-menu.show{display:flex}
.select-menu-header{padding:12px 16px;font-size:13px;font-weight:600;color:var(--fg3);border-bottom:.5px solid var(--sep)}
.select-menu-item{padding:12px 16px;font-size:14px;color:var(--fg);border-bottom:.5px solid var(--sep);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.select-menu-item:last-child{border-bottom:none}
.select-menu-item:active{background:var(--card2)}
.select-menu-item .sel-ava{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(--bg3);flex-shrink:0}
.select-menu-item .sel-ava img{width:100%;height:100%;object-fit:cover}
.select-menu-item .sel-ava.no-img{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--acc),#5856d6);color:#fff;font-size:12px;font-weight:600}
</style>
</head>

<script>
// ===== STATE MANAGEMENT =====
const STORAGE_KEY = 'sp_rp_data';
let state = loadState();
let currentChatId = null;
let currentForumPostId = null;
let editCallback = null;
let audio = new Audio();
let playing = false;
let trackIdx = 0;
const tracks = [
  {name:'No Music', artist:'Add tracks in settings'}
];

function getDefaultState() {
  return {
    theme: 'dark',
    settings: {
      api: { endpoint: 'https://api.openai.com/v1/chat/completions', key: '', model: 'gpt-4o-mini', maxTokens: 1000 },
      prompts: {
        system: '你是一个沉浸式角色扮演AI。请根据角色设定，自然地扮演角色进行互动。保持角色一致性，回复要生动自然。',
        chat: '请以"{{name}}"的身份回复用户的消息。\n要求：\n1. 每次回复1-3条消息，每条用\\n\\n分隔\n2. 保持口语化，像真实微信聊天\n3. 消息长度适中\n4. 符合角色性格和语气',
        momentPost: '请以"{{name}}"的身份发一条朋友圈动态。\n要求：\n1. 内容可以是生活感悟、日常分享、心情等\n2. 符合角色性格\n3. 直接输出文案内容，不需要额外格式\n4. 100字以内',
        momentComment: '以下是一条朋友圈动态：\n"{{post}}"\n\n请以"{{name}}"的身份对这条动态进行评论。\n要求：\n1. 简短自然，像真实评论\n2. 直接输出评论内容\n3. 30字以内',
        forumPost: '请以"{{name}}"的身份在论坛发一个帖子。\n要求：\n1. 内容可以是提问、分享、讨论等\n2. 符合角色性格\n3. 直接输出帖子内容\n4. 200字以内',
        forumReply: '以下是一个论坛帖子：\n"{{post}}"\n\n请以"{{name}}"的身份回复这个帖子。\n要求：\n1. 自然真实\n2. 直接输出回复内容\n3. 100字以内',
        diary: '请以"{{name}}"的视角写一篇简短日记。\n要求：\n1. 第一人称\n2. 记录今天的心情和事件\n3. 符合角色性格\n4. 150字以内',
        browser: '请为"{{name}}"生成3条浏览器搜索记录。\n要求：\n1. 每条一行\n2. 符合角色性格和兴趣\n3. 直接输出搜索关键词'
      },
      features: { stickers: true, voice: false, images: true, redPacket: false },
      chatConfig: { msgsPerResponse: 1, showCount: 50, autoSummarize: false, summarizeEvery: 20 },
      wallpaper: ''
    },
    characters: [],
    chats: {},
    moments: [],
    forum: [],
    wallet: { balance: '10000.00', transactions: [] },
    diary: [],
    browser: [],
    stickers: []
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      const def = getDefaultState();
      // Merge defaults for any missing fields
      s.settings = { ...def.settings, ...s.settings };
      s.settings.api = { ...def.settings.api, ...s.settings.api };
      s.settings.prompts = { ...def.settings.prompts, ...s.settings.prompts };
      s.settings.features = { ...def.settings.features, ...(s.settings.features || {}) };
      s.settings.chatConfig = { ...def.settings.chatConfig, ...(s.settings.chatConfig || {}) };
      if (!s.stickers) s.stickers = [];
      if (!s.wallet) s.wallet = { balance: '10000.00', transactions: [] };
      if (!s.diary) s.diary = [];
      if (!s.browser) s.browser = [];
      return s;
    }
  } catch(e) { console.error('Load state error:', e); }
  return getDefaultState();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) { console.error('Save error:', e); }
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function now() { return new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit' }); }
function today() { return new Date().toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai', month: 'long', day: 'numeric' }); }
function getChar(id) { return state.characters.find(c => c.id === id); }
function charInitial(name) { return name ? name.charAt(0) : '?'; }

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== NAVIGATION =====
const dockPages = ['home', 'contacts', 'moments', 'forum'];
const subPages = ['chat', 'wallet', 'diary', 'browser', 'settings', 'forumDetail'];
const pageMap = {
  home: 'pgHome', contacts: 'pgContacts', chat: 'pgChat',
  moments: 'pgMoments', forum: 'pgForum', forumDetail: 'pgForumDetail',
  wallet: 'pgWallet', diary: 'pgDiary', browser: 'pgBrowser', settings: 'pgSettings'
};

function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(pageMap[page]);
  if (el) el.classList.add('active');

  const dock = document.getElementById('dock');
  if (subPages.includes(page)) {
    dock.style.display = 'none';
  } else {
    dock.style.display = 'block';
  }

  document.querySelectorAll('.dock-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.dock-tab[data-tab="${page}"]`);
  if (tab) tab.classList.add('active');

  // Close any open menus
  closeFabMenus();

  // Refresh content
  if (page === 'contacts') renderContacts();
  if (page === 'moments') renderMoments();
  if (page === 'forum') renderForum();
  if (page === 'wallet') renderWallet();
  if (page === 'diary') renderDiary();
  if (page === 'browser') renderBrowser();
  if (page === 'settings') renderSettings();
}

function dockNav(page) { navigateTo(page); }

  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  const time = h + ':' + m;
  document.getElementById('statusTime').textContent = time;
  document.getElementById('homeClock').textContent = time;
  const wk = ['日','一','二','三','四','五','六'];
  document.getElementById('homeDate').textContent = (d.getMonth()+1) + '月' + d.getDate() + '日 周' + wk[d.getDay()];

// ===== API =====
async function callAPI(messages) {
  const s = state.settings.api;
  if (!s.key) { showToast('请先在设置中配置API密钥', 'error'); return null; }
  try {
    const res = await fetch(s.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + s.key },
      body: JSON.stringify({ model: s.model, messages, max_tokens: s.maxTokens || 1000, temperature: 0.8 })
    });
    if (!res.ok) { const err = await res.text(); throw new Error(err); }
    const data = await res.json();
    return data.choices[0].message.content.trim();
  } catch(e) {
    console.error('API Error:', e);
    showToast('API调用失败: ' + e.message.substring(0, 50), 'error');
    return null;
  }
}

function buildPrompt(template, vars) {
  let result = template;
  for (const [k, v] of Object.entries(vars)) {
    result = result.replace(new RegExp('\\{\\{' + k + '\\}\\}', 'g'), v);
  }
  return result;
}

// ===== AVATAR HELPER =====
function avatarHTML(char, size = 40, cls = '') {
  if (char && char.avatar) {
    return `<div class="${cls}" style="width:${size}px;height:${size}px"><img src="${char.avatar}" alt=""></div>`;
  }
  const initial = char ? charInitial(char.name) : '?';
  return `<div class="${cls} no-img" style="width:${size}px;height:${size}px">${initial}</div>`;
}

    const time = lastMsg ? lastMsg.time || '' : '';

        <div class="contact-preview">${escapeHTML(preview)}</div>
      </div>
      <div class="contact-meta">
        <div class="contact-time">${time}</div>
      </div>
    </div>`;
  }
  list.innerHTML = html;
}

// ===== CHAT =====
function openChat(charId) {
  currentChatId = charId;
  const char = getChar(charId);
  if (!char) return;
  if (!state.chats[charId]) state.chats[charId] = [];

  navigateTo('chat');
  // Update header
  const avatarEl = document.getElementById('chatAvatar');
  if (char.avatar) {
    avatarEl.innerHTML = `<img src="${char.avatar}" alt="">`;
    avatarEl.className = 'chat-header-avatar';
  } else {
    avatarEl.innerHTML = charInitial(char.name);
    avatarEl.className = 'chat-header-avatar no-img';
  }
  document.getElementById('chatName').textContent = char.nickname || char.name;
  renderChatMessages();
  // Hide menus
  document.getElementById('plusMenu').classList.remove('show');
  document.getElementById('stickerPanel').classList.remove('show');
}

function renderChatMessages() {
  const container = document.getElementById('chatMessages');
  const msgs = state.chats[currentChatId] || [];
  const showCount = state.settings.chatConfig.showCount || 50;
  const visible = msgs.slice(-showCount);

  let html = '';
  let lastDate = '';
  for (const msg of visible) {
    const msgDate = msg.date || '';
    if (msgDate !== lastDate) {
      html += `<div class="msg-time-divider">${msgDate || today()}</div>`;
      lastDate = msgDate;
    }
    if (msg.type === 'notification') {
      html += `<div class="msg-notification" onclick="editMessage('${msg.id}')">
        <div class="msg-notification-title"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3z"/></svg>${escapeHTML(msg.title || '动态通知')}</div>
        <div class="msg-notification-body">${escapeHTML(msg.content)}</div>
      </div>`;
    } else if (msg.type === 'image') {
      html += `<div class="msg-bubble-wrap ${msg.role === 'user' ? 'self' : 'other'}" onclick="editMessage('${msg.id}')">
        ${msg.role !== 'user' ? `<div class="msg-sender">${escapeHTML(msg.senderName || '')}</div>` : ''}
        <div class="msg-bubble"><img src="${msg.content}" alt=""></div>
      </div>`;
    } else {
      html += `<div class="msg-bubble-wrap ${msg.role === 'user' ? 'self' : 'other'}" onclick="editMessage('${msg.id}')">
        ${msg.role !== 'user' ? `<div class="msg-sender">${escapeHTML(msg.senderName || '')}</div>` : ''}
        <div class="msg-bubble">${escapeHTML(msg.content)}</div>
      </div>`;
    }
  }
  container.innerHTML = html;
  // Scroll to bottom
  setTimeout(() => {
    const scroller = document.getElementById('chatScroller');
    scroller.scrollTop = scroller.scrollHeight;
  }, 50);
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.classList.toggle('show', el.value.trim().length > 0);
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  const char = getChar(currentChatId);
  if (!char) return;

  // Add user message
  const userMsg = { id: genId(), role: 'user', content: text, time: now(), date: today(), type: 'text' };
  state.chats[currentChatId].push(userMsg);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('chatSendBtn').classList.remove('show');
  renderChatMessages();
  saveState();

  // Call API
  document.getElementById('chatLoading').classList.add('show');
  const systemPrompt = state.settings.prompts.system + '\n\n角色设定：\n名称：' + char.name +
    (char.bio ? '\n' + char.bio : '') +
    (char.memory ? '\n\n记忆摘要：' + char.memory : '');
  const chatPrompt = buildPrompt(state.settings.prompts.chat, { name: char.name });

  // Build message history
  const history = state.chats[currentChatId].filter(m => m.type === 'text').slice(-20);
  const apiMessages = [{ role: 'system', content: systemPrompt + '\n\n' + chatPrompt }];
  for (const m of history) {
    apiMessages.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content });
  }

  const response = await callAPI(apiMessages);
  document.getElementById('chatLoading').classList.remove('show');

  if (response) {
    // Split into multiple messages if separated by double newlines
    const parts = response.split(/\n\n+/).filter(p => p.trim());
    for (const part of parts) {
      const aiMsg = {
        id: genId(), role: 'assistant', content: part.trim(),
        senderName: char.nickname || char.name, time: now(), date: today(), type: 'text'
      };
      state.chats[currentChatId].push(aiMsg);
    }
    renderChatMessages();
    saveState();
  }
}

// Chat input: Enter to send
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
});

// Edit message
function editMessage(msgId) {
  if (!currentChatId) return;
  const msgs = state.chats[currentChatId];
  const msg = msgs.find(m => m.id === msgId);
  if (!msg) return;

  document.getElementById('editModalTitle').textContent = '编辑消息';
  document.getElementById('editTextarea').value = msg.content;
  editCallback = (newContent) => {
    msg.content = newContent;
    renderChatMessages();
    saveState();
  };
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
  editCallback = null;
}

function saveEdit() {
  const val = document.getElementById('editTextarea').value;
  if (editCallback) editCallback(val);
  closeEditModal();
}

  document.getElementById('plusMenu').classList.remove('show');

  }
  grid.innerHTML = html;

function handleStickerUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    state.stickers.push(reader.result);
    saveState();
    renderStickerGrid();
    showToast('表情包已添加', 'success');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function sendSticker(src) {

  state.chats[currentChatId].push({
    id: genId(), role: 'user', content: src, time: now(), date: today(), type: 'image'
  });
  renderChatMessages();
  saveState();
  toggleStickerPanel(false);
}

function saveChatSettings() {
  const char = getChar(currentChatId);
  if (!char) return;
  char.name = document.getElementById('cs_name').value.trim() || char.name;
  char.nickname = document.getElementById('cs_nick').value.trim();
  char.avatar = document.getElementById('cs_avatar').value.trim();
  char.bio = document.getElementById('cs_bio').value;
  char.memory = document.getElementById('cs_memory').value;
  state.settings.chatConfig.showCount = parseInt(document.getElementById('cs_showCount').value) || 50;
  saveState();
  openChat(currentChatId);
  closeChatSettings();
  showToast('已保存', 'success');
}

function clearChatHistory() {
  if (confirm('确认清空聊天记录？')) {
    state.chats[currentChatId] = [];
    saveState();
    renderChatMessages();
    closeChatSettings();
  }
}

function closeChatSettings() {
  document.getElementById('chatSettingsModal').classList.remove('show');
}

function toggleMomentsFab() {

function closeFabMenus() {
  document.querySelectorAll('.fab-menu,.select-menu').forEach(m => m.classList.remove('show'));
}

function momentAction(action) {
  closeFabMenus();
  if (action === 'myPost') {
    document.getElementById('editModalTitle').textContent = '发朋友圈';
    document.getElementById('editTextarea').value = '';
    editCallback = (content) => {
      state.moments.push({
        id: genId(), charId: null, isUser: true, content,
        time: now() + ' ' + today(), likes: 0, comments: []
      });
      saveState();
      renderMoments();
      // Notify in chats
      notifyChats('我发了一条动态', content);
    };
    document.getElementById('editModal').classList.add('show');
  } else if (action === 'charPost') {
    showCharSelect('momentsCharSelect', async (charId) => {
      const char = getChar(charId);
      if (!char) return;
      showLoading(true);
      const prompt = buildPrompt(state.settings.prompts.momentPost, { name: char.name });
      const sysPrompt = state.settings.prompts.system + '\n角色设定：' + char.name + '\n' + (char.bio || '');
      const result = await callAPI([
        { role: 'system', content: sysPrompt },
        { role: 'user', content: prompt }
      ]);
      showLoading(false);
      if (result) {
        state.moments.push({
          id: genId(), charId, isUser: false, content: result,
          time: now() + ' ' + today(), likes: Math.floor(Math.random() * 50), comments: []
        });
        saveState();
        renderMoments();
        notifyChats(char.nickname || char.name + ' 发了一条动态', result, charId);
        showToast('动态已发布', 'success');
      }
    });
  } else if (action === 'refreshComments') {
    if (state.moments.length === 0) { showToast('暂无动态', 'info'); return; }
    showCharSelect('momentsCharSelect', async (charId) => {
      const char = getChar(charId);
      if (!char) return;
      const latestPost = [...state.moments].reverse().find(p => true);
      if (!latestPost) return;
      showLoading(true);
      const prompt = buildPrompt(state.settings.prompts.momentComment, { name: char.name, post: latestPost.content });
      const sysPrompt = state.settings.prompts.system + '\n角色设定：' + char.name + '\n' + (char.bio || '');
      const result = await callAPI([
        { role: 'system', content: sysPrompt },
        { role: 'user', content: prompt }
      ]);
      showLoading(false);
      if (result) {
        if (!latestPost.comments) latestPost.comments = [];
        latestPost.comments.push({ id: genId(), author: char.nickname || char.name, content: result, charId });
        saveState();
        renderMoments();
        showToast('评论已添加', 'success');
      }
    });
  }
}

function editMomentPost(postId) {
  const post = state.moments.find(p => p.id === postId);
  if (!post) return;
  document.getElementById('editModalTitle').textContent = '编辑动态';
  document.getElementById('editTextarea').value = post.content;
  editCallback = (content) => { post.content = content; saveState(); renderMoments(); };
  document.getElementById('editModal').classList.add('show');
}

function editMomentComment(postId, cmtId) {
  const post = state.moments.find(p => p.id === postId);
  if (!post) return;
  const cmt = (post.comments || []).find(c => c.id === cmtId);
  if (!cmt) return;
  document.getElementById('editModalTitle').textContent = '编辑评论';
  document.getElementById('editTextarea').value = cmt.content;
  editCallback = (content) => { cmt.content = content; saveState(); renderMoments(); };
  document.getElementById('editModal').classList.add('show');
}

function notifyChats(title, content, specificCharId) {
  for (const char of state.characters) {
    if (!state.chats[char.id]) state.chats[char.id] = [];
    state.chats[char.id].push({
      id: genId(), role: 'system', type: 'notification', title, content,
      time: now(), date: today()
    });
  }
  saveState();
}

function renderForum() {

function openForumDetail(postId) {
  currentForumPostId = postId;
  navigateTo('forumDetail');
  renderForumDetail();
}

function renderForumDetail() {
  const post = state.forum.find(p => p.id === currentForumPostId);
  if (!post) return;
  const char = getChar(post.charId);
  const authorName = post.isUser ? '我' : (char ? (char.nickname || char.name) : '匿名');

  let html = `<div class="forum-detail-op">
    <div class="forum-post-header">
      ${post.isUser ? avatarHTML(null, 36, 'forum-post-avatar') : avatarHTML(char, 36, 'forum-post-avatar')}
      <div class="forum-post-author">${escapeHTML(authorName)}</div>
      <div class="forum-post-time">${post.time || ''}</div>
    </div>
    <div class="forum-post-content" onclick="editForumPost('${post.id}')">${escapeHTML(post.content)}</div>
  </div>`;

  html += `<div class="section-title" style="padding:0 0 8px">回复 (${(post.replies || []).length})</div>`;

  if (post.replies) {
    for (let i = 0; i < post.replies.length; i++) {
      const r = post.replies[i];
      const rc = getChar(r.charId);
      html += `<div class="forum-reply">
        <div class="forum-reply-header">
          ${r.isUser ? avatarHTML(null, 28, 'forum-reply-avatar') : avatarHTML(rc, 28, 'forum-reply-avatar')}
          <div class="forum-reply-author">${escapeHTML(r.author || '匿名')}</div>
          <div class="forum-reply-floor">#${i + 1}</div>
          <div class="forum-reply-time">${r.time || ''}</div>
        </div>
        <div class="forum-reply-content" onclick="editForumReply('${post.id}',${i})">${escapeHTML(r.content)}</div>
      </div>`;
    }
  }
  document.getElementById('forumDetailBody').innerHTML = html;
}

function editForumPost(postId) {
  const post = state.forum.find(p => p.id === postId);
  if (!post) return;
  document.getElementById('editModalTitle').textContent = '编辑帖子';
  document.getElementById('editTextarea').value = post.content;
  editCallback = (content) => { post.content = content; saveState(); renderForumDetail(); renderForum(); };
  document.getElementById('editModal').classList.add('show');
}

function editForumReply(postId, replyIdx) {
  const post = state.forum.find(p => p.id === postId);
  if (!post || !post.replies[replyIdx]) return;
  const r = post.replies[replyIdx];
  document.getElementById('editModalTitle').textContent = '编辑回复';
  document.getElementById('editTextarea').value = r.content;
  editCallback = (content) => { r.content = content; saveState(); renderForumDetail(); };
  document.getElementById('editModal').classList.add('show');
}

function sendForumReply() {
  const input = document.getElementById('forumReplyInput');
  const text = input.value.trim();
  if (!text || !currentForumPostId) return;
  const post = state.forum.find(p => p.id === currentForumPostId);
  if (!post) return;
  if (!post.replies) post.replies = [];
  post.replies.push({
    id: genId(), charId: null, isUser: true, author: '我', content: text, time: now()
  });
  input.value = '';
  saveState();
  renderForumDetail();
}

async function forumDetailAction(action) {
  if (action === 'refresh' && currentForumPostId) {
    if (state.characters.length === 0) { showToast('请先添加角色', 'info'); return; }
    // Pick random character to reply
    const char = state.characters[Math.floor(Math.random() * state.characters.length)];
    const post = state.forum.find(p => p.id === currentForumPostId);
    if (!post) return;
    showLoading(true);
    const prompt = buildPrompt(state.settings.prompts.forumReply, { name: char.name, post: post.content });
    const sysPrompt = state.settings.prompts.system + '\n角色设定：' + char.name + '\n' + (char.bio || '');
    const result = await callAPI([
      { role: 'system', content: sysPrompt },
      { role: 'user', content: prompt }
    ]);
    showLoading(false);
    if (result) {
      if (!post.replies) post.replies = [];
      post.replies.push({
        id: genId(), charId: char.id, isUser: false,
        author: char.nickname || char.name, content: result, time: now()
      });
      saveState();
      renderForumDetail();
      showToast('新回复已生成', 'success');
    }
  }
}

// ===== CHAR SELECT =====
function showCharSelect(menuId, callback) {
  const menu = document.getElementById(menuId);
  if (state.characters.length === 0) { showToast('请先在设置中添加角色', 'info'); return; }
  let html = '<div class="select-menu-header">选择角色</div>';
  for (const char of state.characters) {
    html += `<div class="select-menu-item" data-char-id="${char.id}">
      ${avatarHTML(char, 30, 'sel-ava')}
      ${escapeHTML(char.nickname || char.name)}
    </div>`;
  }
  menu.innerHTML = html;
  menu.classList.add('show');
  menu.querySelectorAll('.select-menu-item').forEach(item => {
    item.addEventListener('click', () => {
      menu.classList.remove('show');
      callback(item.dataset.charId);
    });
  });
}

function renderWallet() {
  document.getElementById('walletAmount').textContent = state.wallet.balance;
  const list = document.getElementById('walletTxnList');
  if (state.wallet.transactions.length === 0) {
    list.innerHTML = '<div class="moment-empty" style="padding:30px">暂无交易记录</div>';
    return;
  }
  let html = '';
  for (const txn of [...state.wallet.transactions].reverse()) {
    const isIncome = parseFloat(txn.amount) > 0;
    html += `<div class="wallet-txn-item" onclick="editWalletTxn('${txn.id}')">
      <div><div class="wallet-txn-desc">${escapeHTML(txn.desc)}</div><div class="wallet-txn-time">${txn.time || ''}</div></div>
      <div class="wallet-txn-amount ${isIncome ? 'income' : 'expense'}">${isIncome ? '+' : ''}${txn.amount}</div>
    </div>`;
  }
  list.innerHTML = html;
}

function editWalletBalance() {
  const val = prompt('输入余额:', state.wallet.balance);
  if (val !== null) { state.wallet.balance = val; saveState(); renderWallet(); }
}

function editWalletTxn(txnId) {
  const txn = state.wallet.transactions.find(t => t.id === txnId);
  if (!txn) return;
  document.getElementById('editModalTitle').textContent = '编辑交易';
  document.getElementById('editTextarea').value = txn.desc + '\n金额: ' + txn.amount;
  editCallback = (content) => {
    const lines = content.split('\n');
    txn.desc = lines[0] || txn.desc;
    if (lines[1]) { const m = lines[1].match(/-?[\d.]+/); if (m) txn.amount = m[0]; }
    saveState(); renderWallet();
  };
  document.getElementById('editModal').classList.add('show');
}

    </div>

    <!-- Wallpaper -->
    <div class="settings-group-title" style="padding:14px 16px 4px">壁纸URL</div>
    <div class="settings-group">
      <div class="settings-row"><input type="text" id="s_wallpaper" value="${escapeAttr(s.wallpaper || '')}" placeholder="留空使用默认"></div>
    </div>

    <button class="settings-btn primary" onclick="saveSettings()">保存设置</button>

    <!-- Characters -->
    <div class="settings-group-title" style="padding:20px 16px 4px">角色管理</div>
    <div class="char-list" id="charList"></div>
    <button class="settings-btn secondary" onclick="addCharacter()">添加角色</button>

    <!-- Data -->
    <div class="settings-group-title" style="padding:20px 16px 4px">数据管理</div>
    <button class="settings-btn secondary" onclick="exportData()">导出数据</button>
    <button class="settings-btn secondary" onclick="importData()">导入数据</button>
    <button class="settings-btn danger" onclick="resetAllData()">重置所有数据</button>
    <div style="height:40px"></div>
  `;
  renderCharList();
}

function saveSettings() {
  const s = state.settings;
  s.api.endpoint = document.getElementById('s_endpoint').value.trim();
  s.api.key = document.getElementById('s_key').value.trim();
  s.api.model = document.getElementById('s_model').value.trim();
  s.api.maxTokens = parseInt(document.getElementById('s_maxtok').value) || 1000;
  s.prompts.system = document.getElementById('s_system').value;
  s.prompts.chat = document.getElementById('s_chat').value;
  s.prompts.momentPost = document.getElementById('s_momentPost').value;
  s.prompts.momentComment = document.getElementById('s_momentComment').value;
  s.prompts.forumPost = document.getElementById('s_forumPost').value;
  s.prompts.forumReply = document.getElementById('s_forumReply').value;
  s.prompts.diary = document.getElementById('s_diary').value;
  s.prompts.browser = document.getElementById('s_browser').value;
  s.chatConfig.showCount = parseInt(document.getElementById('s_showCount').value) || 50;
  s.wallpaper = document.getElementById('s_wallpaper').value.trim();
  applyWallpaper();
  saveState();
  showToast('设置已保存', 'success');
}

function toggleFeature(el, key) {
  el.classList.toggle('on');
  state.settings.features[key] = el.classList.contains('on');
  saveState();
}

function applyWallpaper() {
  const img = document.querySelector('.home-bg img');
  if (state.settings.wallpaper) img.src = state.settings.wallpaper;
}

// ===== CHARACTER MANAGEMENT =====
function renderCharList() {
  const list = document.getElementById('charList');
  if (!list) return;
  if (state.characters.length === 0) {
    list.innerHTML = '<div class="moment-empty" style="padding:20px;font-size:13px">暂无角色，点击下方添加</div>';
    return;
  }
  let html = '';
  for (const char of state.characters) {
    html += `<div class="char-item" onclick="editCharacter('${char.id}')">
      ${avatarHTML(char, 40, 'char-item-avatar')}
      <div class="char-item-name">${escapeHTML(char.nickname || char.name)}</div>
      <div class="char-item-del" onclick="event.stopPropagation();deleteCharacter('${char.id}')">删除</div>
    </div>`;
  }
  list.innerHTML = html;
}

function addCharacter() {
  openCharEditModal({
    id: genId(), name: '', nickname: '', avatar: '', bio: '', memory: ''
  }, true);
}

function editCharacter(charId) {
  const char = getChar(charId);
  if (!char) return;
  openCharEditModal(char, false);
}

function openCharEditModal(char, isNew) {
  document.getElementById('charEditTitle').textContent = isNew ? '添加角色' : '编辑角色';
  const body = document.getElementById('charEditBody');
  body.innerHTML = `
    <div class="settings-row"><label>名称</label><input type="text" id="ce_name" value="${escapeAttr(char.name)}"></div>
    <div class="settings-row"><label>备注</label><input type="text" id="ce_nick" value="${escapeAttr(char.nickname || '')}"></div>
    <div class="settings-row"><label>头像URL</label><input type="text" id="ce_avatar" value="${escapeAttr(char.avatar || '')}"></div>
    <div class="settings-row" style="flex-direction:column;align-items:stretch"><label>角色设定 / 人物简介</label><textarea id="ce_bio" rows="5" style="margin-top:6px">${escapeHTML(char.bio || '')}</textarea></div>
    <div class="settings-row" style="flex-direction:column;align-items:stretch"><label>记忆摘要</label><textarea id="ce_memory" rows="3" style="margin-top:6px">${escapeHTML(char.memory || '')}</textarea></div>
    <button class="settings-btn primary" onclick="saveCharEdit('${char.id}', ${isNew})" style="margin:16px 18px">保存</button>
  `;
  document.getElementById('charEditModal').classList.add('show');
}

function saveCharEdit(charId, isNew) {
  const name = document.getElementById('ce_name').value.trim();
  if (!name) { showToast('名称不能为空', 'error'); return; }
  const charData = {
    id: charId,
    name,
    nickname: document.getElementById('ce_nick').value.trim(),
    avatar: document.getElementById('ce_avatar').value.trim(),
    bio: document.getElementById('ce_bio').value,
    memory: document.getElementById('ce_memory').value
  };
  if (isNew) {
    state.characters.push(charData);
  } else {
    const idx = state.characters.findIndex(c => c.id === charId);
    if (idx >= 0) state.characters[idx] = charData;
  }
  saveState();
  closeCharEditModal();
  renderCharList();
  showToast('角色已保存', 'success');
}

function deleteCharacter(charId) {
  if (!confirm('确认删除该角色？')) return;
  state.characters = state.characters.filter(c => c.id !== charId);
  delete state.chats[charId];
  saveState();
  renderCharList();
  showToast('已删除', 'success');
}

function closeCharEditModal() {
  document.getElementById('charEditModal').classList.remove('show');
}

// ===== DATA MANAGEMENT =====
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sp_rp_data.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出', 'success');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        state = data;
        saveState();
        location.reload();
      } catch(err) { showToast('导入失败: 无效的JSON', 'error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAllData() {
  if (!confirm('确认重置所有数据？此操作不可撤销。')) return;
  if (!confirm('真的确认吗？')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ===== UTILITY =====
function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== HOME APP NAVIGATION =====
document.querySelectorAll('.home-app[data-page]').forEach(app => {
  app.addEventListener('click', () => navigateTo(app.dataset.page));
});

// ===== INIT =====
function init() {
  initTheme();
  applyWallpaper();
  updatePlayerUI();
}
init();
</script>

</body>
</html>
