<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小手机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
--bg:#f2f2f7;--bg2:#ffffff;--text:#000;--text2:#3c3c43;--text3:#8e8e93;
--card:rgba(255,255,255,.78);--card2:rgba(242,242,247,.9);
--nav:rgba(249,249,249,.94);--sep:rgba(60,60,67,.08);
--accent:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
--input-bg:rgba(118,118,128,.12);--overlay:rgba(0,0,0,.4);
--bubble-user:#007aff;--bubble-char:rgba(233,233,235,.95);--bubble-char-text:#000;
--glass:rgba(255,255,255,.72);--feat-bg:rgba(142,142,147,.18);--feat-fg:#8e8e93;
--sb-color:#000;
}
.dark{
--bg:#000;--bg2:#1c1c1e;--text:#fff;--text2:rgba(235,235,245,.6);--text3:#636366;
--card:rgba(44,44,46,.78);--card2:rgba(38,38,40,.9);
--nav:rgba(28,28,30,.96);--sep:rgba(84,84,88,.2);
--bubble-char:rgba(58,58,60,.9);--bubble-char-text:#fff;
--input-bg:rgba(118,118,128,.24);--overlay:rgba(0,0,0,.6);
--glass:rgba(44,44,46,.72);--feat-bg:rgba(255,255,255,.12);--feat-fg:#fff;
--sb-color:#fff;
}
html,body{width:100%;height:100%;overflow:hidden}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue","PingFang SC",sans-serif}
#phone{width:360px;height:580px;border-radius:46px;position:relative;overflow:hidden;background:var(--bg);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 24px 80px rgba(0,0,0,.55);transition:background .35s}
#phone *::-webkit-scrollbar{display:none}
#phone *{scrollbar-width:none}
textarea,input{-webkit-user-select:text;user-select:text;font-family:inherit}

.sb{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;z-index:100;font-size:13px;font-weight:600;color:var(--sb-color);pointer-events:none}
.sb-r{display:flex;align-items:center;gap:6px}
.sb-r svg{fill:var(--sb-color)}

/* DYNAMIC ISLAND */
.di{position:absolute;top:10px;left:50%;transform:translateX(-50%);height:28px;min-width:100px;background:#000;border-radius:50px;z-index:200;display:flex;align-items:center;padding:0 12px;gap:6px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.di.playing{min-width:140px}
.di .di-glow{position:absolute;inset:-2px;border-radius:52px;background:conic-gradient(#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b);opacity:0;transition:opacity .3s;z-index:-1}
.di.playing .di-glow{opacity:.6;animation:diR 3s linear infinite}
@keyframes diR{to{transform:rotate(360deg)}}
.di-inner{display:flex;align-items:center;gap:6px;width:100%}
.di-wave{display:flex;align-items:center;gap:1.5px;height:14px}
.di-wave i{width:2px;background:#4cd964;border-radius:1px;display:block;height:4px;transition:height .2s}
.di.playing .di-wave i{animation:diW .6s ease-in-out infinite alternate}
.di-wave i:nth-child(1){animation-delay:0s}
.di-wave i:nth-child(2){height:8px;animation-delay:.1s}
.di-wave i:nth-child(3){height:12px;animation-delay:.2s}
.di-wave i:nth-child(4){height:6px;animation-delay:.3s}
@keyframes diW{to{height:14px}}
.di-name{color:#fff;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75px;font-weight:500}

.di-panel{position:absolute;top:0;left:0;right:0;background:#000;z-index:250;border-radius:0 0 30px 30px;padding:48px 20px 20px;display:none;animation:slideD .3s ease}
.di-panel.show{display:block}
@keyframes slideD{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.dip-art{width:56px;height:56px;border-radius:14px;background:#222;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.dip-art svg{width:26px;height:26px;fill:#555}
.dip-title{color:#fff;font-size:15px;font-weight:700;text-align:center}
.dip-artist{color:#666;font-size:11px;text-align:center;margin-top:2px}
.dip-pbar{margin:12px 0 4px;height:4px;background:#333;border-radius:2px;cursor:pointer;position:relative}
.dip-pfill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .2s}
.dip-times{display:flex;justify-content:space-between;font-size:10px;color:#555}
.dip-ctrls{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:12px}
.dip-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px}
.dip-btn svg{width:20px;height:20px;fill:#fff}
.dip-btn.play svg{width:30px;height:30px}
.dip-close{position:absolute;top:14px;right:16px;color:#666;font-size:16px;cursor:pointer;background:none;border:none;padding:4px 8px}

.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:10;background:var(--bg);transition:opacity .2s}
.screen.active{display:flex}
.scr-c{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

.home-wall{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;border-radius:46px}
.home-c{position:relative;z-index:1;padding-top:50px}
.home-time{text-align:center;margin-top:30px;font-size:62px;font-weight:200;color:var(--text);letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums}
.home-date{text-align:center;font-size:15px;color:var(--text2);margin-top:6px;font-weight:500}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px 14px;padding:36px 26px 90px;margin-top:16px}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.app-box{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:transform .12s;position:relative;overflow:hidden}
.app-box::before{content:'';position:absolute;inset:0;border-radius:16px;border:1px solid rgba(255,255,255,.2)}
.app-box:active{transform:scale(.85)}
.app-box svg{width:26px;height:26px}
.app-label{font-size:11px;color:var(--text);font-weight:500}

.bnav{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);height:56px;display:flex;align-items:center;justify-content:space-around;z-index:90;background:var(--nav);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:28px;padding:0 6px;gap:2px;width:calc(100% - 40px);border:1px solid var(--sep);box-shadow:0 4px 20px rgba(0,0,0,.06)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;color:var(--text3);padding:6px 14px;border-radius:20px;transition:all .2s}
.bnav-item.act{color:var(--accent)}
.bnav-item svg{width:22px;height:22px;fill:currentColor}
.bnav-item span{font-size:10px;font-weight:500}

.hbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;margin-top:48px;flex-shrink:0}
.hbar-t{font-size:18px;font-weight:700;color:var(--text)}
.hbar-btn{width:32px;height:32px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.hbar-btn:active{transform:scale(.88)}
.hbar-btn svg{width:16px;height:16px;fill:var(--text3)}

.mlist{padding:6px 16px 90px}
.mitem{display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;border-radius:16px;transition:background .15s;margin-bottom:2px}
.mitem:active{background:var(--input-bg)}
.mav{width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--card2);display:flex;align-items:center;justify-content:center}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:24px;height:24px;fill:var(--text3)}
.minfo{flex:1;min-width:0;border-bottom:1px solid var(--sep);padding-bottom:12px}
.mitem:last-child .minfo{border-bottom:none}
.mn{font-size:16px;font-weight:600;color:var(--text)}
.mp{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mt{font-size:12px;color:var(--text3);flex-shrink:0;align-self:flex-start;margin-top:2px}

.chat-hbar{display:flex;align-items:center;padding:0 8px;height:44px;margin-top:48px;flex-shrink:0;gap:8px}
.chat-back{display:flex;align-items:center;cursor:pointer;color:var(--accent);padding:4px;background:none;border:none}
.chat-back svg{width:22px;height:22px;fill:var(--accent)}
.chat-nm{flex:1;font-size:16px;font-weight:600;color:var(--text);text-align:center}
.chat-dots{padding:6px;cursor:pointer;background:none;border:none}
.chat-dots svg{width:20px;height:20px;fill:var(--text3)}
.chat-body{flex:1;overflow-y:auto;padding:8px 14px 6px;display:flex;flex-direction:column;gap:1px}

.msg-row{display:flex;flex-direction:column;margin-bottom:3px}
.msg-row.u{align-items:flex-end}
.msg-row.c{align-items:flex-start}
.msg-row.s{align-items:center}
.msg-w{display:flex;align-items:flex-end;gap:6px;max-width:78%}
.msg-row.u .msg-w{flex-direction:row-reverse}
.msg-cav{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2)}
.msg-cav img{width:100%;height:100%;object-fit:cover}
.bub{padding:9px 13px;font-size:14.5px;line-height:1.4;word-break:break-word;border-radius:20px}
.msg-row.u .bub{background:var(--bubble-user);color:#fff;border-bottom-right-radius:6px}
.msg-row.c .bub{background:var(--bubble-char);color:var(--bubble-char-text);border-bottom-left-radius:6px}
.msg-row.s .bub{background:transparent;color:var(--text3);font-size:11px;padding:4px 10px}
.msg-ts{font-size:10px;color:var(--text3);margin-top:2px;padding:0 4px}
.msg-row.u .msg-ts{text-align:right}

/* Red packet - clean style */
.rp-bub{border-radius:16px!important;padding:0!important;overflow:hidden;min-width:180px;cursor:pointer;background:var(--card2)!important;color:var(--text)!important;border:1px solid var(--sep)}
.rp-top{padding:14px 16px;display:flex;align-items:center;gap:12px}
.rp-ico{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rp-ico svg{width:20px;height:20px;fill:#fff}
.rp-info{flex:1}
.rp-tit{font-size:15px;font-weight:600;color:var(--text)}
.rp-note{font-size:12px;color:var(--text3);margin-top:1px}
.rp-bot{padding:6px 16px;border-top:1px solid var(--sep);font-size:10px;color:var(--text3)}

/* Voice */
.voice-bub{display:flex;align-items:center;gap:8px;min-width:100px;cursor:pointer;padding:10px 14px!important}
.v-waves{display:flex;align-items:center;gap:2px;height:18px}
.v-waves i{width:2.5px;border-radius:2px;background:currentColor;opacity:.5;display:block}
.v-dur{font-size:12px;opacity:.6;flex-shrink:0}

/* Image */
.img-bub{padding:4px!important;border-radius:16px!important;overflow:hidden;cursor:pointer;position:relative}
.img-bub img{width:180px;max-height:180px;object-fit:cover;border-radius:13px;display:block}
.img-bub .img-ov{position:absolute;inset:4px;background:rgba(0,0,0,.6);border-radius:13px;display:none;align-items:center;justify-content:center;padding:12px;color:#fff;font-size:12px;text-align:center;line-height:1.4;backdrop-filter:blur(4px)}
.img-bub.show-d .img-ov{display:flex}
.img-placeholder{width:180px;height:110px;background:var(--card2);border-radius:13px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.img-placeholder svg{width:28px;height:28px;fill:var(--text3)}
.img-placeholder span{font-size:11px;color:var(--text3)}

/* Sticker */
.stk-bub{background:transparent!important;padding:4px!important}
.stk-bub img{width:90px;height:90px;object-fit:contain}

.chat-ibar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--nav);backdrop-filter:blur(30px);border-top:1px solid var(--sep);flex-shrink:0}
.ci-btn{width:32px;height:32px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:transform .12s}
.ci-btn:active{transform:scale(.85)}
.ci-btn svg{width:15px;height:15px;fill:var(--text3)}
.ci-btn.loading{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ci-input{flex:1;height:36px;border-radius:18px;border:1px solid var(--sep);background:var(--bg2);padding:0 14px;font-size:14px;color:var(--text);outline:none}
.chat-safe{height:8px;background:var(--nav);flex-shrink:0}

.feat-tray{display:none;padding:10px 16px 8px;background:var(--nav);gap:20px;flex-shrink:0;flex-wrap:wrap}
.feat-tray.show{display:flex}
.feat-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.feat-box{width:48px;height:48px;border-radius:14px;background:var(--feat-bg);display:flex;align-items:center;justify-content:center}
.feat-box svg{width:24px;height:24px;fill:var(--feat-fg)}
.feat-item span{font-size:10px;color:var(--text3)}

.stk-panel{display:none;position:absolute;bottom:52px;left:0;right:0;height:180px;background:var(--nav);backdrop-filter:blur(24px);border-top:1px solid var(--sep);z-index:60;padding:10px;overflow-y:auto}
.stk-panel.show{display:block}
.stk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stk-gi{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;border-radius:10px;transition:background .12s}
.stk-gi:active{background:var(--input-bg)}
.stk-gi img{width:52px;height:52px;object-fit:contain}
.stk-gi span{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px;text-align:center}

/* MOMENTS */
.mom-banner{width:100%;height:200px;position:relative;overflow:visible;background:linear-gradient(135deg,#667eea,#764ba2)}
.mom-banner img{width:100%;height:100%;object-fit:cover;display:block}
.mom-banner .mom-grad{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.35))}
.mom-banner-bot{position:absolute;bottom:-28px;right:16px;display:flex;align-items:flex-end;gap:10px}
.mom-uname{font-size:17px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);margin-bottom:10px}
.mom-uav{width:60px;height:60px;border-radius:10px;overflow:hidden;background:var(--card);border:3px solid var(--bg)}
.mom-uav img{width:100%;height:100%;object-fit:cover}
.mom-sig{text-align:right;padding:34px 16px 8px;font-size:12px;color:var(--text3);cursor:pointer}
.mom-feed{padding:0 0 90px}
.mom-item{padding:12px 16px;border-bottom:1px solid var(--sep);display:flex;gap:10px}
.mom-av{width:40px;height:40px;border-radius:6px;flex-shrink:0;overflow:hidden;background:var(--card2)}
.mom-av img{width:100%;height:100%;object-fit:cover}
.mom-r{flex:1;min-width:0}
.mom-author{font-size:15px;font-weight:600;color:var(--accent);margin-bottom:3px}
.mom-txt{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:6px;word-break:break-word}
.mom-img{max-width:100%;max-height:160px;border-radius:6px;margin-bottom:6px}
.mom-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mom-time{font-size:12px;color:var(--text3)}
.mom-abtn{background:var(--input-bg);border:none;border-radius:4px;padding:3px 8px;cursor:pointer}
.mom-abtn svg{width:16px;height:16px;fill:var(--text3)}
.mom-cmts{background:var(--card2);border-radius:4px;padding:6px 8px;margin-top:6px}
.mom-cmt{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:2px}
.mom-cmt:last-child{margin-bottom:0}
.mom-cmt b{color:var(--accent);font-weight:600;cursor:pointer}
.mom-fab{position:absolute;bottom:80px;right:18px;width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(0,122,255,.35);z-index:50;border:none}
.mom-fab:active{transform:scale(.88)}
.mom-fab svg{width:22px;height:22px;fill:#fff}

.md-card{padding:12px 16px;border-bottom:1px solid var(--sep)}
.md-cmts{padding:8px 16px 20px}
.md-ci{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.md-ca{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2);cursor:pointer}
.md-ca img{width:100%;height:100%;object-fit:cover}
.md-cb{font-size:13px;color:var(--text);line-height:1.4}
.md-cb b{color:var(--accent);font-weight:600;cursor:pointer}

.slist{padding:8px 16px 90px}
.sg-t{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:12px 0 4px;letter-spacing:.5px}
.sg{background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:4px}
.si{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--sep);cursor:pointer}
.si:last-child{border-bottom:none}
.si-l{display:flex;align-items:center;gap:10px;color:var(--text);font-size:15px}
.si-l svg{width:20px;height:20px;fill:var(--accent)}
.si-r{display:flex;align-items:center;gap:4px;color:var(--text3);font-size:13px}
.si-r svg{width:14px;height:14px;fill:var(--text3)}
.tog{width:46px;height:28px;border-radius:14px;background:var(--input-bg);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.tog.on{background:var(--green)}
.tog-k{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tog.on .tog-k{left:20px}

/* Fullscreen modal */
.fs{position:absolute;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
.fs.show{display:flex}
.fs-body{flex:1;overflow-y:auto;padding:8px 16px 20px}
.fs-body textarea,.fs-body input{-webkit-user-select:text;user-select:text}

/* Bottom sheet */
.bso{position:absolute;inset:0;background:var(--overlay);z-index:280;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.bso.show{display:flex}
.bss{width:100%;max-height:80%;background:var(--nav);backdrop-filter:blur(40px);border-radius:22px 22px 0 0;padding:16px;overflow-y:auto;animation:bsUp .3s ease}
.bss textarea,.bss input{-webkit-user-select:text;user-select:text;font-family:inherit}
@keyframes bsUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.fg{margin-bottom:10px}
.fl{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.fi{width:100%;height:36px;border-radius:10px;border:1px solid var(--sep);background:var(--bg2);padding:0 12px;font-size:14px;color:var(--text);outline:none}
.ft{width:100%;border-radius:10px;border:1px solid var(--sep);background:var(--bg2);padding:10px 12px;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:56px;font-family:inherit;line-height:1.45}
.fbtn{width:100%;height:40px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.fbtn:active{opacity:.7}
.fbtn.red{background:var(--red)}
.fbtn.grn{background:var(--green)}
.av-up{width:64px;height:64px;border-radius:50%;background:var(--card2);border:2px dashed var(--sep);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin:0 auto 10px}
.av-up img{width:100%;height:100%;object-fit:cover}
.av-up svg{width:24px;height:24px;fill:var(--text3)}
.chip{display:inline-flex;align-items:center;padding:5px 12px;background:var(--card);border-radius:8px;font-size:13px;color:var(--text);border:1px solid var(--sep);cursor:pointer;margin:2px}
.chip.act{border-color:var(--accent);background:rgba(0,122,255,.1);color:var(--accent)}
.badge{display:inline-flex;padding:2px 8px;background:var(--accent);color:#fff;border-radius:6px;font-size:11px;font-weight:600}
.range-s{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--sep);outline:none;margin:6px 0}
.range-s::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.2);border:1px solid var(--sep)}

<script>
var D={
theme:'light',wallpaper:null,
user:{name:'我',avatar:null,sig:'',momBg:null},
chars:[],moments:[],
apis:[{id:_id(),name:'默认',url:'',key:'',model:'',temp:0.7}],aApi:0,
wb:{
chatSys:'你是一个角色扮演助手。请根据角色设定以角色身份回复用户消息。每次回复1-3条，每条20-80字。JSON数组格式：[{"msg":"内容"}]',
chatFmt:'回复格式：JSON数组，每个元素含msg字段。[{"msg":"你好"},{"msg":"在干嘛？"}]',
momPost:'根据角色设定生成一条朋友圈动态，符合角色性格。JSON：{"content":"内容"}',
momReply:'根据角色设定对朋友圈评论。JSON数组：[{"name":"角色名","content":"评论"}]',
sumP:'请总结以下对话，提取关键信息、情感变化、重要事件，200字以内：',
stkP:'角色可发表情包。格式[sticker:名称]。只能从列表选：',
rpFmt:'用户发红包格式[红包:金额:备注]，请回应。',
voFmt:'用户发语音格式[语音:内容]，请回应。',
imgFmt:'用户发图片格式[图片:描述]，请回应。',
momPostSys:'[朋友圈] {user}发了一条朋友圈：{content}',
momCharPostSys:'[系统] {char}刚才发了一条朋友圈：{content}',
momCmtSys:'[朋友圈评论更新] "{title}"的评论已更新：\n{comments}',
music:[]
},
cust:{uColor:'#007aff',cColor:'',uAlpha:1,cAlpha:1,enStk:true,enRP:true,enVo:true,enImg:true,syncT:false,crossR:true},
stickers:[],songI:0,playing:false,curChat:null,curMom:null
};

function _id(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function bjt(){return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Shanghai"}))}
function ft(d){d=d||bjt();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fd(d){d=d||bjt();return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日'}
function save(){try{localStorage.setItem('mp3',JSON.stringify(D))}catch(e){}}
function load(){try{var d=localStorage.getItem('mp3');if(d){var p=JSON.parse(d);for(var k in p){if(p.hasOwnProperty(k))D[k]=p[k]}}}catch(e){}}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2200)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

load();

function init(){
applyTheme();updateClock();setInterval(updateClock,15000);
renderML();renderMom();buildFeatTogs();
if(D.wallpaper)document.getElementById('homeWall').style.backgroundImage='url('+D.wallpaper+')';
if(D.user.avatar){si('momUavI',D.user.avatar)}
if(D.user.momBg){si('momBannerI',D.user.momBg)}
if(D.user.sig)document.getElementById('momSig').textContent=D.user.sig;
document.getElementById('momUN').textContent=D.user.name;
document.getElementById('setUN').textContent=D.user.name;
applyCol();
if(D.cust.crossR)document.getElementById('togCR').classList.add('on');
if(D.cust.syncT)document.getElementById('togST').classList.add('on');
if(D.theme==='dark')document.getElementById('togTh').classList.add('on');
initMu();
}
function si(id,src){var i=document.getElementById(id);if(i){i.src=src;i.style.display='block'}}
function applyTheme(){document.getElementById('phone').classList.toggle('dark',D.theme==='dark')}
function applyCol(){
document.documentElement.style.setProperty('--bubble-user',hexAlpha(D.cust.uColor||'#007aff',D.cust.uAlpha));
if(D.cust.cColor)document.documentElement.style.setProperty('--bubble-char',hexAlpha(D.cust.cColor,D.cust.cAlpha));
}
function hexAlpha(hex,a){
if(a===undefined||a===null)a=1;
var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
return'rgba('+r+','+g+','+b+','+a+')';
}
function updateClock(){
var t=bjt();
document.getElementById('sbTime').textContent=ft(t);
document.getElementById('homeTime').textContent=ft(t);
document.getElementById('homeDate').textContent=fd(t);
}
function togTheme(){D.theme=D.theme==='dark'?'light':'dark';document.getElementById('togTh').classList.toggle('on');applyTheme();save()}
function togCR(){document.getElementById('togCR').classList.toggle('on');D.cust.crossR=document.getElementById('togCR').classList.contains('on');save()}
function togST(){document.getElementById('togST').classList.toggle('on');D.cust.syncT=document.getElementById('togST').classList.contains('on');save()}

var curScr='scrHome';
function go(id){
document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
document.getElementById(id).classList.add('active');
document.querySelectorAll('.bnav-item').forEach(function(n){n.classList.toggle('act',n.dataset.s===id)});
document.getElementById('bnav').style.display=(['scrChat','scrMD'].indexOf(id)>=0)?'none':'flex';
curScr=id;
if(id==='scrMsg')renderML();
if(id==='scrMom')renderMom();
}

function upFile(cb){var i=document.getElementById('fInp');i.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(v){cb(v.target.result)};r.readAsDataURL(f);i.value=''};i.click()}
function upUAv(){upFile(function(d){D.user.avatar=d;si('momUavI',d);save();toast('头像已更新')})}
function upMomBg(){upFile(function(d){D.user.momBg=d;si('momBannerI',d);save();toast('背景已更新')})}
function editSig(){var v=prompt('编辑签名',D.user.sig||'');if(v!==null){D.user.sig=v;document.getElementById('momSig').textContent=v||'点击编辑签名';save()}}
function editUN(){var v=prompt('用户名',D.user.name||'我');if(v!==null&&v.trim()){D.user.name=v.trim();document.getElementById('momUN').textContent=v;document.getElementById('setUN').textContent=v;save()}}
function uploadWP(){upFile(function(d){D.wallpaper=d;document.getElementById('homeWall').style.backgroundImage='url('+d+')';save();toast('壁纸已更新')})}

// Characters
var _tav=null;
function openCharNew(eid){
var ch=eid?D.chars.find(function(c){return c.id===eid}):null;_tav=null;
var h='<div class="mt-title">'+(ch?'编辑':'创建')+'角色</div>';
h+='<div class="av-up" onclick="upCAv(this)">'+(ch&&ch.avatar?'<img src="'+ch.avatar+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="var(--text3)"/></svg>')+'</div>';
h+='<div class="fg"><div class="fl">备注</div><input class="fi" id="fNk" value="'+(ch?ch.nick:'')+'"></div>';
h+='<div class="fg"><div class="fl">角色名</div><input class="fi" id="fNm" value="'+(ch?ch.name:'')+'"></div>';
h+='<div class="fg"><div class="fl">人设</div><textarea class="ft" id="fPs" rows="4">'+(ch?ch.persona:'')+'</textarea></div>';
h+='<button class="fbtn" onclick="saveChar(\''+( eid||'')+'\')">保存</button>';
if(ch)h+='<button class="fbtn red" style="margin-top:6px" onclick="delChar(\''+eid+'\')">删除</button>';
showBS(h);
}
function upCAv(el){upFile(function(d){_tav=d;el.innerHTML='<img src="'+d+'">'})}
function saveChar(eid){
var nick=document.getElementById('fNk').value.trim();
var name=document.getElementById('fNm').value.trim();
var persona=document.getElementById('fPs').value.trim();
if(!name){toast('请输入角色名');return}
if(eid){var ch=D.chars.find(function(c){return c.id===eid});if(ch){ch.nick=nick;ch.name=name;ch.persona=persona;if(_tav)ch.avatar=_tav}}
else{D.chars.push({id:_id(),name:name,nick:nick,avatar:_tav,persona:persona,msgs:[],memory:'',ctxL:20,autoS:false,sumI:20,sumP:'',lastM:'',lastT:''})}
_tav=null;save();closeBS();renderML();toast('已保存');
}
function delChar(id){if(!confirm('确定删除？'))return;D.chars=D.chars.filter(function(c){return c.id!==id});save();closeBS();closeCharFS();renderML();go('scrMsg')}

function renderML(){
var el=document.getElementById('msgList');
if(!D.chars.length){el.innerHTML='<div style="text-align:center;padding:50px 20px;color:var(--text3);font-size:14px">暂无角色<br>点击右上角创建</div>';return}
var h='';
for(var i=0;i<D.chars.length;i++){
var c=D.chars[i];
var av=c.avatar?'<img src="'+c.avatar+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="var(--text3)"/></svg>';
h+='<div class="mitem" onclick="openChat(\''+c.id+'\')"><div class="mav">'+av+'</div><div class="minfo"><div class="mn">'+(c.nick||c.name)+'</div><div class="mp">'+(c.lastM||'暂无消息')+'</div></div><div class="mt">'+(c.lastT||'')+'</div></div>';
}
el.innerHTML=h;
}

// CHAT
function openChat(id){
D.curChat=id;var ch=gch(id);if(!ch)return;
document.getElementById('chatNm').textContent=ch.nick||ch.name;
go('scrChat');renderBub();
document.getElementById('featTray').classList.remove('show');
document.getElementById('stkPanel').classList.remove('show');
}
function gch(id){return D.chars.find(function(c){return c.id===id})}
function renderBub(){
var ch=gch(D.curChat);if(!ch)return;
var el=document.getElementById('chatBody');
var h='';
for(var i=0;i<ch.msgs.length;i++){
var m=ch.msgs[i];
var cls=m.role==='user'?'u':m.role==='char'?'c':'s';
var ts='<div class="msg-ts">'+(m.time||'')+'</div>';
var av=cls==='c'?'<div class="msg-cav">'+(ch.avatar?'<img src="'+ch.avatar+'">':'')+'</div>':'';

if(cls==='s'){h+='<div class="msg-row s"><div class="msg-w"><div class="bub">'+esc(m.content)+'</div></div></div>';continue}
if(m.type==='redpacket'){
h+='<div class="msg-row '+cls+'"><div class="msg-w">'+av+'<div class="bub rp-bub" onclick="toast(\''+(m.note||'恭喜发财').replace(/'/g,"\\'")+'\')">';
h+='<div class="rp-top"><div class="rp-ico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.94s4.18 1.36 4.18 3.87c0 1.88-1.43 2.88-3.12 3.17z" fill="#fff"/></svg></div>';
h+='<div class="rp-info"><div class="rp-tit">'+(m.note||'恭喜发财')+'</div><div class="rp-note">'+(m.amount?'¥'+m.amount:'')+'</div></div></div>';
h+='<div class="rp-bot">红包</div></div></div>'+ts+'</div>';
continue;
}
if(m.type==='voice'){
var bars='';for(var b=0;b<8;b++){var bh=[5,10,14,8,16,12,6,14][b];bars+='<i style="height:'+bh+'px"></i>'}
h+='<div class="msg-row '+cls+'"><div class="msg-w">'+av+'<div class="bub voice-bub" onclick="toast(\''+(m.content||'').replace(/'/g,"\\'")+'\')">';
h+='<div class="v-waves">'+bars+'</div><div class="v-dur">'+(m.dur||"0\"")+'</div></div></div>'+ts+'</div>';
continue;
}
if(m.type==='image'){
h+='<div class="msg-row '+cls+'"><div class="msg-w">'+av+'<div class="bub img-bub" onclick="this.classList.toggle(\'show-d\')">';
if(m.src)h+='<img src="'+m.src+'">';
else h+='<div class="img-placeholder"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg><span>图片</span></div>';
h+='<div class="img-ov">'+esc(m.desc||'图片')+'</div></div></div>'+ts+'</div>';
continue;
}
if(m.type==='sticker'){
h+='<div class="msg-row '+cls+'"><div class="msg-w">'+av+'<div class="bub stk-bub"><img src="'+(m.url||'')+'" onerror="this.outerHTML=\'[表情]\'"></div></div>'+ts+'</div>';
continue;
}
h+='<div class="msg-row '+cls+'"><div class="msg-w">'+av+'<div class="bub">'+esc(m.content)+'</div></div>'+ts+'</div>';
}
el.innerHTML=h;
el.scrollTop=el.scrollHeight;
}
function sendMsg(){
var inp=document.getElementById('chatInp');var txt=inp.value.trim();if(!txt)return;
var ch=gch(D.curChat);if(!ch)return;
ch.msgs.push({role:'user',content:txt,type:'text',time:ft()});
ch.lastM=txt;ch.lastT=ft();inp.value='';save();renderBub();
}
function togFeat(){document.getElementById('featTray').classList.toggle('show');document.getElementById('stkPanel').classList.remove('show')}

function openRP(){
document.getElementById('featTray').classList.remove('show');
showBS('<div class="mt-title">发红包</div><div class="fg"><div class="fl">金额</div><input class="fi" id="rpA" type="number" placeholder="0.00"></div><div class="fg"><div class="fl">备注</div><input class="fi" id="rpN" value="恭喜发财"></div><button class="fbtn" onclick="sendRP()">发送红包</button>');
}
function sendRP(){
var a=document.getElementById('rpA').value,n=document.getElementById('rpN').value||'恭喜发财';
var ch=gch(D.curChat);if(!ch)return;
ch.msgs.push({role:'user',type:'redpacket',amount:a,note:n,time:ft(),content:'[红包:'+a+':'+n+']'});
ch.lastM='[红包]';ch.lastT=ft();save();closeBS();renderBub();
}
function openVoiceS(){
document.getElementById('featTray').classList.remove('show');
showBS('<div class="mt-title">语音消息</div><div class="fg"><div class="fl">输入语音内容</div><textarea class="ft" id="voTxt" rows="3" placeholder="说点什么..."></textarea></div><button class="fbtn" onclick="sendVo()">发送语音</button>');
}
function sendVo(){
var txt=document.getElementById('voTxt').value.trim();if(!txt)return;
var ch=gch(D.curChat);if(!ch)return;
var dur=Math.max(1,Math.ceil(txt.length/3))+'"';
ch.msgs.push({role:'user',type:'voice',content:txt,dur:dur,time:ft()});
ch.lastM='[语音]';ch.lastT=ft();save();closeBS();renderBub();
}
var _timg=null;
function openImgS(){
document.getElementById('featTray').classList.remove('show');_timg=null;
showBS('<div class="mt-title">发送图片</div><div class="av-up" style="width:120px;height:120px;border-radius:14px" onclick="upIS(this)"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" fill="var(--text3)"/></svg></div><div class="fg" style="margin-top:8px"><div class="fl">图片描述（100字内）</div><textarea class="ft" id="imgD" rows="2" placeholder="描述图片内容..."></textarea></div><button class="fbtn" onclick="sendImg()">发送图片</button>');
}
function upIS(el){upFile(function(d){_timg=d;el.innerHTML='<img src="'+d+'" style="width:100%;height:100%;object-fit:cover;border-radius:14px">'})}
function sendImg(){
var desc=document.getElementById('imgD').value.trim()||'一张图片';
var ch=gch(D.curChat);if(!ch)return;
ch.msgs.push({role:'user',type:'image',src:_timg,desc:desc,content:'[图片:'+desc+']',time:ft()});
ch.lastM='[图片]';ch.lastT=ft();_timg=null;save();closeBS();renderBub();
}
function openStkP(){document.getElementById('featTray').classList.remove('show');document.getElementById('stkPanel').classList.toggle('show');renderStkG()}
function renderStkG(){
var el=document.getElementById('stkGrid');
if(!D.stickers.length){el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text3);font-size:13px">暂无表情包<br>在设置中添加</div>';return}
var h='';for(var i=0;i<D.stickers.length;i++){
var s=D.stickers[i];
h+='<div class="stk-gi" onclick="sendStk('+i+')"><img src="'+s.url+'" onerror="this.style.display=\'none\'"><span>'+s.name+'</span></div>';
}
el.innerHTML=h;
}
function sendStk(i){
var s=D.stickers[i];if(!s)return;var ch=gch(D.curChat);if(!ch)return;
ch.msgs.push({role:'user',type:'sticker',url:s.url,content:'[sticker:'+s.name+']',time:ft()});
ch.lastM='[表情]';ch.lastT=ft();document.getElementById('stkPanel').classList.remove('show');save();renderBub();
}

// AI
function trigAI(){
var ch=gch(D.curChat);if(!ch)return;
var p=D.apis[D.aApi];if(!p||!p.url){toast('请先配置API');return}
var btn=document.getElementById('aiBtn');btn.classList.add('loading');
var msgs=buildPr(ch);
callAPI(msgs,p).then(function(resp){
parseR(ch,resp);
if(ch.autoS&&ch.msgs.length>0&&ch.msgs.length%ch.sumI===0)return autoSum(ch);
}).catch(function(e){
toast('API错误: '+e.message);
ch.msgs.push({role:'system',content:'[API失败: '+e.message+']',time:ft()});
}).finally(function(){
btn.classList.remove('loading');save();renderBub();renderML();
});
}
function buildPr(ch){
var sys=D.wb.chatSys+'\n\n角色名：'+ch.name+'\n';
if(ch.nick)sys+='备注：'+ch.nick+'\n';
sys+='角色设定：\n'+ch.persona+'\n\n';
if(ch.memory)sys+='记忆：\n'+ch.memory+'\n\n';
sys+=D.wb.chatFmt+'\n';
if(D.cust.enRP)sys+='\n'+D.wb.rpFmt;
if(D.cust.enVo)sys+='\n'+D.wb.voFmt;
if(D.cust.enImg)sys+='\n'+D.wb.imgFmt;
if(D.cust.enStk&&D.stickers.length){sys+='\n'+D.wb.stkP+'\n';for(var i=0;i<D.stickers.length;i++)sys+=D.stickers[i].name+': '+D.stickers[i].url+'\n'}
if(D.cust.syncT)sys+='\n\n当前北京时间：'+ft()+' '+fd();
var m=[{role:'system',content:sys}];
var recent=ch.msgs.slice(-ch.ctxL);
for(var i=0;i<recent.length;i++){
var msg=recent[i];
if(msg.role==='system')m.push({role:'system',content:msg.content});
else if(msg.role==='user')m.push({role:'user',content:msg.content});
else m.push({role:'assistant',content:msg.content});
}
return m;
}
function callAPI(msgs,p){
var url=p.url.replace(/\/+$/,'')+'/v1/chat/completions';
var h={'Content-Type':'application/json'};
if(p.key)h['Authorization']='Bearer '+p.key;
return fetch(url,{method:'POST',headers:h,body:JSON.stringify({model:p.model||'gpt-4o-mini',messages:msgs,temperature:p.temp||0.7,max_tokens:1024})}).then(function(r){
if(!r.ok)throw new Error('HTTP '+r.status);
return r.json();
}).then(function(d){
return d.choices&&d.choices[0]&&d.choices[0].message?d.choices[0].message.content||'':'';
});
}
function parseR(ch,resp){
var parsed=[];
try{
var clean=resp.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
var arr=JSON.parse(clean);
if(Array.isArray(arr)){
for(var i=0;i<arr.length;i++){
var c=arr[i].msg||arr[i].message||arr[i].content||JSON.stringify(arr[i]);
if(c.indexOf('[sticker:')===0){var nm=c.match(/\[sticker:(.*?)\]/);var st=nm?D.stickers.find(function(x){return x.name===nm[1]}):null;
parsed.push({role:'char',type:'sticker',url:st?st.url:'',content:c,time:ft()});}
else parsed.push({role:'char',type:'text',content:c,time:ft()});
}
}
}catch(e){parsed.push({role:'char',type:'text',content:resp,time:ft()})}
for(var i=0;i<parsed.length;i++)ch.msgs.push(parsed[i]);
if(parsed.length){ch.lastM=parsed[parsed.length-1].content;ch.lastT=ft()}
}

function genSocC(m,ch){
var p=D.apis[D.aApi];if(!p||!p.url)return Promise.resolve();
return callAPI([{role:'system',content:'为这条朋友圈生成3-5个社交圈角色评论，至少10条互动。发布者：'+ch.persona+'\n内容：'+m.content+'\nJSON数组：[{"name":"名","content":"评论"}]'},{role:'user',content:'生成评论'}],p).then(function(r){
try{var arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))m.comments=arr.map(function(c){return{name:c.name,content:c.content}})}catch(e){m.comments=[{name:'好友',content:r.substring(0,50)}]}
if(m.comments.length){
var cmtStr=m.comments.map(function(c){return c.name+': '+c.content}).join('\n');
var sysTpl=D.wb.momCmtSys||'[评论更新] "{title}"的评论：\n{comments}';
var sysMsg=sysTpl.replace('{title}',m.content.substring(0,20)+'...').replace('{comments}',cmtStr);
ch.msgs.push({role:'system',content:sysMsg,time:ft()});
}
}).catch(function(){});
}
function refreshC(mid){
var m=D.moments.find(function(x){return x.id===mid});if(!m)return;
var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}
toast('刷新评论...');
var ci='';for(var i=0;i<D.chars.length;i++){ci+=D.chars[i].name+'('+(D.chars[i].nick||'')+'):'+D.chars[i].persona+'\n'}
var existC=m.comments?m.comments.map(function(c){return c.name+': '+c.content}).join('\n'):'';
callAPI([{role:'system',content:D.wb.momReply+'\n\n角色：\n'+ci+'\n\n朋友圈：'+m.content+(existC?'\n已有评论：\n'+existC:'')},{role:'user',content:'所有角色评论'+(D.cust.crossR?'，可互相互动':'，独立回复')}],p).then(function(r){
try{var arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))m.comments=arr.map(function(c){return{name:c.name,content:c.content}})}catch(e){m.comments=[{name:'AI',content:r.substring(0,100)}]}
var cmtStr=m.comments.map(function(c){return c.name+': '+c.content}).join('\n');
var sysTpl=D.wb.momCmtSys||'[评论更新] "{title}"的评论：\n{comments}';
var sysMsg=sysTpl.replace('{title}',m.content.substring(0,20)+'...').replace('{comments}',cmtStr);
for(var i=0;i<D.chars.length;i++){D.chars[i].msgs.push({role:'system',content:sysMsg,time:ft()})}
save();renderMom();toast('评论已刷新');
}).catch(function(e){toast('失败: '+e.message)});
}

// MOMENT DETAIL
var _rTo=null;
function openMD(id){
D.curMom=id;var m=D.moments.find(function(x){return x.id===id});if(!m)return;
go('scrMD');_rTo=null;
var el=document.getElementById('mdBody');
var h='<div class="md-card"><div style="display:flex;gap:10px">';
h+='<div class="mom-av">'+(m.authorAv?'<img src="'+m.authorAv+'">':'')+'</div>';
h+='<div><div class="mom-author">'+m.authorName+'</div><div class="mom-txt">'+esc(m.content)+'</div>';
if(m.image)h+='<img class="mom-img" src="'+m.image+'">';
h+='<div class="mom-time">'+m.ts+'</div></div></div></div>';
if(m.comments&&m.comments.length){
h+='<div class="md-cmts">';
for(var i=0;i<m.comments.length;i++){
var c=m.comments[i];
var ch=D.chars.find(function(x){return(x.nick||x.name)===c.name});
h+='<div class="md-ci"><div class="md-ca" onclick="setRT(\''+c.name+'\')">'+(ch&&ch.avatar?'<img src="'+ch.avatar+'">':'')+'</div>';
h+='<div class="md-cb"><b onclick="setRT(\''+c.name+'\')">'+c.name+'</b>：'+esc(c.content)+'</div></div>';
}
h+='</div>';
}
el.innerHTML=h;
}
function setRT(name){_rTo=name;document.getElementById('mdInp').placeholder='回复 '+name+'：';document.getElementById('mdInp').focus()}
function sendMC(){
var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;
var txt=document.getElementById('mdInp').value.trim();if(!txt)return;
if(!m.comments)m.comments=[];
m.comments.push({name:D.user.name,content:(_rTo?'回复 '+_rTo+'：':'')+txt});
document.getElementById('mdInp').value='';_rTo=null;document.getElementById('mdInp').placeholder='评论...';
save();openMD(D.curMom);
}
function trigMomAI(){
var m=D.moments.find(function(x){return x.id===D.curMom});if(!m)return;
var p=D.apis[D.aApi];if(!p||!p.url){toast('请配置API');return}
toast('AI回复中...');
var ci='';
if(_rTo){var ch=D.chars.find(function(c){return(c.nick||c.name)===_rTo});if(ch)ci='角色'+ch.name+'：'+ch.persona+(ch.memory?'\n记忆：'+ch.memory:'')}
else{for(var i=0;i<D.chars.length;i++){ci+=D.chars[i].name+'('+(D.chars[i].nick||'')+'):'+D.chars[i].persona+'\n'}}
var ec=m.comments?m.comments.map(function(c){return c.name+': '+c.content}).join('\n'):'';
callAPI([{role:'system',content:D.wb.momReply+'\n\n'+ci+'\n\n朋友圈：'+m.content+'\n已有评论：\n'+ec},{role:'user',content:_rTo?'请'+_rTo+'回复':'各角色继续回复'+(D.cust.crossR?'，可互动':'')}],p).then(function(r){
try{var arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr)){for(var i=0;i<arr.length;i++){if(!m.comments)m.comments=[];m.comments.push({name:arr[i].name,content:arr[i].content})}}}
catch(e){if(!m.comments)m.comments=[];m.comments.push({name:_rTo||'AI',content:r.substring(0,200)})}
_rTo=null;
var cmtStr=m.comments.map(function(c){return c.name+': '+c.content}).join('\n');
var sysTpl=D.wb.momCmtSys||'[评论更新] "{title}"的评论：\n{comments}';
var sysMsg=sysTpl.replace('{title}',m.content.substring(0,20)+'...').replace('{comments}',cmtStr);
for(var i=0;i<D.chars.length;i++){D.chars[i].msgs.push({role:'system',content:sysMsg,time:ft()})}
save();openMD(D.curMom);toast('回复完成');
}).catch(function(e){toast('失败: '+e.message)});
}

// MUSIC
function initMu(){
if(D.wb.music&&D.wb.music.length){
document.getElementById('di').classList.toggle('playing',D.playing);
document.getElementById('diName').textContent=D.wb.music[D.songI]?D.wb.music[D.songI].name:'';
document.getElementById('dipTitle').textContent=D.wb.music[D.songI]?D.wb.music[D.songI].name:'未播放';
}else{document.getElementById('diName').textContent=''}
}
function toggleDI(){
var p=document.getElementById('diPanel');
if(p.classList.contains('show')){closeDI();return}
p.classList.add('show');
}
function closeDI(){document.getElementById('diPanel').classList.remove('show')}
function musicToggle(){
if(!D.wb.music||!D.wb.music.length){toast('请在世界书添加音乐');return}
var a=document.getElementById('aud');
if(D.playing){a.pause();D.playing=false}
else{var s=D.wb.music[D.songI];if(s){a.src=s.url;a.play().catch(function(){toast('播放失败')});D.playing=true}}
upPlayUI();
}
function musicNext(){if(!D.wb.music||!D.wb.music.length)return;D.songI=(D.songI+1)%D.wb.music.length;playCur()}
function musicPrev(){if(!D.wb.music||!D.wb.music.length)return;D.songI=(D.songI-1+D.wb.music.length)%D.wb.music.length;playCur()}
function playCur(){
var s=D.wb.music[D.songI];
document.getElementById('dipTitle').textContent=s.name;
document.getElementById('diName').textContent=s.name;
if(D.playing){var a=document.getElementById('aud');a.src=s.url;a.play().catch(function(){})}
upPlayUI();
}
function upPlayUI(){
document.getElementById('di').classList.toggle('playing',D.playing);
document.getElementById('dipPlay').innerHTML=D.playing?'<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#fff"/></svg>':'<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#fff"/></svg>';
}
function seekMusic(e){
var a=document.getElementById('aud');if(!a.duration)return;
var r=e.currentTarget.getBoundingClientRect();
a.currentTime=((e.clientX-r.left)/r.width)*a.duration;
}
var aud=document.getElementById('aud');
aud.addEventListener('timeupdate',function(){
if(!aud.duration)return;
document.getElementById('dipPF').style.width=(aud.currentTime/aud.duration)*100+'%';
document.getElementById('dipCur').textContent=fmtS(aud.currentTime);
document.getElementById('dipDur').textContent=fmtS(aud.duration);
});
aud.addEventListener('ended',function(){musicNext()});
function fmtS(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

// BOTTOM SHEET
function showBS(h){document.getElementById('bss').innerHTML=h;document.getElementById('bso').classList.add('show')}
function closeBS(){document.getElementById('bso').classList.remove('show');_tav=null;_timg=null}

init();
</script>
