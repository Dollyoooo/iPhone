<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小手机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
--bg:#f2f2f7;--bg2:#ffffff;--text:#000;--text2:#3c3c43;--text3:#8e8e93;
--card:rgba(255,255,255,.78);--card2:rgba(242,242,247,.85);
--nav:rgba(249,249,249,.94);--sep:rgba(60,60,67,.08);
--accent:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
--input-bg:rgba(118,118,128,.12);--overlay:rgba(0,0,0,.4);
--bubble-user:#007aff;--bubble-user-alpha:1;--bubble-char:rgba(233,233,235,.95);--bubble-char-alpha:1;--bubble-char-text:#000;
--glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.5);
}
.dark{
--bg:#000;--bg2:#1c1c1e;--text:#fff;--text2:rgba(235,235,245,.6);--text3:#636366;
--card:rgba(44,44,46,.78);--card2:rgba(38,38,40,.9);
--nav:rgba(28,28,30,.96);--sep:rgba(84,84,88,.2);
--bubble-char:rgba(58,58,60,.9);--bubble-char-text:#fff;
--input-bg:rgba(118,118,128,.24);--overlay:rgba(0,0,0,.6);
--glass:rgba(44,44,46,.72);--glass-border:rgba(84,84,88,.2);
}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue","PingFang SC",sans-serif}
#phone{width:360px;height:580px;border-radius:46px;position:relative;overflow:hidden;background:var(--bg);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.15),0 0 0 2px rgba(0,0,0,.3),0 24px 80px rgba(0,0,0,.55);transition:background .35s}
#phone *::-webkit-scrollbar{display:none}
#phone *{scrollbar-width:none}
textarea,input{-webkit-user-select:text;user-select:text}

/* STATUS BAR */
.status-bar{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:14px 30px 0;z-index:100;font-size:13px;font-weight:600;color:var(--text);pointer-events:none}
.sb-r{display:flex;align-items:center;gap:5px}
.sb-r svg{width:17px;height:13px}

/* DYNAMIC ISLAND */
.di{position:absolute;top:10px;left:50%;transform:translateX(-50%);height:28px;min-width:100px;background:#000;border-radius:50px;z-index:200;display:flex;align-items:center;padding:0 12px;gap:6px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.di.playing{min-width:140px}
.di .di-glow{position:absolute;inset:-2px;border-radius:52px;background:conic-gradient(#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b);opacity:0;transition:opacity .3s;animation:none;z-index:-1}
.di.playing .di-glow{opacity:.6;animation:diRotate 3s linear infinite}
@keyframes diRotate{to{transform:rotate(360deg)}}
.di-inner{display:flex;align-items:center;gap:6px;width:100%}
.di-wave{display:flex;align-items:center;gap:1.5px;height:14px}
.di-wave i{width:2px;background:#4cd964;border-radius:1px;animation:none;display:block}
.di.playing .di-wave i{animation:diWave .6s ease-in-out infinite alternate}
.di-wave i:nth-child(1){height:4px;animation-delay:0s}
.di-wave i:nth-child(2){height:8px;animation-delay:.1s}
.di-wave i:nth-child(3){height:12px;animation-delay:.2s}
.di-wave i:nth-child(4){height:6px;animation-delay:.3s}
@keyframes diWave{to{height:14px}}
.di-name{color:#fff;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;font-weight:500}

/* DI EXPANDED PANEL */
.di-panel{position:absolute;top:0;left:0;right:0;background:#000;z-index:250;border-radius:0 0 30px 30px;padding:50px 20px 20px;display:none;animation:slideD .3s ease}
.di-panel.show{display:block}
@keyframes slideD{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.dip-art{width:60px;height:60px;border-radius:14px;background:#222;margin:0 auto 10px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dip-art svg{width:28px;height:28px;fill:#555}
.dip-title{color:#fff;font-size:16px;font-weight:700;text-align:center}
.dip-artist{color:#999;font-size:12px;text-align:center;margin-top:2px}
.dip-progress{margin:14px 0 6px;position:relative;height:4px;background:#333;border-radius:2px;cursor:pointer}
.dip-progress-fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .3s}
.dip-times{display:flex;justify-content:space-between;font-size:10px;color:#666}
.dip-controls{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:14px}
.dip-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px}
.dip-btn svg{width:22px;height:22px;fill:#fff}
.dip-btn.play svg{width:32px;height:32px}
.dip-lyrics{margin-top:12px;text-align:center;color:#aaa;font-size:12px;max-height:40px;overflow:hidden;line-height:1.5}
.dip-close{position:absolute;top:14px;right:16px;color:#666;font-size:18px;cursor:pointer;background:none;border:none;padding:4px 8px}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:10;background:var(--bg);transition:opacity .2s}
.screen.active{display:flex}
.scr-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* HOME */
.home-wall{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;border-radius:46px}
.home-content{position:relative;z-index:1;padding-top:52px}
.home-time{text-align:center;margin-top:32px;font-size:62px;font-weight:200;color:var(--text);letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums}
.home-date{text-align:center;font-size:15px;color:var(--text2);margin-top:6px;font-weight:500}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px 14px;padding:36px 26px 90px;margin-top:16px}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.app-box{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:transform .12s;position:relative;overflow:hidden}
.app-box::before{content:'';position:absolute;inset:0;border-radius:16px;border:1px solid rgba(255,255,255,.25)}
.app-box:active{transform:scale(.85)}
.app-box svg{width:26px;height:26px}
.app-label{font-size:11px;color:var(--text);font-weight:500;text-shadow:0 0 8px rgba(0,0,0,.15)}

/* BOTTOM NAV */
.bnav{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);height:56px;display:flex;align-items:center;justify-content:space-around;z-index:90;background:var(--nav);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:28px;padding:0 6px;gap:2px;width:calc(100% - 40px);border:1px solid var(--sep);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;color:var(--text3);padding:6px 14px;border-radius:20px;transition:all .2s}
.bnav-item.active{color:var(--accent)}
.bnav-item svg{width:22px;height:22px;fill:currentColor}
.bnav-item span{font-size:10px;font-weight:500}

/* HEADER BAR */
.hbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;margin-top:48px;flex-shrink:0}
.hbar-title{font-size:18px;font-weight:700;color:var(--text)}
.hbar-btn{width:32px;height:32px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .12s}
.hbar-btn:active{transform:scale(.88)}
.hbar-btn svg{width:16px;height:16px;fill:var(--text3)}

/* MSG LIST */
.mlist{padding:6px 16px 90px}
.mitem{display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;border-radius:16px;transition:background .15s;margin-bottom:2px}
.mitem:active{background:var(--input-bg)}
.mav{width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--card2);display:flex;align-items:center;justify-content:center}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:24px;height:24px;fill:var(--text3)}
.minfo{flex:1;min-width:0;border-bottom:1px solid var(--sep);padding-bottom:12px}
.mitem:last-child .minfo{border-bottom:none}
.mname{font-size:16px;font-weight:600;color:var(--text)}
.mprev{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mtime{font-size:12px;color:var(--text3);flex-shrink:0;align-self:flex-start;margin-top:2px}

/* CHAT */
.chat-hbar{display:flex;align-items:center;padding:0 8px;height:44px;margin-top:48px;flex-shrink:0;gap:8px}
.chat-back{display:flex;align-items:center;gap:2px;cursor:pointer;color:var(--accent);font-size:14px;font-weight:500;padding:4px;background:none;border:none}
.chat-back svg{width:22px;height:22px;fill:var(--accent)}
.chat-name{flex:1;font-size:16px;font-weight:600;color:var(--text);text-align:center}
.chat-dots{padding:6px;cursor:pointer;background:none;border:none}
.chat-dots svg{width:20px;height:20px;fill:var(--text3)}
.chat-body{flex:1;overflow-y:auto;padding:8px 14px 6px;display:flex;flex-direction:column;gap:1px}

/* BUBBLES */
.msg-row{display:flex;flex-direction:column;margin-bottom:2px}
.msg-row.user{align-items:flex-end}
.msg-row.char{align-items:flex-start}
.msg-row.system{align-items:center}
.msg-wrap{display:flex;align-items:flex-end;gap:6px;max-width:78%}
.msg-row.user .msg-wrap{flex-direction:row-reverse}
.msg-cav{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2)}
.msg-cav img{width:100%;height:100%;object-fit:cover}
.bubble{padding:9px 13px;font-size:14.5px;line-height:1.4;word-break:break-word;border-radius:20px;position:relative}
.msg-row.user .bubble{background:var(--bubble-user);color:#fff;border-bottom-right-radius:6px}
.msg-row.char .bubble{background:var(--bubble-char);color:var(--bubble-char-text);border-bottom-left-radius:6px}
.msg-row.system .bubble{background:transparent;color:var(--text3);font-size:11px;padding:4px 10px}
.msg-ts{font-size:10px;color:var(--text3);margin-top:3px;padding:0 4px}
.msg-row.user .msg-ts{text-align:right}

/* RED PACKET */
.rp-bubble{border-radius:16px!important;padding:0!important;overflow:hidden;min-width:180px;cursor:pointer;border:1px solid var(--sep)!important}
.rp-body{padding:14px 16px;display:flex;align-items:center;gap:12px}
.rp-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rp-icon svg{width:22px;height:22px;fill:#fff}
.rp-text{flex:1}
.rp-title{font-size:14px;font-weight:600;color:var(--text)}
.rp-note{font-size:12px;color:var(--text3);margin-top:2px}
.rp-foot{padding:6px 16px;border-top:1px solid var(--sep);font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.msg-row.user .rp-bubble{background:var(--bg2)!important;color:var(--text)!important}
.msg-row.char .rp-bubble{background:var(--bg2)!important;color:var(--text)!important}

/* VOICE */
.voice-bub{display:flex;align-items:center;gap:8px;min-width:90px;cursor:pointer;padding:10px 14px!important}
.voice-waves{display:flex;align-items:center;gap:2px;height:18px}
.voice-waves i{width:2.5px;border-radius:2px;background:currentColor;opacity:.6;display:block}
.voice-dur{font-size:12px;opacity:.7;flex-shrink:0}

/* IMAGE MSG */
.img-bub{padding:4px!important;border-radius:16px!important;overflow:hidden;cursor:pointer;position:relative}
.img-bub img{width:180px;max-height:180px;object-fit:cover;border-radius:13px;display:block}
.img-bub .img-overlay{position:absolute;inset:4px;background:rgba(0,0,0,.55);border-radius:13px;display:none;align-items:center;justify-content:center;padding:12px;color:#fff;font-size:12px;text-align:center;line-height:1.4}
.img-bub.show-desc .img-overlay{display:flex}

/* STICKER MSG */
.stk-bub{background:transparent!important;padding:4px!important}
.stk-bub img{width:90px;height:90px;object-fit:contain}

/* CHAT INPUT */
.chat-input-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--nav);backdrop-filter:blur(30px);border-top:1px solid var(--sep);flex-shrink:0}
.ci-plus{width:32px;height:32px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:transform .12s}
.ci-plus:active{transform:scale(.85)}
.ci-plus svg{width:18px;height:18px;fill:var(--text3)}
.ci-input{flex:1;height:36px;border-radius:18px;border:1px solid var(--sep);background:var(--bg2);padding:0 14px;font-size:14px;color:var(--text);outline:none}
.ci-btn{width:32px;height:32px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:transform .12s}
.ci-btn:active{transform:scale(.85)}
.ci-btn svg{width:15px;height:15px;fill:var(--text3)}
.ci-btn.ai-loading{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.chat-safe{height:env(safe-area-inset-bottom,8px);background:var(--nav);flex-shrink:0}

/* FEATURES TRAY */
.feat-tray{display:none;padding:10px 16px 8px;background:var(--nav);gap:20px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-start}
.feat-tray.show{display:flex}
.feat-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.feat-box{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.feat-box svg{width:24px;height:24px;fill:#fff}
.feat-item span{font-size:10px;color:var(--text3)}

/* STICKER PANEL */
.stk-panel{display:none;position:absolute;bottom:52px;left:0;right:0;height:170px;background:var(--nav);backdrop-filter:blur(24px);border-top:1px solid var(--sep);z-index:60;padding:10px;overflow-y:auto}
.stk-panel.show{display:block}
.stk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stk-grid-item{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--input-bg);display:flex;align-items:center;justify-content:center;transition:transform .1s}
.stk-grid-item:active{transform:scale(.9)}
.stk-grid-item img{width:85%;height:85%;object-fit:contain}

/* ======= MOMENTS ======= */
.mom-banner{width:100%;height:200px;position:relative;overflow:visible;background:var(--card2)}
.mom-banner img{width:100%;height:100%;object-fit:cover}
.mom-banner-bottom{position:absolute;bottom:-30px;right:16px;display:flex;align-items:flex-end;gap:10px}
.mom-uname{font-size:17px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);margin-bottom:8px}
.mom-uav{width:62px;height:62px;border-radius:10px;overflow:hidden;background:var(--card);border:3px solid var(--bg);position:relative}
.mom-uav img{width:100%;height:100%;object-fit:cover}
.mom-sig{text-align:right;padding:36px 16px 8px;font-size:12px;color:var(--text3);cursor:pointer}
.mom-feed{padding:0 0 90px}

/* MOMENT ITEM - WeChat style */
.mom-item{padding:12px 16px;border-bottom:1px solid var(--sep);display:flex;gap:10px}
.mom-av{width:40px;height:40px;border-radius:6px;flex-shrink:0;overflow:hidden;background:var(--card2)}
.mom-av img{width:100%;height:100%;object-fit:cover}
.mom-right{flex:1;min-width:0}
.mom-author{font-size:15px;font-weight:600;color:var(--accent);margin-bottom:3px}
.mom-text{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:6px;word-break:break-word}
.mom-img{max-width:100%;max-height:160px;border-radius:6px;margin-bottom:6px;cursor:pointer}
.mom-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mom-time-txt{font-size:12px;color:var(--text3)}
.mom-act-btn{background:var(--input-bg);border:none;border-radius:4px;padding:3px 8px;cursor:pointer}
.mom-act-btn svg{width:16px;height:16px;fill:var(--text3)}
.mom-comments{background:var(--card2);border-radius:4px;padding:6px 8px;margin-top:6px}
.mom-cmt{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:2px}
.mom-cmt:last-child{margin-bottom:0}
.mom-cmt b{color:var(--accent);font-weight:600;cursor:pointer}
.mom-fab{position:absolute;bottom:80px;right:18px;width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(0,122,255,.35);z-index:50;border:none;transition:transform .12s}
.mom-fab:active{transform:scale(.88)}
.mom-fab svg{width:22px;height:22px;fill:#fff}

/* MOMENT DETAIL */
.md-card{padding:12px 16px;border-bottom:1px solid var(--sep)}
.md-cmts{padding:8px 16px 20px}
.md-cmt-item{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.md-cmt-av{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2);cursor:pointer}
.md-cmt-av img{width:100%;height:100%;object-fit:cover}
.md-cmt-body b{color:var(--accent);font-weight:600;cursor:pointer}
.md-cmt-body{font-size:13px;color:var(--text);line-height:1.4}
.md-input-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--nav);backdrop-filter:blur(30px);border-top:1px solid var(--sep);flex-shrink:0}

/* SETTINGS */
.slist{padding:8px 16px 90px}
.sg-title{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:12px 0 4px;letter-spacing:.5px}
.sg{background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:4px}
.si{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--sep);cursor:pointer}
.si:last-child{border-bottom:none}
.si-left{display:flex;align-items:center;gap:10px;color:var(--text);font-size:15px}
.si-left svg{width:20px;height:20px;fill:var(--accent)}
.si-right{display:flex;align-items:center;gap:4px;color:var(--text3);font-size:13px}
.si-right svg{width:14px;height:14px;fill:var(--text3)}
.tog{width:46px;height:28px;border-radius:14px;background:var(--input-bg);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.tog.on{background:var(--green)}
.tog-k{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tog.on .tog-k{left:20px}

/* FULLSCREEN MODAL */
.fs-modal{position:absolute;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
.fs-modal.show{display:flex}
.fs-body{flex:1;overflow-y:auto;padding:8px 16px 20px}
.fs-body textarea,.fs-body input{-webkit-user-select:text;user-select:text}

/* BOTTOM SHEET */
.bs-overlay{position:absolute;inset:0;background:var(--overlay);z-index:280;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.bs-overlay.show{display:flex}
.bs-sheet{width:100%;max-height:80%;background:var(--nav);backdrop-filter:blur(40px);border-radius:22px 22px 0 0;padding:16px;overflow-y:auto;animation:bsUp .3s ease}
@keyframes bsUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* FORM */
.fg{margin-bottom:10px}
.fl{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.fi{width:100%;height:36px;border-radius:10px;border:1px solid var(--sep);background:var(--bg2);padding:0 12px;font-size:14px;color:var(--text);outline:none}
.ft{width:100%;border-radius:10px;border:1px solid var(--sep);background:var(--bg2);padding:10px 12px;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:56px;font-family:inherit;line-height:1.45}
.fbtn{width:100%;height:40px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .12s}
.fbtn:active{opacity:.7}
.fbtn.red{background:var(--red)}
.av-upload{width:64px;height:64px;border-radius:50%;background:var(--card2);border:2px dashed var(--sep);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin:0 auto 10px}
.av-upload img{width:100%;height:100%;object-fit:cover}
.av-upload svg{width:24px;height:24px;fill:var(--text3)}
.chip{display:inline-flex;align-items:center;padding:5px 12px;background:var(--card);border-radius:8px;font-size:13px;color:var(--text);border:1px solid var(--sep);cursor:pointer;margin:2px;transition:all .15s}
.chip.active{border-color:var(--accent);background:rgba(0,122,255,.1);color:var(--accent)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;background:var(--accent);color:#fff;border-radius:6px;font-size:11px;font-weight:600}
.range-s{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--sep);outline:none;margin:6px 0}
.range-s::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.2);border:1px solid var(--sep)}
.color-row{display:flex;align-items:center;gap:10px}
.color-prev{width:32px;height:32px;border-radius:8px;border:2px solid var(--sep)}

/* Model list */
.model-list{max-height:200px;overflow-y:auto;margin-top:6px}
.model-item{padding:8px 12px;cursor:pointer;border-radius:8px;font-size:13px;color:var(--text);transition:background .12s}
.model-item:hover,.model-item:active{background:var(--input-bg)}
.model-item.selected{background:rgba(0,122,255,.12);color:var(--accent);font-weight:600}

/* TOAST */
.toast{position:absolute;top:56px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:500;pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(10px);white-space:nowrap}
.toast.show{opacity:1}

/* WB Section */
.wb-sec{margin-bottom:14px}
.wb-sec-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;padding:4px 0}
</style>
</head>

<!-- BOTTOM SHEET -->
<div class="bs-overlay" id="bsOverlay" onclick="if(event.target===this)closeBS()"><div class="bs-sheet" id="bsSheet"></div></div>

<div class="bnav" id="bnav">
<div class="bnav-item active" onclick="go('scrHome')" data-s="scrHome"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>主页</span></div>
<div class="bnav-item" onclick="go('scrMsg')" data-s="scrMsg"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><span>短信</span></div>
<div class="bnav-item" onclick="go('scrMom')" data-s="scrMom"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>朋友圈</span></div>
<div class="bnav-item" onclick="go('scrSet')" data-s="scrSet"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58z"/></svg><span>设置</span></div>
</div>
</div>

<input type="file" id="fInp" accept="image/*" style="display:none">
<audio id="aud" preload="none"></audio>

<script>
// ============ STATE ============
let D={
theme:'light',wallpaper:null,
user:{name:'我',avatar:null,signature:'',momBg:null},
chars:[],moments:[],
apis:[{id:_id(),name:'默认',url:'',key:'',model:'',temperature:.7}],activeApi:0,
wb:{
chatSys:'你是一个角色扮演助手。请根据角色设定，以角色的身份回复用户的消息。每次回复1-3条消息，每条消息控制在20-80字。用JSON数组格式回复：[{"msg":"消息内容"}]',
chatFmt:'回复格式：JSON数组，每个元素含msg字段。示例：[{"msg":"你好啊"},{"msg":"今天怎么样？"}]',
momPost:'请根据角色设定生成一条朋友圈动态，符合角色性格。JSON格式：{"content":"内容"}',
momReply:'请根据角色设定对朋友圈动态评论。JSON数组：[{"name":"角色名","content":"评论"}]',
sumPrompt:'请总结以下对话，提取关键信息、情感变化、重要事件，200字以内摘要：',
stkPrompt:'角色可发表情包。格式[sticker:名称]。只能从列表选：',
rpFmt:'用户发红包时格式[红包:金额:备注]，请回应。',
voiceFmt:'用户发语音时格式[语音:内容]，请回应。',
imgFmt:'用户发图片时格式[图片:描述]，请回应。',
music:[]
},
cust:{userColor:'#007aff',charColor:'',userAlpha:1,charAlpha:1,enableStk:true,enableRP:true,enableVoice:true,enableImg:true,syncTime:false,crossReply:true},
stickers:[],songIdx:0,playing:false,
curChat:null,curMom:null
};
function _id(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function bjt(){return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Shanghai"}))}
function ft(d){d=d||bjt();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fd(d){d=d||bjt();return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日'}
function save(){try{localStorage.setItem('mp2',JSON.stringify(D))}catch(e){}}
function load(){try{let d=localStorage.getItem('mp2');if(d)Object.assign(D,JSON.parse(d))}catch(e){}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

// ============ INIT ============
load();
(function init(){
applyTheme();updateClock();setInterval(updateClock,15000);
renderMList();renderMom();renderFeatTog();
if(D.wallpaper)document.getElementById('homeWall').style.backgroundImage='url('+D.wallpaper+')';
if(D.user.avatar){$img('momUavImg',D.user.avatar)}
if(D.user.momBg){$img('momBannerImg',D.user.momBg)}
if(D.user.signature)document.getElementById('momSig').textContent=D.user.signature;
document.getElementById('momUname').textContent=D.user.name;
document.getElementById('setUName').textContent=D.user.name;
applyColors();
if(D.cust.crossReply)document.getElementById('togCross').classList.add('on');
if(D.cust.syncTime)document.getElementById('togSync').classList.add('on');
if(D.theme==='dark')document.getElementById('togTheme').classList.add('on');
initMusic();
})();
function $img(id,src){const i=document.getElementById(id);if(i){i.src=src;i.style.display='block'}}
function applyTheme(){document.getElementById('phone').classList.toggle('dark',D.theme==='dark')}
function applyColors(){
document.documentElement.style.setProperty('--bubble-user',D.cust.userColor||'#007aff');
document.documentElement.style.setProperty('--bubble-user-alpha',D.cust.userAlpha??1);
if(D.cust.charColor)document.documentElement.style.setProperty('--bubble-char',D.cust.charColor);
document.documentElement.style.setProperty('--bubble-char-alpha',D.cust.charAlpha??1);
}
function updateClock(){
const t=bjt();
document.getElementById('sbTime').textContent=ft(t);
document.getElementById('homeTime').textContent=ft(t);
document.getElementById('homeDate').textContent=fd(t);
}
function togTheme(){D.theme=D.theme==='dark'?'light':'dark';document.getElementById('togTheme').classList.toggle('on');applyTheme();save()}
function togC(el){el.classList.toggle('on');D.cust.crossReply=el.classList.contains('on');save()}
function togS(el){el.classList.toggle('on');D.cust.syncTime=el.classList.contains('on');save()}

// ============ NAV ============
let curScr='scrHome';
function go(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.bnav-item').forEach(n=>n.classList.toggle('active',n.dataset.s===id));
const hide=['scrChat','scrMD'];
document.getElementById('bnav').style.display=hide.includes(id)?'none':'flex';
curScr=id;
if(id==='scrMsg')renderMList();
if(id==='scrMom')renderMom();
}

// ============ FILE ============
function upFile(cb){const i=document.getElementById('fInp');i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=v=>cb(v.target.result);r.readAsDataURL(f);i.value=''};i.click()}

// ============ USER ============
function uploadUAv(){upFile(d=>{D.user.avatar=d;$img('momUavImg',d);save();toast('头像已更新')})}
function uploadMomBg(){upFile(d=>{D.user.momBg=d;$img('momBannerImg',d);save();toast('背景已更新')})}
function editSig(){const v=prompt('编辑签名',D.user.signature||'');if(v!==null){D.user.signature=v;document.getElementById('momSig').textContent=v||'点击编辑签名';save()}}
function editUName(){const v=prompt('用户名',D.user.name||'我');if(v!==null&&v.trim()){D.user.name=v.trim();document.getElementById('momUname').textContent=v;document.getElementById('setUName').textContent=v;save()}}

// ============ WALLPAPER ============
function uploadWP(){upFile(d=>{D.wallpaper=d;document.getElementById('homeWall').style.backgroundImage='url('+d+')';save();toast('壁纸已更新')})}

// ============ CHARACTERS ============
let _tmpAv=null;
function openCharCreate(eid){
const ch=eid?D.chars.find(c=>c.id===eid):null;_tmpAv=null;
let h=`<div style="text-align:center;font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px">${ch?'编辑':'创建'}角色</div>
<div class="av-upload" onclick="upCharAv(this)">${ch&&ch.avatar?'<img src="'+ch.avatar+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'}</div>
<div class="fg"><div class="fl">备注</div><input class="fi" id="fNick" value="${ch?ch.nick:''}"></div>
<div class="fg"><div class="fl">角色名</div><input class="fi" id="fName" value="${ch?ch.name:''}"></div>
<div class="fg"><div class="fl">人设</div><textarea class="ft" id="fPers" rows="4">${ch?ch.persona:''}</textarea></div>
<button class="fbtn" onclick="saveChar('${eid||''}')">保存</button>
${ch?'<button class="fbtn red" style="margin-top:6px" onclick="delChar(\''+eid+'\')">删除</button>':''}`;
showBS(h);
}
function upCharAv(el){upFile(d=>{_tmpAv=d;el.innerHTML='<img src="'+d+'">'})}
function saveChar(eid){
const nick=document.getElementById('fNick').value.trim();
const name=document.getElementById('fName').value.trim();
const persona=document.getElementById('fPers').value.trim();
if(!name){toast('请输入角色名');return}
if(eid){const ch=D.chars.find(c=>c.id===eid);if(ch){ch.nick=nick;ch.name=name;ch.persona=persona;if(_tmpAv)ch.avatar=_tmpAv}}
else{D.chars.push({id:_id(),name,nick,avatar:_tmpAv,persona,msgs:[],memory:'',ctxLen:20,autoSum:false,sumInt:20,sumPrompt:'',lastMsg:'',lastTime:''})}
_tmpAv=null;save();closeBS();renderMList();toast('已保存');
}
function delChar(id){if(!confirm('确定删除？'))return;D.chars=D.chars.filter(c=>c.id!==id);save();closeBS();renderMList();go('scrMsg')}

// ============ MSG LIST ============
function renderMList(){
const el=document.getElementById('msgList');
if(!D.chars.length){el.innerHTML='<div style="text-align:center;padding:50px 20px;color:var(--text3);font-size:14px">暂无角色，点击右上角创建</div>';return}
el.innerHTML=D.chars.map(c=>`<div class="mitem" onclick="openChat('${c.id}')">
<div class="mav">${c.avatar?'<img src="'+c.avatar+'">':'<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'}</div>
<div class="minfo"><div class="mname">${c.nick||c.name}</div><div class="mprev">${c.lastMsg||'暂无消息'}</div></div>
<div class="mtime">${c.lastTime||''}</div>
</div>`).join('');
}

// ============ CHAT ============
function openChat(id){
D.curChat=id;const ch=D.chars.find(c=>c.id===id);if(!ch)return;
document.getElementById('chatName').textContent=ch.nick||ch.name;
go('scrChat');renderBubbles();
document.getElementById('featTray').classList.remove('show');
document.getElementById('stkPanel').classList.remove('show');
}
function renderBubbles(){
const ch=D.chars.find(c=>c.id===D.curChat);if(!ch)return;
const el=document.getElementById('chatBody');
el.innerHTML=ch.msgs.map(m=>{
const ts=`<div class="msg-ts">${m.time||''}</div>`;
if(m.role==='system')return`<div class="msg-row system"><div class="msg-wrap"><div class="bubble">${esc(m.content)}</div></div></div>`;
const av=m.role==='char'?`<div class="msg-cav">${ch.avatar?'<img src="'+ch.avatar+'">':''}</div>`:'';
if(m.type==='redpacket')return`<div class="msg-row ${m.role}"><div class="msg-wrap">${av}<div class="bubble rp-bubble" onclick="toast('${(m.note||'恭喜发财').replace(/'/g,"\\'")}')">
<div class="rp-body"><div class="rp-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.94s4.18 1.36 4.18 3.87c0 1.88-1.43 2.88-3.12 3.17z"/></svg></div>
<div class="rp-text"><div class="rp-title">${m.note||'恭喜发财'}</div><div class="rp-note">${m.amount?'¥'+m.amount:''}</div></div></div>
<div class="rp-foot"><svg viewBox="0 0 16 16" style="width:10px;height:10px;fill:var(--text3);margin-right:2px"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 4v5h3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>${m.time}</div>
</div></div>${ts}</div>`;
if(m.type==='voice'){
const bars=[5,10,14,8,16,12,6,14,10,8].map(h=>`<i style="height:${h}px"></i>`).join('');
return`<div class="msg-row ${m.role}"><div class="msg-wrap">${av}<div class="bubble voice-bub" onclick="toast('${(m.content||'').replace(/'/g,"\\'")}')">
<div class="voice-waves">${bars}</div><div class="voice-dur">${m.dur||"0\\""}</div></div></div>${ts}</div>`;}
if(m.type==='image')return`<div class="msg-row ${m.role}"><div class="msg-wrap">${av}<div class="bubble img-bub" onclick="this.classList.toggle('show-desc')">
${m.src?'<img src="'+m.src+'">':'<div style="width:180px;height:120px;background:linear-gradient(135deg,var(--card2),var(--input-bg));border-radius:13px;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:var(--text3)"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>'}
<div class="img-overlay">${esc(m.desc||'图片')}</div></div></div>${ts}</div>`;
if(m.type==='sticker')return`<div class="msg-row ${m.role}"><div class="msg-wrap">${av}<div class="bubble stk-bub"><img src="${m.url||''}" onerror="this.outerHTML='[表情]'"></div></div>${ts}</div>`;
return`<div class="msg-row ${m.role}"><div class="msg-wrap">${av}<div class="bubble">${esc(m.content)}</div></div>${ts}</div>`;
}).join('');
el.scrollTop=el.scrollHeight;
}
function sendMsg(){
const inp=document.getElementById('chatInp');const txt=inp.value.trim();if(!txt)return;
const ch=D.chars.find(c=>c.id===D.curChat);if(!ch)return;
ch.msgs.push({role:'user',content:txt,type:'text',time:ft()});
ch.lastMsg=txt;ch.lastTime=ft();inp.value='';save();renderBubbles();
}
function togFeat(){document.getElementById('featTray').classList.toggle('show');document.getElementById('stkPanel').classList.remove('show')}

// ============ RED PACKET ============
function openRP(){
document.getElementById('featTray').classList.remove('show');
showBS(`<div style="text-align:center;font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px">发红包</div>
<div class="fg"><div class="fl">金额</div><input class="fi" id="rpAmt" type="number" placeholder="0.00"></div>
<div class="fg"><div class="fl">备注</div><input class="fi" id="rpNote" value="恭喜发财"></div>
<button class="fbtn" style="background:linear-gradient(135deg,#f7971e,#ffd200)" onclick="sendRP()">发送红包</button>`);
}
function sendRP(){
const a=document.getElementById('rpAmt').value,n=document.getElementById('rpNote').value||'恭喜发财';
const ch=D.chars.find(c=>c.id===D.curChat);if(!ch)return;
ch.msgs.push({role:'user',type:'redpacket',amount:a,note:n,time:ft(),content:`[红包:${a}:${n}]`});
ch.lastMsg='[红包]';ch.lastTime=ft();save();closeBS();renderBubbles();
}

// ============ VOICE ============
function openVoiceSend(){
document.getElementById('featTray').classList.remove('show');
showBS(`<div style="text-align:center;font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px">语音消息</div>
<div class="fg"><div class="fl">输入语音内容（文字模拟）</div><textarea class="ft" id="voTxt" rows="3" placeholder="说点什么..."></textarea></div>
<button class="fbtn" onclick="sendVoice()">发送语音</button>`);
}
function sendVoice(){
const txt=document.getElementById('voTxt').value.trim();if(!txt)return;
const ch=D.chars.find(c=>c.id===D.curChat);if(!ch)return;
const dur=Math.max(1,Math.ceil(txt.length/3))+'"';
ch.msgs.push({role:'user',type:'voice',content:txt,dur,time:ft()});
ch.lastMsg='[语音]';ch.lastTime=ft();save();closeBS();renderBubbles();
}

// ============ IMAGE ============
let _tmpImg=null;
function openImgSend(){
document.getElementById('featTray').classList.remove('show');_tmpImg=null;
showBS(`<div style="text-align:center;font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px">发送图片</div>
<div class="av-upload" style="width:120px;height:120px;border-radius:14px" onclick="upImgS(this)"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>
<div class="fg" style="margin-top:8px"><div class="fl">图片描述（发给AI，100字内）</div><textarea class="ft" id="imgDesc" rows="2" placeholder="描述图片内容..."></textarea></div>
<button class="fbtn" onclick="sendImg()">发送图片</button>`);
}
function upImgS(el){upFile(d=>{_tmpImg=d;el.innerHTML='<img src="'+d+'" style="width:100%;height:100%;object-fit:cover;border-radius:14px">'})}
function sendImg(){
const desc=document.getElementById('imgDesc').value.trim()||'一张图片';
const ch=D.chars.find(c=>c.id===D.curChat);if(!ch)return;
ch.msgs.push({role:'user',type:'image',src:_tmpImg,desc,content:`[图片:${desc}]`,time:ft()});
ch.lastMsg='[图片]';ch.lastTime=ft();_tmpImg=null;save();closeBS();renderBubbles();
}

// ============ STICKERS ============
function openStkPanel(){document.getElementById('featTray').classList.remove('show');document.getElementById('stkPanel').classList.toggle('show');renderStkG()}
function renderStkG(){
const el=document.getElementById('stkGrid');
el.innerHTML=D.stickers.length?D.stickers.map((s,i)=>`<div class="stk-grid-item" onclick="sendStk(${i})"><img src="${s.url}" onerror="this.outerHTML='<span style=font-size:10px;color:var(--text3)>${s.name}</span>'"></div>`).join(''):'<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text3);font-size:13px">暂无表情包<br>请在设置中添加</div>';
}
function sendStk(i){
const s=D.stickers[i];if(!s)return;const ch=D.chars.find(c=>c.id===D.curChat);if(!ch)return;
ch.msgs.push({role:'user',type:'sticker',url:s.url,content:`[sticker:${s.name}]`,time:ft()});
ch.lastMsg='[表情]';ch.lastTime=ft();document.getElementById('stkPanel').classList.remove('show');save();renderBubbles();
}

// ============ AI ============
async function triggerAI(){
const ch=D.chars.find(c=>c.id===D.curChat);if(!ch)return;
const p=D.apis[D.activeApi];if(!p||!p.url){toast('请先配置API');return}
const btn=document.getElementById('aiBtn');btn.classList.add('ai-loading');
try{
const msgs=buildPr(ch);const resp=await callAPI(msgs,p);
parseResp(ch,resp);
if(ch.autoSum&&ch.msgs.length>0&&ch.msgs.length%ch.sumInt===0)await autoSum(ch);
}catch(e){toast('API错误: '+e.message);ch.msgs.push({role:'system',content:'[API失败: '+e.message+']',time:ft()})}
btn.classList.remove('ai-loading');save();renderBubbles();renderMList();
}
function buildPr(ch){
let sys=D.wb.chatSys+'\n\n角色名：'+ch.name+'\n';
if(ch.nick)sys+='备注：'+ch.nick+'\n';
sys+='角色设定：\n'+ch.persona+'\n\n';
if(ch.memory)sys+='记忆：\n'+ch.memory+'\n\n';
sys+=D.wb.chatFmt+'\n';
if(D.cust.enableRP)sys+='\n'+D.wb.rpFmt;
if(D.cust.enableVoice)sys+='\n'+D.wb.voiceFmt;
if(D.cust.enableImg)sys+='\n'+D.wb.imgFmt;
if(D.cust.enableStk&&D.stickers.length){sys+='\n'+D.wb.stkPrompt+'\n';sys+=D.stickers.map(s=>s.name+': '+s.url).join('\n')}
if(D.cust.syncTime)sys+='\n\n当前北京时间：'+ft()+' '+fd();
let m=[{role:'system',content:sys}];
ch.msgs.slice(-ch.ctxLen).forEach(msg=>{
if(msg.role==='system')m.push({role:'system',content:msg.content});
else if(msg.role==='user')m.push({role:'user',content:msg.content});
else m.push({role:'assistant',content:msg.content});
});return m;
}
async function callAPI(msgs,p){
const url=p.url.replace(/\/+$/,'')+'/v1/chat/completions';
const h={'Content-Type':'application/json'};if(p.key)h['Authorization']='Bearer '+p.key;
const r=await fetch(url,{method:'POST',headers:h,body:JSON.stringify({model:p.model||'gpt-3.5-turbo',messages:msgs,temperature:p.temperature||.7,max_tokens:1024})});
if(!r.ok)throw new Error(r.status);
const d=await r.json();return d.choices?.[0]?.message?.content||'';
}
function parseResp(ch,resp){
let parsed=[];
try{const clean=resp.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
const arr=JSON.parse(clean);
if(Array.isArray(arr)){arr.forEach(item=>{
const c=item.msg||item.message||item.content||JSON.stringify(item);
if(c.startsWith('[sticker:')){const n=c.match(/\[sticker:(.*?)\]/)?.[1];const s=D.stickers.find(x=>x.name===n);
parsed.push({role:'char',type:'sticker',url:s?s.url:'',content:c,time:ft()});
}else parsed.push({role:'char',type:'text',content:c,time:ft()});
})}
}catch(e){parsed.push({role:'char',type:'text',content:resp,time:ft()})}
parsed.forEach(m=>ch.msgs.push(m));
if(parsed.length){ch.lastMsg=parsed[parsed.length-1].content;ch.lastTime=ft()}
}

{role:'user',content:'所有角色评论'+(D.cust.crossReply?'，可互相互动':'，独立回复')}],p);
try{const arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))m.comments=arr.map(c=>({name:c.name,content:c.content}))}catch(e){m.comments=[{name:'AI',content:r.substring(0,100)}]}
D.chars.forEach(ch=>{ch.msgs.push({role:'system',content:`[评论更新] "${m.content.substring(0,20)}..."的评论已更新`,time:ft()})});
save();renderMom();toast('评论已刷新');
}catch(e){toast('失败: '+e.message)}
}

// ============ MOMENT DETAIL ============
let _replyTo=null;
function openMD(id){
D.curMom=id;const m=D.moments.find(x=>x.id===id);if(!m)return;
go('scrMD');_replyTo=null;
const el=document.getElementById('mdContent');
let h=`<div class="md-card"><div style="display:flex;gap:10px">
<div class="mom-av">${m.authorAv?'<img src="'+m.authorAv+'">':''}</div>
<div><div class="mom-author">${m.authorName}</div><div class="mom-text">${esc(m.content)}</div>
${m.image?'<img class="mom-img" src="'+m.image+'">':''}<div class="mom-time-txt">${m.ts}</div></div></div></div>`;
if(m.comments?.length){h+='<div class="md-cmts">';
m.comments.forEach(c=>{const ch=D.chars.find(x=>(x.nick||x.name)===c.name);
h+=`<div class="md-cmt-item"><div class="md-cmt-av" onclick="setRT('${c.name}')">${ch&&ch.avatar?'<img src="'+ch.avatar+'">':''}</div>
<div class="md-cmt-body"><b onclick="setRT('${c.name}')">${c.name}</b>：${esc(c.content)}</div></div>`;
});h+='</div>';}
el.innerHTML=h;
}
function setRT(name){_replyTo=name;document.getElementById('mdInp').placeholder='回复 '+name+'：';document.getElementById('mdInp').focus()}
function sendMomCmt(){
const m=D.moments.find(x=>x.id===D.curMom);if(!m)return;
const txt=document.getElementById('mdInp').value.trim();if(!txt)return;
m.comments.push({name:D.user.name,content:(_replyTo?'回复 '+_replyTo+'：':'')+txt});
document.getElementById('mdInp').value='';_replyTo=null;document.getElementById('mdInp').placeholder='评论...';
save();openMD(D.curMom);
}
async function trigMomAI(){
const m=D.moments.find(x=>x.id===D.curMom);if(!m)return;
const p=D.apis[D.activeApi];if(!p||!p.url){toast('请配置API');return}
toast('AI回复中...');
try{let ci='';
if(_replyTo){const ch=D.chars.find(c=>(c.nick||c.name)===_replyTo);if(ch)ci='角色'+ch.name+'：'+ch.persona+(ch.memory?'\n记忆：'+ch.memory:'')}
else D.chars.forEach(c=>{ci+=c.name+'('+c.nick+'): '+c.persona+'\n'});
const ec=m.comments.map(c=>c.name+': '+c.content).join('\n');
const r=await callAPI([{role:'system',content:D.wb.momReply+'\n\n'+ci+'\n\n朋友圈：'+m.content+'\n已有评论：\n'+ec},
{role:'user',content:_replyTo?`请${_replyTo}回复`:'各角色继续回复'+(D.cust.crossReply?'，可互动':'')}],p);
try{const arr=JSON.parse(r.replace(/```json?\n?/g,'').replace(/```/g,''));if(Array.isArray(arr))arr.forEach(c=>m.comments.push({name:c.name,content:c.content}))}
catch(e){m.comments.push({name:_replyTo||'AI',content:r.substring(0,200)})}
_replyTo=null;D.chars.forEach(ch=>{ch.msgs.push({role:'system',content:`[评论更新] "${m.content.substring(0,20)}..."有新评论`,time:ft()})});
save();openMD(D.curMom);toast('回复完成');
}catch(e){toast('失败: '+e.message)}
}

// ============ MUSIC ============
function initMusic(){
if(D.wb.music?.length){
document.getElementById('di').classList.toggle('playing',D.playing);
document.getElementById('diName').textContent=D.wb.music[D.songIdx]?.name||'';
document.getElementById('dipTitle').textContent=D.wb.music[D.songIdx]?.name||'未播放';
}else{document.getElementById('diName').textContent=''}
}
function toggleDI(){
if(document.getElementById('diPanel').classList.contains('show')){closeDI();return}
document.getElementById('diPanel').classList.add('show');
}
function closeDI(){document.getElementById('diPanel').classList.remove('show')}
function musicToggle(){
if(!D.wb.music?.length){toast('请在世界书添加音乐');return}
const a=document.getElementById('aud');
if(D.playing){a.pause();D.playing=false}
else{const s=D.wb.music[D.songIdx];if(s){a.src=s.url;a.play().catch(()=>toast('播放失败'));D.playing=true}}
updatePlayUI();
}
function musicNext(){if(!D.wb.music?.length)return;D.songIdx=(D.songIdx+1)%D.wb.music.length;playCurrent()}
function musicPrev(){if(!D.wb.music?.length)return;D.songIdx=(D.songIdx-1+D.wb.music.length)%D.wb.music.length;playCurrent()}
function playCurrent(){
const s=D.wb.music[D.songIdx];document.getElementById('dipTitle').textContent=s.name;document.getElementById('diName').textContent=s.name;
if(D.playing){const a=document.getElementById('aud');a.src=s.url;a.play().catch(()=>{})}
updatePlayUI();
}
function updatePlayUI(){
document.getElementById('di').classList.toggle('playing',D.playing);
document.getElementById('dipPlayBtn').innerHTML=D.playing?'<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>':'<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
}
function seekMusic(e){
const a=document.getElementById('aud');if(!a.duration)return;
const r=e.currentTarget.getBoundingClientRect();const p=(e.clientX-r.left)/r.width;
a.currentTime=p*a.duration;
}
// Audio progress
const aud=document.getElementById('aud');
aud.addEventListener('timeupdate',()=>{
if(!aud.duration)return;
const p=(aud.currentTime/aud.duration)*100;
document.getElementById('dipProgress').style.width=p+'%';
document.getElementById('dipCur').textContent=fmtSec(aud.currentTime);
document.getElementById('dipDur').textContent=fmtSec(aud.duration);
});
aud.addEventListener('ended',()=>{musicNext()});
function fmtSec(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0')}

// ============ BOTTOM SHEET ============
function showBS(h){document.getElementById('bsSheet').innerHTML=h;document.getElementById('bsOverlay').classList.add('show')}
function closeBS(){document.getElementById('bsOverlay').classList.remove('show');_tmpAv=null;_tmpImg=null}
</script>
