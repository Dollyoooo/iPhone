html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000}
textarea,input{-webkit-user-select:text;user-select:text;font-family:inherit}
#phone{width:var(--pw);height:var(--ph);border-radius:var(--pr);transform:translateY(var(--py));position:relative;overflow:hidden;background:var(--bg);background-size:cover;background-position:center;box-shadow:0 0 0 3px #222,0 0 0 5px #444,0 40px 100px rgba(0,0,0,.7);transition:background .3s, transform .3s}

.di-cam{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#2a2a4a,#111);border:1.5px solid #333;position:absolute;left:16px;top:50%;transform:translateY(-50%);z-index:5;flex-shrink:0}

function execMS(){if(!_msSet.size)return;if(!confirm('确定删除选中的 '+_msSet.size+' 条消息？'))return;var arr=Array.from(_msSet).sort((a,b)=>b-a);if(_msMode==='chat'){var ch=gch(D.curChat);var arc=getCurArc(ch);arr.forEach(i=>arc.msgs.splice(i,1));var realMsgs=arc.msgs.filter(function(m){return m.role!=='system'});if(realMsgs.length>0){ch.lastM=realMsgs[realMsgs.length-1].content||'['+realMsgs[realMsgs.length-1].type+']';ch.lastT=realMsgs[realMsgs.length-1].time||''}else{ch.lastM='';ch.lastT=''}}else{var arc=getSArc();arr.forEach(i=>arc.msgs.splice(i,1));}save();exitMS(_msMode);if(_msMode==='chat')renderML();}

/* --- 论坛功能核心逻辑 --- */
function renderForum(){var el=$('forum-list');if(!D.forums||!D.forums.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">暂无帖子</div>';return}var h='';D.forums.slice().reverse().forEach(function(f){var ch=gch(f.authorId);var avSrc=ch?ch.avatar:null;var av=avSrc?'<img class="forum-av" src="'+avSrc+'">':'<svg class="forum-av" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="var(--text3)"/></svg>';h+='<div class="forum-post"><div class="forum-hdr"><div class="forum-fname">'+esc(f.forumName)+' <span class="forum-tag">HOT🔥</span></div></div><div class="forum-title">'+escH(f.title)+'</div><div class="forum-author">'+av+'<div><div class="forum-aname">'+esc(f.authorName)+'</div><div class="forum-time">'+esc(f.postTime||'')+'</div></div></div><div class="forum-content">'+escH(f.content)+'</div>';h+='<div class="forum-acts"><button class="forum-act-btn"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg> '+(f.likes||Math.floor(Math.random()*500+50))+'</button><button class="forum-act-btn" onclick="openForumDetail(\''+f.id+'\')"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg> '+(f.comments||(f.replies?f.replies.length:0))+'</button><button class="forum-act-btn" onclick="forwardForum(\''+f.id+'\')"><svg viewBox="0 0 24 24"><path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-4M17 8l-5-5-5 5M12 3v14"/></svg> 转发</button><button class="forum-act-btn" onclick="delForumPost(\''+f.id+'\')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 删除</button></div></div>'});el.innerHTML=h}
function delForumPost(fid){if(!confirm('确定删除这篇帖子吗？'))return;D.forums=D.forums.filter(function(x){return x.id!==fid});save();if(curScr==='scrForumDetail')go('scrForum');else renderForum();toast('已删除')}
function openForumDetail(fid){var f=D.forums.find(function(x){return x.id===fid});if(!f)return;go('scrForumDetail');var ch=gch(f.authorId);var avSrc=ch?ch.avatar:null;var av=avSrc?'<img class="forum-av" src="'+avSrc+'">':'<svg class="forum-av" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="var(--text3)"/></svg>';var ph='<div class="fd-post"><div class="forum-hdr"><div class="forum-fname">'+esc(f.forumName)+' <span class="forum-tag">HOT🔥</span></div></div><div class="forum-title" style="font-size:20px;margin-bottom:14px">'+escH(f.title)+'</div><div class="forum-author">'+av+'<div><div class="forum-aname">'+esc(f.authorName)+'</div><div class="forum-time">'+esc(f.postTime||'')+'</div></div></div><div class="forum-content" style="font-size:15px;line-height:1.7">'+escH(f.content)+'</div></div>';$('fd-post-area').innerHTML=ph;var cmh='<div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px">全部回复 '+(f.replies?f.replies.length:0)+'</div>';if(f.replies&&f.replies.length){f.replies.forEach(function(r){var n=r.name||r.user,c=r.content,m=c.match(/^([^:：]+回复\s*\d*楼?\s*[^:：]+)[:：]\s*([\s\S]*)$/);if(m){n=m[1];c=m[2]}cmh+='<div class="fd-cmt-item"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><b style="color:var(--text);font-size:13px">'+r.floor+'楼 '+esc(n)+'</b></div><div style="font-size:14px;color:var(--text);line-height:1.6">'+escH(c)+'</div></div>'})}else{cmh+='<div style="text-align:center;padding:20px;font-size:13px;color:var(--text3)">暂无回复</div>'}$('fd-cmts-area').innerHTML=cmh}

function openNewForumPost() {
    var co = '';
    D.chars.forEach(function(c) {
        co += '<span class="chip" onclick="createForumPost(\''+c.id+'\');closeBS()">' + (c.nick||c.name) + '</span>';
    });
    showBS('<div class="bs-hd"></div><div class="mt">选择发帖角色</div><div class="fg"><div style="display:flex;flex-wrap:wrap;gap:4px">' + co + '</div></div>');
}

function createForumPost(cid) {
    var ch = gch(cid); if (!ch) return;
    var p = D.apis[D.aApi]; if (!p || !p.url) { toast('请配置API'); return; }
    toast('论坛发帖生成中...');var fab=document.querySelector('.forum-fab');if(fab)fab.classList.add('ld');

    ensureArcs(ch);
    var mem = getMemory(ch);
    var allCtx = getMsgs(ch).filter(function(m){return m.role!=='system'}).slice(-20).map(function(m){return (m.role==='user'?getChatUN(ch):(ch.nick||ch.name))+': '+(m.content||'')}).join('\n');

    var sysP=(D.wb.forumPrompt||WB_DEFAULTS.forumPrompt)+'\n\n[发帖角色设定]\n'+ch.persona+'\n\n[用户设定]\n'+(ch.chatUserPersona||D.user.sig||'无');
    if (mem) sysP += '\n\n[记忆摘要]\n' + mem;
    if (allCtx) sysP += '\n\n[最近20条聊天记录]\n' + allCtx;

    callAPI([{role:'system', content:sysP}, {role:'user', content:'请以该角色的身份发布一篇论坛帖子及回复。必须且只能返回合法的JSON对象，绝不输出其他文字。'}], p).then(function(r) {
        try {
                                var rC=r.replace(/<think>[\s\S]*?<\/think>/gi,'').replace(/```[a-zA-Z]*\s*/gi,'').replace(/```\s*/g,'').trim();var s=rC.indexOf('{'),en=rC.lastIndexOf('}');var jStr=s>=0&&en>s?rC.slice(s,en+1):rC;var j;try{j=JSON.parse(jStr)}catch(e){try{j=(new Function('return '+jStr))()}catch(e2){jStr=jStr.replace(/\n/g,'\\n').replace(/\r/g,'');try{j=JSON.parse(jStr)}catch(e3){j=(new Function('return '+jStr))()}}}if(!j||typeof j!=='object')throw new Error();

            D.forums.push({
                id: uid(),
                authorId: cid,
                authorName: ch.nick || ch.name,
                forumName: j.forumName || '匿名主页',
                title: j.title || '无标题',
                content: j.content || '',
                postTime: fdFull() + ' ' + ft(),
                likes: j.likes || 0,
                comments: j.comments || 0,
                replies: j.replies || []
            });
            save();renderForum();toast('发帖成功');if(fab)fab.classList.remove('ld');
        } catch (x) {
            toast('解析失败，模型未返回标准JSON格式');
        }
    }).catch(function(e){toast('失败:\\n'+(e.message||e));if(fab)fab.classList.remove('ld');});
}

function forwardForum(fid) {
    var f = D.forums.find(function(x){return x.id===fid}); if (!f) return;
    var ch = gch(f.authorId); if (!ch) { toast('找不到发帖角色'); return; }

    var str = '【论坛转发】\n板块：' + f.forumName + '\n标题：' + f.title + '\n楼主：' + f.authorName + '\n正文：' + f.content + '\n\n[评论区]';
    if (f.replies && f.replies.length) {
        f.replies.forEach(function(r) {
            str += '\n' + r.floor + '楼 ' + (r.name||r.user) + '：' + r.content;
        });
    }

    getMsgs(ch).push({role:'system', content:str, time:ft()});
    save(); toast('已成功转发至与 ' + (ch.nick||ch.name) + ' 的聊天界面');
}

function openForumSet() {
    $('forum-prompt-ta').value = D.wb.forumPrompt || WB_DEFAULTS.forumPrompt;
    $('ovForumSet').classList.add('on');
}

function saveForumSet() {
    D.wb.forumPrompt = $('forum-prompt-ta').value;
    save(); closeOV('ovForumSet'); toast('论坛提示词已保存');
}

init();
var l=$('script-role-lbl');if(l)l.textContent=D.scriptRole==='char'?'角色':'我';

function togHideMsg(idx){$('map').classList.remove('on');var ch=gch(D.curChat);var m=getMsgs(ch)[idx];m.hidden=!m.hidden;save();renderBub();}
function jumpToMsg(idx,mode){if(idx<0){toast('系统提示词和格式设定无法跳转哦');return;}closeOV('ovPV');closeOV('ovSearch');closeOV('ovCFS');closeOV('ovScriptSet');var cb=mode==='script'?$('script-msg-area'):$('cbody');var ms=cb.querySelectorAll('.mr');if(ms[idx]){cb.scrollTop=ms[idx].offsetTop-cb.clientHeight/2+ms[idx].clientHeight/2;ms[idx].style.transition='background 0.5s';ms[idx].style.background='rgba(128,128,128,0.3)';setTimeout(function(){ms[idx].style.background='transparent'},1500);}}

var _searchMode = 'chat';
function openSearch(mode) {
    _searchMode = mode;
    var el = $('sh-si'); if(el) el.value = '';
    filterSearch();
    $('ovSearch').classList.add('on');
}
function filterSearch() {
    var q = ($('sh-si')?$('sh-si').value:'').trim().toLowerCase();
    var el = $('sh-list'); if(!el) return;
    var h = ''; var matchCount = 0; var msgs = [];
    if(_searchMode === 'chat') {
        var ch = gch(D.curChat); if(ch) msgs = getCurArc(ch).msgs;
    } else {
        msgs = getSArc().msgs;
    }
    var eyeIcon = '<span style="display:inline-flex;align-items:center;margin-left:4px;opacity:0.6"><svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg></span>';
    msgs.forEach(function(m, i) {
        var c = m.content || '['+m.type+']';
        var vis = !q || c.toLowerCase().indexOf(q) >= 0;
        if(!vis) return;
        matchCount++;
        var rc = m.role === 'system' ? 'sy' : m.role === 'user' ? 'us' : 'as';
        var rn = {system:'SYS', user:'USER', assistant:'CHAR', char:'CHAR'}[m.role] || '';
        var dispC = escH(c);
        if(q) {
            var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi');
            dispC = dispC.replace(re, '<mark>$1</mark>');
        }
        h += '<div class="pv-m" onclick="jumpToMsg('+i+', \''+_searchMode+'\')"><div class="pv-tag '+rc+'">'+rn+'</div><div class="pv-tok">'+(m.hidden?eyeIcon:'')+'</div><div class="pv-c">'+dispC+'</div></div>';
    });
    if(!h) h = '<div style="text-align:center;padding:36px;color:var(--text3);font-size:13px">无结果</div>';
    el.innerHTML = h;
    var info = $('sh-info'); if(info) info.textContent = msgs.length + ' 条记录' + (q ? ' | ' + matchCount + ' 条匹配' : '');
}

</script>
